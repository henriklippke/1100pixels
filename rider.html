<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RIDER</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a1628;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        /* ── Header ── */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(10, 22, 40, 0.97);
            border-bottom: 1px solid rgba(255, 60, 60, 0.4);
            box-shadow: 0 2px 20px rgba(0,0,0,0.6);
            pointer-events: none;
        }
        .header h2 { margin: 0; font-size: 1.1rem; text-align: center; }
        .hud-score {
            color: #ff4444;
            text-shadow: 0 0 12px rgba(255,68,68,0.7);
            font-size: 1.3rem;
            min-width: 130px;
        }
        .hud-title {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            flex: 1;
            text-align: center;
            margin: 0 10px;
        }
        .hud-flips {
            color: #569aa9;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 130px;
            text-align: right;
            text-shadow: 0 0 8px rgba(86,154,169,0.5);
        }
        .hud-level {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            min-width: 130px;
            gap: 3px;
        }
        .hud-level-label {
            color: #ffcc44;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255,204,68,0.6);
        }
        .hud-xp-bar-wrap {
            width: 110px;
            height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .hud-xp-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffcc44, #ff8800);
            border-radius: 3px;
            transition: width 0.3s ease;
            box-shadow: 0 0 6px rgba(255,180,0,0.7);
        }
        .hud-boost-charges {
            color: #ffcc44;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        /* ── Hint ── */
        #hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.38);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            transition: opacity 1.2s ease;
            z-index: 100;
            white-space: nowrap;
        }
        #hint.fade { opacity: 0; }

        /* ── Modals ── */
        #name-modal, #game-over-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(7px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        #name-modal.show, #game-over-modal.show { display: flex; }

        #game-over-modal.show {
            animation: screenFlash 0.5s ease-out forwards;
        }
        @keyframes screenFlash {
            0%   { background: rgba(200,0,0,0.6); }
            100% { background: rgba(0,0,0,0.82); }
        }
        #game-over-modal.show .modal-box h1 {
            animation: gameOverFlicker 0.09s ease-in-out 0.25s 7;
        }
        @keyframes gameOverFlicker {
            0%,100% { opacity:1; text-shadow: 0 0 25px rgba(255,68,68,0.7); }
            50%     { opacity:0.1; text-shadow: none; }
        }

        .modal-box {
            background: linear-gradient(135deg, #0d1f33 0%, #1a0d20 100%);
            border: 1px solid rgba(255,68,68,0.45);
            border-radius: 18px;
            padding: 50px 70px;
            text-align: center;
            box-shadow: 0 0 70px rgba(255,68,68,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
            max-width: 90vw;
        }
        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        .modal-box h1 {
            color: #ff4444;
            font-size: 2.8rem;
            margin: 0 0 8px;
            text-shadow: 0 0 25px rgba(255,68,68,0.7);
            text-transform: uppercase;
            letter-spacing: 6px;
        }
        .modal-subtitle {
            color: rgba(255,255,255,0.45);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 22px;
        }
        .modal-box .final-score {
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
            margin: 20px 0 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .modal-box .final-score span {
            color: #ff8844;
            font-size: 3rem;
            font-weight: bold;
            display: block;
            margin-top: 8px;
            text-shadow: 0 0 18px rgba(255,136,68,0.6);
        }
        .modal-box input[type="text"] {
            display: block;
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,68,68,0.35);
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            padding: 12px 18px;
            outline: none;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 18px;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        .modal-box input[type="text"]:focus {
            border-color: rgba(255,68,68,0.75);
            box-shadow: 0 0 18px rgba(255,68,68,0.2);
        }
        .modal-box input[type="text"]::placeholder { color: rgba(255,255,255,0.2); }
        .modal-box input.input-error {
            border-color: #ff4444;
            box-shadow: 0 0 12px rgba(255,68,68,0.5);
            animation: inputShake 0.35s ease;
        }
        @keyframes inputShake {
            0%,100% { transform: translateX(0); }
            25%     { transform: translateX(-7px); }
            75%     { transform: translateX(7px); }
        }
        .modal-buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-top: 4px;
        }
        .modal-box button {
            color: white;
            border: none;
            padding: 13px 30px;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff4444, #cc2222);
            box-shadow: 0 4px 18px rgba(255,68,68,0.35);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #ff6666, #ff4444) !important;
            box-shadow: 0 6px 28px rgba(255,68,68,0.55);
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18) !important;
            box-shadow: none !important;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15) !important;
            transform: translateY(-2px);
        }
        .modal-box button:active { transform: translateY(0); }

        @media (max-width: 431px) {
            .modal-box { padding: 35px 25px; }
            .modal-box h1 { font-size: 2rem; letter-spacing: 3px; }
            .modal-box .final-score span { font-size: 2.2rem; }
            .hud-title { display: none; }
        }
    </style>
</head>
<body>

<!-- Canvas -->
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div class="header">
    <h2 class="hud-score">Flips: <span id="hud-score">0</span></h2>
    <h2 class="hud-title">Rider</h2>
    <div class="hud-level">
        <span class="hud-level-label" id="hud-boost-label">BOOST</span>
        <div class="hud-xp-bar-wrap"><div class="hud-xp-bar" id="hud-xp-bar" style="width:0%"></div></div>
        <span class="hud-boost-charges" id="hud-boost-charges"></span>
    </div>
</div>

<!-- Hint -->
<div id="hint">Leertaste halten = Gas &amp; Drehen</div>

<!-- Name Modal -->
<div id="name-modal" class="show">
    <div class="modal-box">
        <h1>RIDER</h1>
        <p class="modal-subtitle">Gib deinen Namen ein</p>
        <input type="text" id="name-input" placeholder="Dein Name..." maxlength="20" autocomplete="off" spellcheck="false">
        <button id="name-submit" class="btn-primary">Spielen</button>
    </div>
</div>

<!-- Game Over Modal -->
<div id="game-over-modal">
    <div class="modal-box">
        <h1>Crash!</h1>
        <p class="final-score">Deine Punkte<span id="final-score-display">0</span></p>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="location.href='/'">Zurück</button>
            <button class="btn-primary" id="restart-btn">Nochmal</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCGxWCAMbglUMjHeKRdeniS4TcA5oCAx1c",
        authDomain: "pixels-e2f82.firebaseapp.com",
        projectId: "pixels-e2f82",
        storageBucket: "pixels-e2f82.firebasestorage.app",
        messagingSenderId: "311496840709",
        appId: "1:311496840709:web:3a94601ef40cbd0c946e6c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.storeResult = async function(name, points) {
        if (points <= 0 || name.length === 0) return;
        try {
            await addDoc(collection(db, "rider"), {
                name: name,
                points: points,
                created: new Date()
            });
        } catch(e) { console.warn("Firebase error:", e); }
    };
</script>

<!-- Game Script -->
<script>
(function() {
    "use strict";

    // ── Physics Constants ──────────────────────────────────────────
    const GRAVITY     = 600;
    const THRUST      = 400;
    const MAX_VX      = 650;
    const FLIP_SPEED  = Math.PI * 2.4; // ~1.2 flips/s
    const FRICTION    = 0.97;
    const CRASH_ANGLE = 1.6; // ~92° — nur Crash wenn fast auf dem Kopf
    const AXLE_DIST   = 18;
    const WHEEL_R     = 10;

    const BOOST_THRUST   = 1100;
    const BOOST_DURATION = 1.4;
    const RELEASE_TAP_MS = 280;

    const FLIPS_PER_BOOST = 10; // flips needed to earn one boost charge

    // ── Canvas setup ───────────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ── Game state ─────────────────────────────────────────────────
    let playerName = '';
    let gameRunning = false;

    let vx, vy, angle, angVel;
    let px, py;          // position of vehicle center
    let onGround;
    let wasOnGround;
    let boostActive, boostTimer, wheelieTilt;
    let boostCharges, flipsUntilBoost;
    let lastSpaceRelease = 0;
    let lastTouchRelease = 0;
    let airFrames;       // frames seit dem Abheben
    let score, flips;
    let flipAccum;       // accumulated rotation for counting flips
    let holding;

    // Popup texts
    let popups = [];

    // ── Terrain Generation ─────────────────────────────────────────
    let terrain = [];   // array of {x, y}, variable spacing

    function generateTerrain() {
        terrain = [];
        const H    = canvas.height;
        const minY = H * 0.18;
        const maxY = H * 0.82;
        const base = H * 0.63;

        const pt = (x, y) => terrain.push({ x, y: Math.max(minY, Math.min(maxY, y)) });

        // Underground edge + flat start
        pt(-1000, base + 600);
        pt(-1000, base);
        pt(0,     base);
        pt(500,   base);

        let x = 500;
        let y = base;

        for (let seg = 0; seg < 120; seg++) {
            const diff = Math.min(seg / 50, 1);
            const r    = Math.random();

            if (r < 0.14) {
                // ── Flat ──────────────────────────────────────────
                const w = 180 + Math.random() * 220;
                pt(x, y); pt(x + w, y);
                x += w;

            } else if (r < 0.27) {
                // ── Sanfte Wellen (2–4 Hügel) ─────────────────────
                const count = 2 + Math.floor(Math.random() * 3);
                for (let i = 0; i < count; i++) {
                    const w = 160 + Math.random() * 180;
                    const h = 25 + Math.random() * 65 * diff;
                    pt(x,           y);
                    pt(x + w * 0.25, y - h * 0.6);
                    pt(x + w * 0.5,  y - h);
                    pt(x + w * 0.75, y - h * 0.6);
                    pt(x + w,        y);
                    x += w;
                }

            } else if (r < 0.40) {
                // ── Kicker-Rampen mit Abstand ──────────────────────
                const count = 1 + Math.floor(Math.random() * 3 * diff + 1);
                for (let i = 0; i < count; i++) {
                    const gap    = 100 + Math.random() * 140;
                    const rampW  = 55  + Math.random() * 55;
                    const rampH  = 70  + Math.random() * 110 * diff;
                    const landW  = 80  + Math.random() * 80;
                    pt(x,                    y);
                    pt(x + gap,              y);
                    pt(x + gap + rampW,      y - rampH);
                    pt(x + gap + rampW + landW, y);
                    x += gap + rampW + landW;
                }

            } else if (r < 0.52) {
                // ── Spitze Dreiecks-Gipfel ─────────────────────────
                const count = 1 + Math.floor(Math.random() * 2);
                for (let i = 0; i < count; i++) {
                    const bw = 100 + Math.random() * 120;
                    const h  = 70  + Math.random() * 110 * diff;
                    pt(x,          y);
                    pt(x + bw / 2, y - h);
                    pt(x + bw,     y);
                    x += bw + 60;
                }

            } else if (r < 0.59) {
                // ── Zacken / Zähne ────────────────────────────────
                const count = 3 + Math.floor(Math.random() * 5);
                for (let i = 0; i < count; i++) {
                    const tw = 35 + Math.random() * 50;
                    const th = 20 + Math.random() * 55 * diff;
                    pt(x,          y);
                    pt(x + tw / 2, y - th);
                    pt(x + tw,     y);
                    x += tw;
                }

            } else if (r < 0.65) {
                // ── Tal (V / U Form) ──────────────────────────────
                const w = 180 + Math.random() * 200;
                const d = 60  + Math.random() * 100 * diff;
                pt(x,            y);
                pt(x + w * 0.3,  y + d * 0.7);
                pt(x + w * 0.5,  y + d);
                pt(x + w * 0.7,  y + d * 0.7);
                pt(x + w,        y);
                x += w;

            } else if (r < 0.70) {
                // ── Plateau (erhöhter flacher Abschnitt) ──────────
                const upW   = 60  + Math.random() * 60;
                const flatW = 120 + Math.random() * 160;
                const downW = 60  + Math.random() * 60;
                const h     = 60  + Math.random() * 90 * diff;
                pt(x,                       y);
                pt(x + upW,                 y - h);
                pt(x + upW + flatW,         y - h);
                pt(x + upW + flatW + downW, y);
                x += upW + flatW + downW;

            } else if (r < 0.76) {
                // ── Runde Schanze (Sinus-Kurve) ───────────────────
                const count = 1 + Math.floor(Math.random() * 2);
                for (let i = 0; i < count; i++) {
                    const gap  = 80  + Math.random() * 120;
                    const w    = 140 + Math.random() * 140;
                    const h    = 55  + Math.random() * 100 * diff;
                    const steps = 10;
                    pt(x, y);
                    pt(x + gap, y);
                    for (let s = 0; s <= steps; s++) {
                        const t  = s / steps;
                        const cx = x + gap + t * w;
                        const cy = y - Math.sin(t * Math.PI) * h;
                        pt(cx, cy);
                    }
                    x += gap + w;
                }

            } else if (r < 0.81) {
                // ── Viertelkreis-Schanze ───────────────────────────
                const R    = 70 + Math.random() * 90 * diff;
                const gap  = 80 + Math.random() * 100;
                const steps = 9;
                // Center of arc directly above ramp base
                const cx   = x + gap;
                const cy   = y - R;
                pt(x, y);
                pt(x + gap, y);
                for (let s = 0; s <= steps; s++) {
                    const theta = Math.PI / 2 * (1 - s / steps); // 90° → 0°
                    pt(cx + R * Math.cos(theta), cy + R * Math.sin(theta));
                }
                // Ramp lip at (x+gap+R, y-R) → short descent back to ground
                pt(x + gap + R + 20, y - R);
                pt(x + gap + R + 100, y);
                x += gap + R + 100;

            } else if (r < 0.87) {
                // ── Kreissenke (runde Mulde nach unten) ───────────
                const count = 1 + Math.floor(Math.random() * 2);
                for (let i = 0; i < count; i++) {
                    const R    = 40 + Math.random() * 50;
                    const gap  = 50 + Math.random() * 80;
                    const lcx  = x + gap + R;
                    const lcy  = y;
                    const steps = 12;
                    pt(x, y);
                    pt(x + gap, y);
                    for (let s = 0; s <= steps; s++) {
                        const theta = Math.PI * (1 - s / steps); // 180° → 0° (durch Tiefpunkt bei 90°)
                        pt(lcx + R * Math.cos(theta), lcy + R * Math.sin(theta));
                    }
                    x += gap + 2 * R;
                }

            } else if (r < 0.95) {
                // ── Looping (Halbkreis-Bogen, unten offen) ────────
                const R     = 55 + Math.random() * 50 * (0.5 + diff);
                const gap   = 80 + Math.random() * 100;
                const lcx   = x + gap + R;
                const lcy   = y;
                const steps = 18;
                pt(x, y);
                pt(x + gap, y);
                for (let s = 0; s <= steps; s++) {
                    const theta = Math.PI + Math.PI * (s / steps); // 180° → 360°
                    pt(lcx + R * Math.cos(theta), lcy + R * Math.sin(theta));
                }
                pt(x + gap + 2 * R + 80, y);
                x += gap + 2 * R + 80;

            } else {
                // ── Bodenloser Abgrund mit Pflichtschanze ──────────
                const flatIn  = 120 + Math.random() * 80;
                const rampW   = 60  + Math.random() * 40;
                const rampH   = 90  + Math.random() * 60;
                const pitW    = 280 + Math.random() * 160;
                const landW   = 100 + Math.random() * 80;

                // Anlauf + Schanze
                pt(x,                  y);
                pt(x + flatIn,         y);
                pt(x + flatIn + rampW, y - rampH);

                const pitStart = x + flatIn + rampW;
                const pitEnd   = pitStart + pitW;

                // Abgrund-Wände direkt pushen (kein Y-Clamp)
                terrain.push({ x: pitStart,     y: y - rampH });
                terrain.push({ x: pitStart + 5, y: H + 400 });
                terrain.push({ x: pitEnd   - 5, y: H + 400 });
                terrain.push({ x: pitEnd,       y: y });
                pt(pitEnd + landW, y);

                x = pitEnd + landW;
            }

            y = Math.max(minY, Math.min(maxY, y));
        }

        pt(x + 800, y); // langer Abschluss
    }

    // Binary-search Lookup (variable Segment-Breiten)
    function findIdx(wx) {
        let lo = 0, hi = terrain.length - 2;
        while (lo < hi) {
            const mid = (lo + hi + 1) >> 1;
            if (terrain[mid].x <= wx) lo = mid; else hi = mid - 1;
        }
        return lo;
    }

    // Get terrain Y at world X
    function terrainYAt(wx) {
        const i = findIdx(wx);
        const a = terrain[i], b = terrain[i + 1];
        if (!b || b.x === a.x) return a ? a.y : canvas.height;
        return a.y + (b.y - a.y) * ((wx - a.x) / (b.x - a.x));
    }

    // Get terrain angle at world X
    function terrainAngleAt(wx) {
        const i = findIdx(wx);
        const a = terrain[i], b = terrain[i + 1];
        if (!a || !b) return 0;
        return Math.atan2(b.y - a.y, b.x - a.x);
    }

    // ── Init / Reset ───────────────────────────────────────────────
    function initGame() {
        generateTerrain();

        const startX = 80;
        const startY = terrainYAt(startX) - WHEEL_R - 4;

        px       = startX;
        py       = startY;
        vx       = 0;
        vy       = 0;
        angle    = 0;
        angVel   = 0;
        onGround  = false;
        airFrames = 0;
        score    = 0;
        flips    = 0;
        flipAccum = 0;
        holding      = false;
        boostActive   = false;
        boostTimer    = 0;
        wheelieTilt   = 0;

        boostCharges  = 0;
        flipsUntilBoost = FLIPS_PER_BOOST;
        popups   = [];
        gameRunning = true;
        lastTime    = null;
        updateHUD();
    }

    // ── Input ──────────────────────────────────────────────────────
    let hintFaded = false;

    function setHolding(val) {
        if (val && !hintFaded) {
            hintFaded = true;
            document.getElementById('hint').classList.add('fade');
        }
        if (val) initEngineSound();
        holding = val;
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && gameRunning) {
            e.preventDefault();
            const now = performance.now();
            if (now - lastSpaceRelease < RELEASE_TAP_MS && !boostActive) {
                if (boostCharges > 0) {
                    boostCharges--;
                    boostActive = true;
                    boostTimer  = BOOST_DURATION;
                    popups.push({ x: px, y: py - 40, text: 'BOOST!', life: 0.9, maxLife: 0.9, color: '#ffcc44' });
                    updateHUD();
                } else {
                    popups.push({ x: px, y: py - 40, text: 'KEIN BOOST! Mehr Flips!', life: 1.2, maxLife: 1.2 });
                }
            }
            setHolding(true);
        }
    });
    window.addEventListener('keyup', (e) => {
        if (e.code === 'Space') {
            lastSpaceRelease = performance.now();
            setHolding(false);
        }
    });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (gameRunning) {
            const now = performance.now();
            if (now - lastTouchRelease < RELEASE_TAP_MS && !boostActive) {
                if (boostCharges > 0) {
                    boostCharges--;
                    boostActive = true;
                    boostTimer  = BOOST_DURATION;
                    popups.push({ x: px, y: py - 40, text: 'BOOST!', life: 0.9, maxLife: 0.9, color: '#ffcc44' });
                    updateHUD();
                } else {
                    popups.push({ x: px, y: py - 40, text: 'KEIN BOOST! Mehr Flips!', life: 1.2, maxLife: 1.2 });
                }
            }
            setHolding(true);
        }
    }, { passive: false });
    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        lastTouchRelease = performance.now();
        setHolding(false);
    }, { passive: false });

    // ── Camera ────────────────────────────────────────────────────
    let camX = 0;  // world X of left edge of screen

    // ── Game Loop ──────────────────────────────────────────────────
    let lastTime = null;

    function gameLoop(ts) {
        if (!gameRunning) { requestAnimationFrame(gameLoop); return; }

        if (!lastTime) lastTime = ts;
        let dt = Math.min((ts - lastTime) / 1000, 0.05); // cap dt
        lastTime = ts;

        update(dt);
        updateEngineSound();
        render();

        requestAnimationFrame(gameLoop);
    }

    function update(dt) {
        wasOnGround = onGround;

        // ── Physik ────────────────────────────────────────────────────
        const rearWX  = px - AXLE_DIST;
        const frontWX = px + AXLE_DIST;
        const rTerrY  = terrainYAt(rearWX);
        const fTerrY  = terrainYAt(frontWX);

        // Kontaktpunkte der Räder (Winkel berücksichtigt)
        const rContactY = py + Math.sin(angle) * (-AXLE_DIST) + Math.cos(angle) * WHEEL_R;
        const fContactY = py + Math.sin(angle) *   AXLE_DIST  + Math.cos(angle) * WHEEL_R;

        const rOnGround = rContactY >= rTerrY;
        const fOnGround = fContactY >= fTerrY;
        onGround = rOnGround || fOnGround;

        // Sticky ground: kurz über Terrain (bergab) → trotzdem am Boden bleiben
        if (!onGround && vy >= 0) {
            const rAbove = rTerrY - rContactY;
            const fAbove = fTerrY - fContactY;
            if ((rAbove >= 0 && rAbove < 40) || (fAbove >= 0 && fAbove < 40)) {
                onGround = true;
                py += Math.max(0, Math.max(rAbove, fAbove));
                vy = 0;
            }
        }

        if (!onGround) {
            airFrames++;
        }

        if (onGround) {
            const terrAngle = terrainAngleAt(px);

            // Crash nur beim Aufkommen — und nur wenn mind. 10 Frames in der Luft waren
            if (!wasOnGround && airFrames >= 10) {
                let diff = Math.abs(normalizeAngle(angle - terrAngle));
                if (diff > Math.PI) diff = Math.PI * 2 - diff;
                if (diff > CRASH_ANGLE && Math.abs(vx) > 40) { triggerCrash(); return; }
            }
            flipAccum = 0;
            airFrames = 0;

            // Position auf Terrain setzen
            if (rOnGround && fOnGround) {
                py = (rTerrY + fTerrY) / 2 - WHEEL_R;
            } else if (rOnGround) {
                py = rTerrY - WHEEL_R;
            } else {
                py = fTerrY - WHEEL_R;
            }

            // Fahrzeug folgt Terrain-Winkel
            angle  = terrAngle;
            angVel = 0;

            // Sprung ab ~9° bergauf UND genug Geschwindigkeit
            const isRampUp   = terrAngle < -0.15;
            const fastEnough = vx > 180;
            const baseVy     = (isRampUp && fastEnough) ? Math.min(vx * Math.sin(terrAngle), -130) : 0;
            vy = baseVy;

            // Gas / Bremse
            if (holding) {
                vx += (boostActive ? BOOST_THRUST : THRUST) * dt;
            } else {
                vx *= Math.pow(FRICTION, dt * 60);
            }
            vx = Math.min(Math.max(vx, 0), MAX_VX);

        } else {
            // Luft: Schwerkraft (Boost = 15% weniger Gravität + 15% mehr Horizontalgeschwindigkeit)
            vy += GRAVITY * dt;

            // Rotation nur wenn minimal in der Luft (mind. 30px über Terrain)
            const terrYBelow = terrainYAt(px);
            const airHeight = terrYBelow - (py + WHEEL_R);
            const flipSpeed = boostActive ? FLIP_SPEED * 1.5 : FLIP_SPEED;
            angVel = (holding && airHeight > 30) ? -flipSpeed : 0;

            // Flip zählen
            const prevFlipAccum = flipAccum;
            flipAccum += angVel * dt;
            const fullFlips     = Math.floor(Math.abs(flipAccum)     / Math.PI);
            const prevFullFlips = Math.floor(Math.abs(prevFlipAccum) / Math.PI);
            if (fullFlips > prevFullFlips) {
                const n = fullFlips - prevFullFlips;
                flips += n;
                playFlipSound();
                flipsUntilBoost -= n;
                while (flipsUntilBoost <= 0) {
                    boostCharges++;
                    flipsUntilBoost += FLIPS_PER_BOOST;
                    popups.push({ x: px, y: py - 70, text: 'BOOST VERDIENT!', life: 1.4, maxLife: 1.4, color: '#ffcc44' });
                }
                popups.push({ x: px, y: py - 50, text: `FLIP! (${flipsUntilBoost} bis Boost)`, life: 1.4, maxLife: 1.4 });
                updateHUD();
            }
        }

        // Boost timer
        if (boostActive) {
            boostTimer -= dt;
            if (boostTimer <= 0) { boostActive = false; boostTimer = 0; }
        }

        // Wheelie tilt (visuell): Nase hoch wenn Boost + Boden
        const targetTilt = (boostActive && onGround) ? -0.52 : 0;
        wheelieTilt += (targetTilt - wheelieTilt) * Math.min(dt * 10, 1);

        // Integration
        px    += vx    * dt;
        py    += vy    * dt;
        angle += angVel * dt;

        score = flips;
        updateHUD();

        // Camera follows player
        camX = px - canvas.width * 0.30;

        // Crash if fell off bottom of screen
        if (py > canvas.height + 100) {
            triggerCrash();
            return;
        }

        // Crash if went too far left (reversed)
        if (px < camX - 50) {
            triggerCrash();
            return;
        }

        // Update popups
        for (let i = popups.length - 1; i >= 0; i--) {
            popups[i].life -= dt;
            if (popups[i].life <= 0) popups.splice(i, 1);
        }
    }

    function normalizeAngle(a) {
        while (a >  Math.PI) a -= Math.PI * 2;
        while (a < -Math.PI) a += Math.PI * 2;
        return a;
    }

    function playGameOverSound() {
        try {
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            [[494,0],[392,0.22],[330,0.44],[196,0.70]].forEach(([freq, t]) => {
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.connect(gain); gain.connect(ac.destination);
                osc.frequency.value = freq;
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.3, ac.currentTime + t);
                gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.28);
                osc.start(ac.currentTime + t);
                osc.stop(ac.currentTime + t + 0.3);
            });
        } catch(e) {}
    }

    function playFlipSound() {
        try {
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.connect(gain); gain.connect(ac.destination);
            osc.frequency.setValueAtTime(440, ac.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, ac.currentTime + 0.12);
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.25, ac.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
            osc.start(ac.currentTime);
            osc.stop(ac.currentTime + 0.2);
        } catch(e) {}
    }


    // ── Engine / Roll Sound ────────────────────────────────────────
    let engAC = null, engOsc = null, engGain = null;

    function initEngineSound() {
        if (engAC) return;
        try {
            engAC  = new (window.AudioContext || window.webkitAudioContext)();
            engOsc  = engAC.createOscillator();
            engGain = engAC.createGain();
            engOsc.type = 'sawtooth';
            engOsc.frequency.value = 55;
            engGain.gain.value = 0;
            engOsc.connect(engGain);
            engGain.connect(engAC.destination);
            engOsc.start();
        } catch(e) {}
    }

    function updateEngineSound() {
        if (!engAC) return;
        try {
            const t      = engAC.currentTime;
            const active = holding && onGround && vx > 15;
            const freq   = 55 + vx * 0.28;
            engOsc.frequency.setTargetAtTime(freq, t, 0.07);
            const vol = active ? Math.min(0.022, vx / 4800 + 0.005) : 0;
            engGain.gain.setTargetAtTime(vol, t, active ? 0.10 : 0.30);
        } catch(e) {}
    }

    function triggerCrash() {
        gameRunning = false;
        playGameOverSound();
        const finalScore = score;

        setTimeout(async () => {
            document.getElementById('final-score-display').textContent = finalScore;
            document.getElementById('game-over-modal').classList.add('show');
            if (window.storeResult) {
                await window.storeResult(playerName, finalScore);
            }
        }, 400);
    }

    function updateHUD() {
        document.getElementById('hud-score').textContent = flips;
        const progressPct = Math.floor(((FLIPS_PER_BOOST - flipsUntilBoost) / FLIPS_PER_BOOST) * 100);
        document.getElementById('hud-xp-bar').style.width = progressPct + '%';
        document.getElementById('hud-boost-charges').textContent = boostCharges > 0 ? '⚡'.repeat(boostCharges) : '';
        const label = document.getElementById('hud-boost-label');
        label.style.color = boostCharges > 0 ? '#ffcc44' : 'rgba(255,204,68,0.35)';
        label.style.textShadow = boostCharges > 0 ? '0 0 8px rgba(255,204,68,0.8)' : 'none';
    }

    // ── Rendering ──────────────────────────────────────────────────
    function render() {
        const W = canvas.width;
        const H = canvas.height;

        ctx.clearRect(0, 0, W, H);

        // Background
        ctx.fillStyle = '#0a1628';
        ctx.fillRect(0, 0, W, H);

        // Neon grid
        drawGrid();

        // Terrain
        drawTerrain();

        // Vehicle
        drawVehicle();

        // Popups
        drawPopups();
    }

    function drawGrid() {
        const W = canvas.width;
        const H = canvas.height;
        const gridSize = 80;
        const offsetX = (-camX) % gridSize;

        ctx.save();
        ctx.strokeStyle = 'rgba(86,154,169,0.07)';
        ctx.lineWidth = 1;

        // Vertical lines
        for (let x = offsetX; x < W; x += gridSize) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, H);
            ctx.stroke();
        }
        // Horizontal lines
        for (let y = 0; y < H; y += gridSize) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
            ctx.stroke();
        }
        ctx.restore();
    }

    function drawTerrain() {
        const W = canvas.width;
        const H = canvas.height;

        // Find visible segment range via binary search
        const startX = camX - 200;
        const endX   = camX + W + 200;

        let startIdx = Math.max(0, findIdx(startX) - 1);
        let endIdx   = Math.min(terrain.length - 1, findIdx(endX) + 2);

        if (startIdx >= endIdx) return;

        ctx.save();

        // Glow shadow for terrain line
        ctx.shadowColor = '#569aa9';
        ctx.shadowBlur  = 10;

        // Terrain line
        ctx.beginPath();
        ctx.strokeStyle = '#569aa9';
        ctx.lineWidth   = 3;

        let first = true;
        for (let i = startIdx; i <= endIdx; i++) {
            const t = terrain[i];
            if (!t) continue;
            const sx = t.x - camX;
            const sy = t.y;
            if (first) { ctx.moveTo(sx, sy); first = false; }
            else        ctx.lineTo(sx, sy);
        }
        ctx.stroke();

        // Red glow on pit edges (segments that drop far below screen)
        for (let i = startIdx; i < endIdx; i++) {
            const a = terrain[i], b = terrain[i + 1];
            if (!a || !b) continue;
            if (a.y > H + 50 || b.y > H + 50) {
                ctx.save();
                ctx.strokeStyle = '#ff3333';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur  = 18;
                ctx.lineWidth   = 2;
                ctx.beginPath();
                ctx.moveTo(a.x - camX, Math.min(a.y, H));
                ctx.lineTo(b.x - camX, Math.min(b.y, H));
                ctx.stroke();
                ctx.restore();
            }
        }

        ctx.shadowBlur = 0;

        // Dark fill below terrain
        ctx.beginPath();
        const firstT = terrain[startIdx];
        const lastT  = terrain[endIdx];
        ctx.moveTo(firstT.x - camX, firstT.y);
        for (let i = startIdx + 1; i <= endIdx; i++) {
            const t = terrain[i];
            if (!t) continue;
            ctx.lineTo(t.x - camX, t.y);
        }
        ctx.lineTo(lastT.x - camX, H + 50);
        ctx.lineTo(firstT.x - camX, H + 50);
        ctx.closePath();
        ctx.fillStyle = 'rgba(10,22,40,0.85)';
        ctx.fill();

        ctx.restore();
    }

    function drawVehicle() {
        const sx   = px - camX;
        const sy   = py;
        const vr   = 8;    // wy+vr = WHEEL_R=10
        const wy   = 2;    // wheel center y
        const tx1  = -13;  // rear truck x
        const tx2  =  13;  // front truck x
        const wrot = -px / WHEEL_R;
        const C  = boostActive ? '#ffcc44' : '#00f0ff';
        const CG = boostActive ? '#ffaa00' : '#00f0ff';

        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(angle + wheelieTilt);
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        // deck shape with nose/tail kick
        const dL  = 21;
        const k   = 2;
        const kx  = dL * 0.58;
        const bot = -4;
        const top = -8;
        const far = -11;

        // side face
        ctx.shadowColor = CG; ctx.shadowBlur = boostActive ? 18 : 10;
        ctx.beginPath();
        ctx.moveTo(-dL, bot-k); ctx.lineTo(-kx, bot); ctx.lineTo(kx, bot); ctx.lineTo(dL, bot-k);
        ctx.lineTo(dL, top-k);  ctx.lineTo(kx, top);  ctx.lineTo(-kx, top); ctx.lineTo(-dL, top-k);
        ctx.closePath();
        ctx.fillStyle = 'rgba(0,35,50,0.95)'; ctx.fill();
        ctx.strokeStyle = C; ctx.lineWidth = 1.5; ctx.stroke();

        // top surface (3px depth → minimal 3D)
        ctx.shadowColor = CG; ctx.shadowBlur = 14;
        ctx.beginPath();
        ctx.moveTo(-dL,   top-k); ctx.lineTo(-kx,   top); ctx.lineTo(kx,   top); ctx.lineTo(dL,   top-k);
        ctx.lineTo(dL-1,  far-k); ctx.lineTo(kx-1,  far); ctx.lineTo(-kx+1, far); ctx.lineTo(-dL+1, far-k);
        ctx.closePath();
        const tg = ctx.createLinearGradient(0, far, 0, top);
        tg.addColorStop(0, 'rgba(0,240,255,0.30)'); tg.addColorStop(1, 'rgba(0,80,105,0.12)');
        ctx.fillStyle = tg; ctx.fill();
        ctx.strokeStyle = C; ctx.lineWidth = 1.2; ctx.stroke();

        // gloss line
        ctx.shadowBlur = 0; ctx.strokeStyle = 'rgba(150,255,255,0.45)'; ctx.lineWidth = 0.9;
        ctx.beginPath();
        ctx.moveTo(-kx+5, (top+far)/2 - 0.5); ctx.lineTo(kx-5, (top+far)/2 - 0.5);
        ctx.stroke();

        // trucks
        ctx.shadowColor = '#446677'; ctx.shadowBlur = 4;
        ctx.strokeStyle = '#336677'; ctx.lineWidth = 2.5;
        [tx1, tx2].forEach(tx => {
            ctx.beginPath(); ctx.moveTo(tx-5, bot); ctx.lineTo(tx+5, bot); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(tx, bot); ctx.lineTo(tx, wy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(tx-5, wy); ctx.lineTo(tx+5, wy); ctx.stroke();
        });

        // far wheels (behind, subtle ovals)
        [tx1, tx2].forEach(tx => {
            ctx.save();
            ctx.translate(tx, wy-5); ctx.scale(1, 0.38);
            ctx.beginPath(); ctx.arc(0, 0, vr-1, 0, Math.PI*2);
            ctx.fillStyle = '#000608'; ctx.fill();
            ctx.shadowColor = CG; ctx.shadowBlur = 5;
            ctx.strokeStyle = 'rgba(0,240,255,0.45)'; ctx.lineWidth = 1.3; ctx.stroke();
            ctx.restore();
        });

        // near wheels
        [tx1, tx2].forEach(tx => {
            ctx.save(); ctx.translate(tx, wy);
            const rg = ctx.createRadialGradient(-vr*.28,-vr*.3,0,0,0,vr);
            rg.addColorStop(0,'#0e2830'); rg.addColorStop(0.6,'#020c10'); rg.addColorStop(1,'#000103');
            ctx.beginPath(); ctx.arc(0,0,vr,0,Math.PI*2);
            ctx.fillStyle = rg; ctx.fill();
            ctx.shadowColor = CG; ctx.shadowBlur = 14;
            ctx.strokeStyle = C; ctx.lineWidth = 2; ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(0,170,200,0.3)'; ctx.lineWidth = 0.8;
            ctx.beginPath(); ctx.arc(0,0,vr-3,0,Math.PI*2); ctx.stroke();
            ctx.strokeStyle = 'rgba(0,150,180,0.45)'; ctx.lineWidth = 1.1;
            for (let i=0;i<3;i++) {
                const a = wrot + i*Math.PI*2/3;
                ctx.beginPath();
                ctx.moveTo(Math.cos(a)*(vr-2), Math.sin(a)*(vr-2));
                ctx.lineTo(-Math.cos(a)*(vr-2),-Math.sin(a)*(vr-2));
                ctx.stroke();
            }
            const hg = ctx.createRadialGradient(-0.8,-0.8,0,0,0,2.5);
            hg.addColorStop(0,'#aaffff'); hg.addColorStop(1,'#007a88');
            ctx.beginPath(); ctx.arc(0,0,2.5,0,Math.PI*2);
            ctx.fillStyle = hg; ctx.shadowColor = '#fff'; ctx.shadowBlur = 10; ctx.fill();
            ctx.restore();
        });


        ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    function drawPopups() {
        for (const p of popups) {
            const t = p.life / p.maxLife;
            const alpha = Math.min(1, t * 2);
            const sy = p.y - camX * 0 - (p.maxLife - p.life) * 40;
            const sx = p.x - camX;

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'center';
            const col = p.color || '#00ffaa';
            ctx.fillStyle = col;
            ctx.shadowColor = col;
            ctx.shadowBlur  = 12;
            ctx.fillText(p.text, sx, sy);
            ctx.restore();
        }
    }

    // ── Name Modal Logic ───────────────────────────────────────────
    const nameModal  = document.getElementById('name-modal');
    const nameInput  = document.getElementById('name-input');
    const nameSubmit = document.getElementById('name-submit');

    function submitName() {
        const val = nameInput.value.trim();
        if (val.length === 0) {
            nameInput.classList.add('input-error');
            setTimeout(() => nameInput.classList.remove('input-error'), 400);
            return;
        }
        playerName = val;
        nameModal.classList.remove('show');
        initGame();
    }

    nameSubmit.addEventListener('click', submitName);
    nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitName(); });
    nameInput.focus();

    function doRestart() {
        document.getElementById('game-over-modal').classList.remove('show');
        initGame();
    }

    document.getElementById('restart-btn').addEventListener('click', doRestart);

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !gameRunning &&
            document.getElementById('game-over-modal').classList.contains('show')) {
            e.preventDefault();
            doRestart();
        }
    });

    // ── Start loop ─────────────────────────────────────────────────
    requestAnimationFrame(gameLoop);

})();
</script>
</body>
