<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RIDER</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp, doc, updateDoc, increment }
            from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGxWCAMbglUMjHeKRdeniS4TcA5oCAx1c",
            authDomain: "pixels-e2f82.firebaseapp.com",
            projectId: "pixels-e2f82",
            storageBucket: "pixels-e2f82.firebasestorage.app",
            messagingSenderId: "311496840709",
            appId: "1:311496840709:web:3a94601ef40cbd0c946e6c"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        async function storeResult(name, points) {
            try {
                if (name.trim().toLowerCase() !== 'test') {
                    await addDoc(collection(db, 'red-pixel'), {
                        name, points, game: 'RIDER', created: serverTimestamp()
                    });
                    // Save gems + quest progress
                    const uqs = await getDocs(query(collection(db, 'users'), where('nameLower', '==', name.toLowerCase())));
                    if (!uqs.empty) {
                        const collectedGems = window._gemsCollected || 0;
                        const completedLoops = window._loopsCompleted || 0;
                        await updateDoc(doc(db, 'users', uqs.docs[0].id), {
                            'quests.r_20flips':  increment(points),
                            'quests.r_20loops':  increment(completedLoops),
                            'quests.r_10games':  increment(1),
                            gems: increment(collectedGems)
                        });
                    }
                }
            } catch(e) { console.error('Save error:', e); }
            await loadLeaderboard();
        }

        async function loadLeaderboard() {
            const tbody = document.getElementById('lb-body');
            if (!tbody) return;
            tbody.innerHTML = '<tr><td colspan="3" style="opacity:.5">Laden…</td></tr>';
            try {
                const qs = await getDocs(query(collection(db, 'red-pixel'), where('game', '==', 'RIDER')));
                const medals = ['🥇','🥈','🥉'];
                const filtered = [];
                qs.forEach(doc => {
                    const d = doc.data();
                    if (d.name?.trim().toLowerCase() !== 'test' && d.points >= 15) filtered.push(d);
                });
                filtered.sort((a, b) => b.points - a.points);

                // Persönlicher Highscore
                const currentUser = (() => { try { return JSON.parse(localStorage.getItem('1100px_user')); } catch(e) { return null; } })();
                const pbEl = document.getElementById('personal-best-display');
                if (currentUser && pbEl) {
                    const myBest = filtered.filter(d => d.name === currentUser.name).reduce((max, d) => Math.max(max, d.points), 0);
                    pbEl.textContent = myBest > 0 ? `Dein Rekord: ${myBest} Flips` : '';
                }

                tbody.innerHTML = '';
                filtered.forEach((d, i) => {
                    const tr = document.createElement('tr');
                    const ts = d.created;
                    let dateStr = '';
                    if (ts) {
                        const dt = ts.toDate ? ts.toDate() : new Date(ts);
                        dateStr = `${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}.${dt.getFullYear()}`;
                    }
                    const isMe = currentUser && d.name === currentUser.name;
                    tr.style.background = isMe ? 'rgba(255,68,68,0.08)' : '';
                    tr.innerHTML = `<td>${i < 3 ? medals[i] : i+1}</td><td style="${isMe ? 'color:#ff8844;font-weight:700' : ''}">${d.name}</td><td style="color:#ff8844;font-weight:bold;text-align:center">${d.points}</td><td style="color:rgba(255,255,255,0.35);font-size:0.78rem;text-align:right;white-space:nowrap">${dateStr}</td>`;
                    tbody.appendChild(tr);
                });
                if (filtered.length === 0) tbody.innerHTML = '<tr><td colspan="4" style="opacity:.5">Noch keine Einträge</td></tr>';
            } catch(e) {
                console.error('Leaderboard Fehler:', e);
                tbody.innerHTML = `<tr><td colspan="3" style="opacity:.5;font-size:0.7rem">${e.message}</td></tr>`;
            }
        }

        window.storeResult    = storeResult;
        window.loadLeaderboard = loadLeaderboard;
        window.getUser = getUser;
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a1628;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        /* ── Header ── */
        #hud-gems {
            font-size: 1rem;
            font-weight: 700;
            color: #00eeff;
            text-shadow: 0 0 10px rgba(0,220,255,0.8);
            letter-spacing: 1px;
            min-width: 80px;
        }

        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(10, 22, 40, 0.97);
            border-bottom: 1px solid rgba(255, 60, 60, 0.4);

        }
        .header h2 { margin: 0; font-size: 1.1rem; text-align: center; }
        .hud-score {

            font-size: 1.3rem;

        }
        .hud-title {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;

        .hud-flips {

            text-transform: uppercase;

            min-width: 130px;
            text-align: right;
            text-shadow: 0 0 8px rgba(86,154,169,0.5);
        }
        .hud-level {
            display: flex;
            flex-direction: column;

        }

        }
        .hud-xp-bar-wrap {
            width: 110px;
            height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;

        }
        .hud-xp-bar {
            height: 100%;

        }

        /* ── Hint ── */
        #hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.38);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            transition: opacity 1.2s ease;
            z-index: 100;
            white-space: nowrap;
        }
        #hint.fade { opacity: 0; }

        /* ── Modals ── */
        #name-modal, #game-over-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(7px);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            padding: 5vh 16px;
        }
        #name-modal.show, #game-over-modal.show { display: flex; }

        #game-over-modal.show {
            animation: screenFlash 0.5s ease-out forwards;
        }
        @keyframes screenFlash {
            0%   { background: rgba(200,0,0,0.6); }
            100% { background: rgba(0,0,0,0.82); }
        }
        #game-over-modal.show .modal-box h1 {
            animation: gameOverFlicker 0.09s ease-in-out 0.25s 7;
        }
        @keyframes gameOverFlicker {
            0%,100% { opacity:1; text-shadow: 0 0 25px rgba(255,68,68,0.7); }
            50%     { opacity:0.1; text-shadow: none; }
        }

        .modal-box {
            background: linear-gradient(135deg, #0d1f33 0%, #1a0d20 100%);

            padding: 50px 70px;
            text-align: center;
            box-shadow: 0 0 70px rgba(255,68,68,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
            max-width: 90vw;
        }
        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        .modal-box h1 {
            color: #ff4444;
            font-size: 2.8rem;
            margin: 0 0 8px;
            text-shadow: 0 0 25px rgba(255,68,68,0.7);

            letter-spacing: 6px;
        }
        .modal-subtitle {
            color: rgba(255,255,255,0.45);
            font-size: 0.78rem;
            text-transform: uppercase;

            margin: 0 0 22px;
        }
        .modal-box .final-score {
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
            margin: 20px 0 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .modal-box .final-score span {
            color: #ff8844;
            font-size: 3rem;
            font-weight: bold;

            margin-top: 8px;
            text-shadow: 0 0 18px rgba(255,136,68,0.6);
        }
        .modal-box input[type="text"] {
            display: block;
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,68,68,0.35);
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;

            outline: none;

        .modal-box input[type="text"]:focus {
            border-color: rgba(255,68,68,0.75);

            border-color: #ff4444;

            animation: inputShake 0.35s ease;
        }
        @keyframes inputShake {
            0%,100% { transform: translateX(0); }
            25%     { transform: translateX(-7px); }
            75%     { transform: translateX(7px); }
        }
        .modal-buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-top: 4px;
        }
        .modal-box button {
            color: white;
            border: none;
            padding: 13px 30px;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            transition: all 0.2s;

        .btn-primary {
            background: linear-gradient(135deg, #ff4444, #cc2222);

        }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18) !important;

        .btn-secondary:hover {
            background: rgba(255,255,255,0.15) !important;
            transform: translateY(-2px);

        .modal-box button:active { transform: translateY(0); }

        #leaderboard tbody tr td {
            padding: 5px 6px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.85);
        }
        #leaderboard tbody tr:first-child td { color: #ffcc44; }

        @media (max-width: 431px) {
            .modal-box { padding: 35px 25px; }
            .modal-box h1 { font-size: 2rem; letter-spacing: 3px; }
            .modal-box .final-score span { font-size: 2.2rem; }
            .hud-title { display: none; }
        }
    </style>
</head>
<body>

<!-- Canvas -->
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div class="header">

</div>

<!-- Name Modal -->

        <h1>RIDER</h1>

</div>

<!-- Game Over Modal -->
<div id="game-over-modal">
    <div class="modal-box" style="max-height:90vh;overflow-y:auto;width:min(420px,92vw)">
        <h1>Crash!</h1>
        <p class="final-score">Deine Flips<br><span id="final-score-display">0</span></p>
        <p id="personal-best-display" style="font-size:0.8rem;color:rgba(255,255,255,0.4);margin:-8px 0 12px;letter-spacing:1px"></p>

        <table style="width:100%;border-collapse:collapse;margin:18px 0 6px;font-size:0.9rem">

    </div>
</div>

<!-- Game Script -->
<script>
(function() {
    "use strict";

    // ── Active Skin ────────────────────────────────────────────────
    const _SKIN_PROPS = {
        default:   { g:1,    v:1,    f:1,                        color:'#00aaff', glow:'#0055ff' },
        moon:      { g:0.78, v:1,    f:1,                        color:'#aa44ff', glow:'#7700cc' },
        heavy:     { g:1.28, v:1,    f:1,                        color:'#ff6600', glow:'#cc3300' },
        turbo:     { g:1,    v:1.12, f:1,                        color:'#ff2244', glow:'#aa0022' },
        flipper:   { g:1,    v:1,    f:1.2,                      color:'#00ff88', glow:'#00aa55' },
        rocket:    { g:1,    v:1,    f:1,    t:1.3,              color:'#ff5500', glow:'#cc2200' },
        neon:      { g:1,    v:1,    f:1,    bd:1.5,             color:'#ff00dd', glow:'#aa0099' },
        phantom:   { g:1,    v:1,    f:1,    fr:0.985,           color:'#aaddff', glow:'#4488bb' },
        berserker: { g:1,    v:1,    f:1,    fb:0.6,             color:'#ff2200', glow:'#880000' },
        eagle:     { g:1,    v:1,    f:1,    bt:1.4,             color:'#44aaff', glow:'#0066cc' },
        shadow:    { g:0.88, v:1.08, f:1,                        color:'#9900ff', glow:'#5500aa' },
        crusher:   { g:1.2,  v:1,    f:1.15,                     color:'#ff8800', glow:'#cc5500' },
        storm:     { g:1,    v:1,    f:1,    t:1.15, bd:1.25,    color:'#00ccff', glow:'#0077aa' },
    };
    const _CUSTOM_EFFECTS = {
        gravDown:   { g:0.72 },
        gravUp:     { g:1.38 },
        speed:      { v:1.22 },
        flip:       { f:1.32 },
        thrust:     { t:1.25 },
        boostDur:   { bd:1.45 },
        quickBoost: { fb:0.6  },
        boostStr:   { bt:1.35 },
    };
    const _skinId = (() => { try { return localStorage.getItem('1100px_activeSkin') || 'default'; } catch { return 'default'; } })();
    let _sp;
    if (_skinId === 'custom') {
        const _cp = (() => { try { return JSON.parse(localStorage.getItem('1100px_customProps') || '[]'); } catch { return []; } })();
        let g=1, v=1, f=1, t=1, bd=1, bt=1, fb=1, fr=undefined;
        _cp.forEach(p => {
            const e = _CUSTOM_EFFECTS[p]; if (!e) return;
            if (e.g)  g  *= e.g;  if (e.v)  v  *= e.v;  if (e.f)  f  *= e.f;
            if (e.t)  t  *= e.t;  if (e.bd) bd *= e.bd; if (e.bt) bt *= e.bt;
            if (e.fb) fb *= e.fb; if (e.fr !== undefined) fr = e.fr;
        });
        _sp = { g, v, f, t, bd, bt, fb, fr, color:'#ffcc00', glow:'#cc8800' };
    } else {
        _sp = _SKIN_PROPS[_skinId] || _SKIN_PROPS.default;
    }
    const SKIN_COLOR = _sp.color;
    const SKIN_GLOW  = _sp.glow;

    // ── Physics Constants ──────────────────────────────────────────
    const GRAVITY         = 600  * (_sp.g  || 1);
    const THRUST          = 400  * (_sp.t  || 1);
    const MAX_VX          = 650  * (_sp.v  || 1);
    const FLIP_SPEED      = Math.PI * 2.4 * (_sp.f || 1);
    const FRICTION        = _sp.fr !== undefined ? _sp.fr : 0.97;
    const CRASH_ANGLE     = 1.6;
    const AXLE_DIST       = 18;
    const WHEEL_R         = 10;

    const BOOST_THRUST    = 1100 * (_sp.bt || 1);
    const BOOST_DURATION  = 1.4  * (_sp.bd || 1);
    const RELEASE_TAP_MS  = 280;

    const FLIPS_PER_BOOST = Math.max(3, Math.round(10 * (_sp.fb || 1)));

    // ── Canvas setup ───────────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');

    // ── Particles ──────────────────────────────────────────────────
    let particles = [];

    function spawnParticles(x, y, count, color, speed, life) {
        for (let i = 0; i < count; i++) {
            const a = Math.random() * Math.PI * 2;
            const s = speed * (0.4 + Math.random() * 0.8);
            particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - speed * 0.3,
                life, maxLife: life, color, size: 1.5 + Math.random() * 2.5 });
        }
    }

    function spawnDust(x, y) {
        for (let i = 0; i < 6; i++) {
            particles.push({ x, y, vx: (Math.random() - 0.6) * 40, vy: -20 - Math.random() * 40,
                life: 0.4 + Math.random() * 0.3, maxLife: 0.7, color: 'rgba(86,154,169,', size: 3 + Math.random() * 3 });
        }
    }

    function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += 200 * dt;
            p.life -= dt;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    function drawGems() {
        const now = performance.now() / 1000;
        const W = canvas.width;
        for (const g of gemObjects) {
            if (g.collected) continue;
            const sx = g.x - camX;
            if (sx < -30 || sx > W + 30) continue;
            const bob = Math.sin(now * 2.5 + g.x * 0.01) * 3;
            ctx.save();
            ctx.translate(sx, g.y + bob);
            // glow
            ctx.shadowColor = '#00eeff';
            ctx.shadowBlur = 14;
            // diamond shape
            ctx.beginPath();
            ctx.moveTo(0, -9);
            ctx.lineTo(6, 0);
            ctx.lineTo(0, 7);
            ctx.lineTo(-6, 0);
            ctx.closePath();
            const grad = ctx.createLinearGradient(0, -9, 0, 7);
            grad.addColorStop(0, '#aaffff');
            grad.addColorStop(0.4, '#00ccff');
            grad.addColorStop(1, '#0066cc');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(180,255,255,0.7)';
            ctx.lineWidth = 0.8;
            ctx.stroke();
            // shine
            ctx.beginPath();
            ctx.moveTo(-2, -6);
            ctx.lineTo(2, -3);
            ctx.strokeStyle = 'rgba(255,255,255,0.6)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
        }
    }

    function drawParticles() {
        for (const p of particles) {
            const t = p.life / p.maxLife;
            ctx.save();
            ctx.globalAlpha = t * t;
            ctx.shadowBlur = 6;
            ctx.shadowColor = p.color.startsWith('rgba') ? p.color : p.color;
            ctx.fillStyle = p.color.startsWith('rgba') ? p.color + t + ')' : p.color;
            ctx.beginPath();
            ctx.arc(p.x - camX, p.y, p.size * t, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // ── Screen shake ───────────────────────────────────────────────
    let shakeAmt = 0;

    function triggerShake(amount) { shakeAmt = amount; }

    // ── Stars ──────────────────────────────────────────────────────
    const stars = Array.from({ length: 60 }, () => ({
        x: Math.random(), y: Math.random() * 0.65,
        r: 0.4 + Math.random() * 1.1, twinkle: Math.random() * Math.PI * 2
    }));

    // ── Nebulae (fixed to screen, fade in/out) ─────────────────────
    const nebulae = [
        { x: 0.15, y: 0.18, rx: 0.22, ry: 0.12, color: '86,60,180', phase: 0.0 },
        { x: 0.72, y: 0.28, rx: 0.18, ry: 0.10, color: '30,100,180', phase: 2.1 },
        { x: 0.45, y: 0.10, rx: 0.25, ry: 0.09, color: '160,30,120', phase: 4.3 },
        { x: 0.85, y: 0.12, rx: 0.14, ry: 0.08, color: '40,140,160', phase: 1.5 },
    ];

    function resizeCanvas() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ── Game state ─────────────────────────────────────────────────
    let playerName = '';
    let gameRunning = false;
    let gems = 0;
    let gemObjects = []; // { x, y, collected }
    let loopsCompleted = 0;

    let vx, vy, angle, angVel;
    let px, py;          // position of vehicle center
    let onGround;
    let wasOnGround;
    let boostActive, boostTimer, wheelieTilt;
    let activeLoopIdx, loopAngle, loopSpeed, loopCooldown;
    let boostCharges, flipsUntilBoost;
    let lastSpaceRelease = 0;
    let lastTouchRelease = 0;
    let airFrames;       // frames seit dem Abheben
    let score, flips;
    let flipAccum;       // accumulated rotation for counting flips
    let holding;

    // Popup texts
    let popups = [];

    // ── Terrain Generation ─────────────────────────────────────────
    let terrain = [];   // array of {x, y}, variable spacing
    let loops   = [];   // array of {cx, cy, R} — separate circular track objects

    function generateTerrain() {
        terrain = [];
        loops   = [];
        const H      = canvas.height;
        const mobile = window.innerWidth < 600;
        const minY = H * (mobile ? 0.28 : 0.18);
        const maxY = H * (mobile ? 0.90 : 0.82);
        const base = H * (mobile ? 0.75 : 0.63);

        const pt = (x, y) => terrain.push({ x, y: Math.max(minY, Math.min(maxY, y)) });

        // Underground edge + flat start
        pt(-1000, base + 600);
        pt(-1000, base);
        pt(0,     base);
        pt(500,   base);

        let x = 500;
        let y = base;

        for (let seg = 0; seg < 120; seg++) {
            const diff = Math.min(seg / 50, 1);
            const r    = Math.random();

            if (r < 0.08) {
                // ── Flat ──────────────────────────────────────────
                const w = 180 + Math.random() * 220;
                pt(x, y); pt(x + w, y);
                x += w;

            } else if (r < 0.14) {
                // ── Lange Auffahrt (langer diagonaler Anstieg) ────
                // Sanft ansteigend → langer flacher Gipfel → Abstieg
                const riseW  = 200 + Math.random() * 180;
                const flatW  = 80  + Math.random() * 120;
                const fallW  = 80  + Math.random() * 100;
                const h      = 80  + Math.random() * 100 * diff;
                const steps  = 8;
                pt(x, y);
                for (let s = 1; s <= steps; s++) {
                    const t = s / steps;
                    pt(x + t * riseW, y - Math.sin(t * Math.PI * 0.5) * h);
                }
                pt(x + riseW + flatW, y - h);
                pt(x + riseW + flatW + fallW, y);
                x += riseW + flatW + fallW;

            } else if (r < 0.22) {
                // ── Sanfte Wellen (2–4 Hügel) ─────────────────────
                const count = 2 + Math.floor(Math.random() * 3);
                for (let i = 0; i < count; i++) {
                    const w = 160 + Math.random() * 180;
                    const h = 25 + Math.random() * 65 * diff;
                    pt(x,            y);
                    pt(x + w * 0.25, y - h * 0.6);
                    pt(x + w * 0.5,  y - h);
                    pt(x + w * 0.75, y - h * 0.6);
                    pt(x + w,        y);
                    x += w;
                }

            } else if (r < 0.31) {
                // ── Kicker-Rampen mit Abstand ──────────────────────
                const count = 1 + Math.floor(Math.random() * 3 * diff + 1);
                for (let i = 0; i < count; i++) {
                    const gap   = 100 + Math.random() * 140;
                    const rampW = 55  + Math.random() * 55;
                    const rampH = 70  + Math.random() * 110 * diff;
                    const landW = 80  + Math.random() * 80;
                    pt(x,                       y);
                    pt(x + gap,                 y);
                    pt(x + gap + rampW,         y - rampH);
                    pt(x + gap + rampW + landW, y);
                    x += gap + rampW + landW;
                }

            } else if (r < 0.40) {
                // ── Spitze Dreiecks-Gipfel ─────────────────────────
                const count = 1 + Math.floor(Math.random() * 2);
                for (let i = 0; i < count; i++) {
                    const bw = 100 + Math.random() * 120;
                    const h  = 70  + Math.random() * 110 * diff;
                    pt(x,          y);
                    pt(x + bw / 2, y - h);
                    pt(x + bw,     y);
                    x += bw + 60;
                }

            } else if (r < 0.46) {
                // ── Zacken / Zähne ────────────────────────────────
                const count = 3 + Math.floor(Math.random() * 5);
                for (let i = 0; i < count; i++) {
                    const tw = 35 + Math.random() * 50;
                    const th = 20 + Math.random() * 55 * diff;
                    pt(x,          y);
                    pt(x + tw / 2, y - th);
                    pt(x + tw,     y);
                    x += tw;
                }

            } else if (r < 0.51) {
                // ── Tal (V / U Form) ──────────────────────────────
                const w = 180 + Math.random() * 200;
                const d = 60  + Math.random() * 100 * diff;
                pt(x,           y);
                pt(x + w * 0.3, y + d * 0.7);
                pt(x + w * 0.5, y + d);
                pt(x + w * 0.7, y + d * 0.7);
                pt(x + w,       y);
                x += w;

            } else if (r < 0.56) {
                // ── Plateau (erhöhter flacher Abschnitt) ──────────
                const upW   = 60  + Math.random() * 60;
                const flatW = 120 + Math.random() * 160;
                const downW = 60  + Math.random() * 60;
                const h     = 60  + Math.random() * 90 * diff;
                pt(x,                       y);
                pt(x + upW,                 y - h);
                pt(x + upW + flatW,         y - h);
                pt(x + upW + flatW + downW, y);
                x += upW + flatW + downW;

            } else if (r < 0.62) {
                // ── Runde Schanze (Sinus-Kurve) ───────────────────
                const count = 1 + Math.floor(Math.random() * 2);
                for (let i = 0; i < count; i++) {
                    const gap   = 80  + Math.random() * 120;
                    const w     = 140 + Math.random() * 140;
                    const h     = 55  + Math.random() * 100 * diff;
                    const steps = 10;
                    pt(x, y);
                    pt(x + gap, y);
                    for (let s = 0; s <= steps; s++) {
                        const t = s / steps;
                        pt(x + gap + t * w, y - Math.sin(t * Math.PI) * h);
                    }
                    x += gap + w;
                }

            } else if (r < 0.67) {
                // ── Viertelkreis-Schanze ───────────────────────────
                const R     = 70 + Math.random() * 90 * diff;
                const gap   = 80 + Math.random() * 100;
                const steps = 9;
                const cx    = x + gap;
                const cy    = y - R;
                pt(x, y);
                pt(x + gap, y);
                for (let s = 0; s <= steps; s++) {
                    const theta = Math.PI / 2 * (1 - s / steps);
                    pt(cx + R * Math.cos(theta), cy + R * Math.sin(theta));
                }
                pt(x + gap + R + 20,  y - R);
                pt(x + gap + R + 100, y);
                x += gap + R + 100;

            } else if (r < 0.72) {
                // ── Kreissenke (runde Mulde nach unten) ───────────
                const count = 1 + Math.floor(Math.random() * 2);
                for (let i = 0; i < count; i++) {
                    const R     = 40 + Math.random() * 50;
                    const gap   = 50 + Math.random() * 80;
                    const lcx   = x + gap + R;
                    const lcy   = y;
                    const steps = 12;
                    pt(x, y);
                    pt(x + gap, y);
                    for (let s = 0; s <= steps; s++) {
                        const theta = Math.PI * (1 - s / steps);
                        pt(lcx + R * Math.cos(theta), lcy + R * Math.sin(theta));
                    }
                    x += gap + 2 * R;
                }

            } else if (r < 0.78) {
                // ── Looping (durchfahrbar) ─────────────────────────
                const R        = 75 + Math.random() * 40 * (0.5 + diff);
                const approach = 80 + Math.random() * 100;
                const cx       = x + approach + R;
                const cy       = y - R;
                const halfGap  = 0.3 + Math.random() * 0.1;
                loops.push({ cx, cy, R, halfGap, gaps: [] });
                pt(x, y);
                pt(cx + R + 80, y);
                x = cx + R + 80;

            } else if (r < 0.84) {
                // ── Mogul-Strecke (schnelle runde Buckel) ─────────
                const count = 5 + Math.floor(Math.random() * 7);
                for (let i = 0; i < count; i++) {
                    const w     = 40 + Math.random() * 45;
                    const h     = 18 + Math.random() * 32 * (0.4 + diff * 0.6);
                    const steps = 6;
                    for (let s = 0; s <= steps; s++) {
                        const t = s / steps;
                        pt(x + t * w, y - Math.sin(t * Math.PI) * h);
                    }
                    x += w;
                }

            } else if (r < 0.89) {
                // ── S-Kurven-Schanze (Curl / Haken oben) ──────────
                // Anlauf → steile Rampe hoch → konkave Haken-Kurve → Abstieg
                const gap   = 80  + Math.random() * 80;
                const rampW = 55  + Math.random() * 45;
                const rampH = 85  + Math.random() * 70 * diff;
                const dipR  = 35  + Math.random() * 30;
                const steps = 10;
                pt(x, y);
                pt(x + gap,         y);
                pt(x + gap + rampW, y - rampH);   // Rampenspitze
                // konkaver Haken an der Spitze (Viertelkreis-Kurve nach vorne-unten)
                const hx = x + gap + rampW + dipR;
                const hy = y - rampH;
                for (let s = 0; s <= steps; s++) {
                    const theta = Math.PI - (s / steps) * (Math.PI / 2); // 180°→90°
                    pt(hx + dipR * Math.cos(theta), hy + dipR * Math.sin(theta));
                }
                pt(x + gap + rampW + dipR + 90, y);
                x += gap + rampW + dipR + 90;

            } else if (r < 0.94) {
                // ── Steile Zickzack-Rampen ────────────────────────
                // Wechselnde steile Auf- und Abfahrten wie auf dem Bild
                const count = 2 + Math.floor(Math.random() * 3);
                for (let i = 0; i < count; i++) {
                    const w  = 70  + Math.random() * 60;
                    const h  = 75  + Math.random() * 90 * diff;
                    const g  = 30  + Math.random() * 50;
                    pt(x, y);
                    pt(x + g,         y);          // kurzer Anlauf
                    pt(x + g + w * 0.35, y - h);   // steile Auffahrt
                    pt(x + g + w,     y);           // steile Abfahrt
                    x += g + w;
                }

            } else if (r < 0.91) {
                // ── Doppelte Halfpipe (2 Mulden hintereinander) ───
                const count = 2;
                for (let i = 0; i < count; i++) {
                    const R     = 55 + Math.random() * 55 * diff;
                    const gap   = 30 + Math.random() * 50;
                    const lcx   = x + gap + R;
                    const lcy   = y;
                    const steps = 14;
                    pt(x, y);
                    pt(x + gap, y);
                    for (let s = 0; s <= steps; s++) {
                        const theta = Math.PI * (1 - s / steps);
                        pt(lcx + R * Math.cos(theta), lcy + R * Math.sin(theta));
                    }
                    x += gap + 2 * R + 15;
                }
                pt(x + 60, y);
                x += 60;

            } else if (r < 0.94) {
                // ── Sanfte Doppelmulde (zwei weiche U-Täler) ──────
                for (let i = 0; i < 2; i++) {
                    const w = 140 + Math.random() * 100;
                    const d = 35  + Math.random() * 50 * diff;
                    pt(x, y);
                    for (let s = 0; s <= 8; s++) {
                        const t = s / 8;
                        pt(x + t * w, y + Math.sin(t * Math.PI) * d);
                    }
                    x += w + 20;
                }
                pt(x, y);

            } else if (r < 0.97) {
                // ── Treppenstufen (gestaffelte Plateaus) ──────────
                {
                    const numSteps = 2 + Math.floor(Math.random() * 3);
                    const dir      = Math.random() < 0.5 ? 1 : -1;
                    const stepH    = 40 + Math.random() * 40 * diff;
                    const stepW    = 80 + Math.random() * 80;
                    pt(x, y);
                    for (let i = 0; i < numSteps; i++) {
                        const sx = x + i * (stepW + 30);
                        pt(sx,         y - dir * i * stepH);
                        pt(sx + 25,    y - dir * (i + 1) * stepH);
                        pt(sx + stepW, y - dir * (i + 1) * stepH);
                    }
                    x += numSteps * (stepW + 30);
                    y  = Math.max(minY, Math.min(maxY, y - dir * numSteps * stepH));
                    pt(x, y);
                }

            } else if (r < 0.99) {
                // ── Rampen-Loop (Auffahrt + Loop als separates Objekt) ─
                {
                    const gap   = 60  + Math.random() * 80;
                    const rampW = 60  + Math.random() * 50;
                    const rampH = 55  + Math.random() * 45 * diff;
                    const R     = 60 + Math.random() * 30 * (0.5 + diff);
                    // Rampe als Terrain
                    pt(x, y);
                    pt(x + gap,         y);
                    pt(x + gap + rampW, y - rampH);
                    const cx = x + gap + rampW + R;
                    const cy = y - rampH - R;
                    const hg2 = 0.3 + Math.random() * 0.1;
                    loops.push({ cx, cy, R, halfGap: hg2, gaps: [] });
                    // Abstieg nach Loop
                    pt(cx + R + 40, y - rampH);
                    pt(cx + R + 120, y);
                    x = cx + R + 120;
                }

            } else {
                // ── Bodenloser Abgrund mit Pflichtschanze ──────────
                const flatIn  = 120 + Math.random() * 80;
                const rampW   = 60  + Math.random() * 40;
                const rampH   = 90  + Math.random() * 60;
                const pitW    = 280 + Math.random() * 160;
                const landW   = 100 + Math.random() * 80;

                // Anlauf + Schanze
                pt(x,                  y);
                pt(x + flatIn,         y);
                pt(x + flatIn + rampW, y - rampH);

                const pitStart = x + flatIn + rampW;
                const pitEnd   = pitStart + pitW;

                // Abgrund-Wände direkt pushen (kein Y-Clamp)
                terrain.push({ x: pitStart,     y: y - rampH });
                terrain.push({ x: pitStart + 5, y: H + 400 });
                terrain.push({ x: pitEnd   - 5, y: H + 400 });
                terrain.push({ x: pitEnd,       y: y });
                pt(pitEnd + landW, y);

                x = pitEnd + landW;
            }

            y = Math.max(minY, Math.min(maxY, y));
        }

        pt(x + 800, y); // langer Abschluss
    }

    // Binary-search Lookup (variable Segment-Breiten)
    function findIdx(wx) {
        let lo = 0, hi = terrain.length - 2;
        while (lo < hi) {
            const mid = (lo + hi + 1) >> 1;
            if (terrain[mid].x <= wx) lo = mid; else hi = mid - 1;
        }
        return lo;
    }

    // Get terrain Y at world X
    function terrainYAt(wx) {
        const i = findIdx(wx);
        const a = terrain[i], b = terrain[i + 1];
        if (!b || b.x === a.x) return a ? a.y : canvas.height;
        return a.y + (b.y - a.y) * ((wx - a.x) / (b.x - a.x));
    }

    // Get terrain angle at world X
    function terrainAngleAt(wx) {
        const i = findIdx(wx);
        const a = terrain[i], b = terrain[i + 1];
        if (!a || !b) return 0;
        return Math.atan2(b.y - a.y, b.x - a.x);
    }

    // ── Init / Reset ───────────────────────────────────────────────
    function generateGems() {
        gemObjects = [];
        for (let x = 400; x < 25000; x += 280 + Math.random() * 320) {
            const y = terrainYAt(x) - 28;
            gemObjects.push({ x, y, collected: false });
        }
    }

    function initGame() {
        generateTerrain();
        generateGems();
        gems = 0;
        loopsCompleted = 0;
        document.getElementById('hud-gem-count').textContent = '0';

        const startX = 80;
        const startY = terrainYAt(startX) - WHEEL_R - 4;

        px       = startX;
        py       = startY;
        vx       = 0;
        vy       = 0;
        angle    = 0;
        angVel   = 0;
        onGround  = false;
        airFrames = 0;
        score    = 0;
        flips    = 0;
        flipAccum = 0;
        holding      = false;
        boostActive   = false;
        boostTimer    = 0;
        wheelieTilt   = 0;
        activeLoopIdx = -1;
        loopAngle     = 0;
        loopSpeed     = 0;
        loopCooldown  = 0;

        boostCharges  = 0;
        flipsUntilBoost = FLIPS_PER_BOOST;
        popups   = [];
        gameRunning = true;
        lastTime    = null;
        updateHUD();
    }

    // ── Input ──────────────────────────────────────────────────────
    let hintFaded = false;

    function setHolding(val) {
        if (val && !hintFaded) {
            hintFaded = true;
            document.getElementById('hint').classList.add('fade');
        }
        if (val) initEngineSound();
        holding = val;
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && gameRunning) {
            e.preventDefault();
            const now = performance.now();
            if (now - lastSpaceRelease < RELEASE_TAP_MS && !boostActive) {
                if (boostCharges > 0) {
                    boostCharges--;
                    boostActive = true;
                    boostTimer  = BOOST_DURATION;
                    popups.push({ x: px, y: py - 40, text: 'BOOST!', life: 0.9, maxLife: 0.9, color: '#ffcc44' });
                    updateHUD();
                } else {
                    popups.push({ x: px, y: py - 40, text: 'KEIN BOOST! Mehr Flips!', life: 1.2, maxLife: 1.2 });
                }
            }
            setHolding(true);
        }
    });
    window.addEventListener('keyup', (e) => {
        if (e.code === 'Space') {
            lastSpaceRelease = performance.now();
            setHolding(false);
        }
    });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (gameRunning) {
            const now = performance.now();
            if (now - lastTouchRelease < RELEASE_TAP_MS && !boostActive) {
                if (boostCharges > 0) {
                    boostCharges--;
                    boostActive = true;
                    boostTimer  = BOOST_DURATION;
                    popups.push({ x: px, y: py - 40, text: 'BOOST!', life: 0.9, maxLife: 0.9, color: '#ffcc44' });
                    updateHUD();
                } else {
                    popups.push({ x: px, y: py - 40, text: 'KEIN BOOST! Mehr Flips!', life: 1.2, maxLife: 1.2 });
                }
            }
            setHolding(true);
        }
    }, { passive: false });
    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        lastTouchRelease = performance.now();
        setHolding(false);
    }, { passive: false });

    // ── Camera ────────────────────────────────────────────────────
    let camX = 0;  // world X of left edge of screen

    // ── Game Loop ──────────────────────────────────────────────────
    let lastTime = null;

    function gameLoop(ts) {
        if (!gameRunning) { requestAnimationFrame(gameLoop); return; }

        if (!lastTime) lastTime = ts;
        let dt = Math.min((ts - lastTime) / 1000, 0.05); // cap dt
        lastTime = ts;

        update(dt);
        updateParticles(dt);
        if (shakeAmt > 0) shakeAmt *= 0.85;
        updateEngineSound();
        render();

        requestAnimationFrame(gameLoop);
    }

    function update(dt) {
        wasOnGround = onGround;

        // ── Loop-Physik ────────────────────────────────────────────
        // loopAngle: φ=0 Einfahrt unten, φ=π oben, φ=2π Ausfahrt unten
        // Position: px = cx + sin(φ)*rEff,  py = cy + cos(φ)*rEff
        // Tangente (vorwärts): (cos(φ), −sin(φ))
        // Schwerkraft-Tangentialkomponente: −g·sin(φ)

        // Einfahrt erkennen
        if (loopCooldown > 0) loopCooldown -= dt;
        if (activeLoopIdx < 0 && loopCooldown <= 0) {
            for (let li = 0; li < loops.length; li++) {
                const loop = loops[li];
                const rEff = loop.R - WHEEL_R;
                const dx   = px - loop.cx;
                const dy   = py - loop.cy;
                const d    = Math.hypot(dx, dy);
                if (Math.abs(d - rEff) > 70) continue;   // großzügige Zone
                if (dy < rEff * 0.1) continue;            // muss unten sein
                if (dx < 0) continue;                     // nur von rechts einfahren
                if (vx < 30) continue;
                activeLoopIdx = li;
                const hg = loop.halfGap || 0.35;
                loopAngle = Math.max(hg, Math.atan2(dx, dy));
                loopSpeed = vx;
                popups.push({ x: px, y: py - 50, text: 'LOOP!', life: 1.0, maxLife: 1.0, color: '#ffcc44' });
                break;
            }
        }

        let onLoop = false;
        if (activeLoopIdx >= 0) {
            const loop  = loops[activeLoopIdx];
            const rEff  = loop.R - WHEEL_R;

            // Schwerkraft bremst bergauf, beschleunigt bergab
            loopSpeed += -GRAVITY * Math.sin(loopAngle) * dt;
            if (holding) loopSpeed += (boostActive ? BOOST_THRUST : THRUST) * dt;
            loopSpeed = Math.min(Math.max(loopSpeed, 15), MAX_VX);

            // Winkel vorwärts
            loopAngle += (loopSpeed / rEff) * dt;

            const halfGapL = loop.halfGap || 0.35;

            // Lücken-Check: in Extra-Lücke? → Auswerfen zum Drüber-Fliegen
            const inExtraGap = (loop.gaps || []).some(g => loopAngle >= g.start && loopAngle <= g.end);

            // Rückwärts aus Einfahrt herausgefallen
            if (loopAngle < halfGapL) {
                activeLoopIdx = -1;
                loopCooldown  = 0.8;
                vx = loopSpeed; vy = 0;
            // In Lücke geflogen → tangential auswerfen (Luft-Sprung über die Lücke)
            } else if (inExtraGap) {
                activeLoopIdx = -1;
                loopCooldown  = 1.5;
                vx = loopSpeed * Math.cos(loopAngle);
                vy = -loopSpeed * Math.sin(loopAngle);
            // Ablösen: nur an Oberseite (φ zwischen 90° und 270°)
            } else if (loopAngle > Math.PI * 0.5 && loopAngle < Math.PI * 1.5
                && loopSpeed < Math.sqrt(GRAVITY * rEff * Math.max(0, Math.cos(Math.PI - loopAngle)))) {
                activeLoopIdx = -1;
                loopCooldown  = 1.2;
                vx = loopSpeed * Math.cos(loopAngle);
                vy = -loopSpeed * Math.sin(loopAngle);
            } else if (loopAngle >= 2 * Math.PI - halfGapL) {
                // Ausfahrt: Kreisbahn beendet → fetter Speed-Boost + Wheelie!
                loopsCompleted++;
                activeLoopIdx = -1;
                loopCooldown  = 1.2;
                const boostedSpeed = Math.min(loopSpeed * 1.7 + 120, MAX_VX);
                vx = boostedSpeed * Math.cos(halfGapL);
                vy = boostedSpeed * Math.sin(halfGapL);
                wheelieTilt   = -1.1;          // sofortiger Wheelie
                boostActive   = true;
                boostTimer    = BOOST_DURATION;
                popups.push({ x: px, y: py - 60, text: 'SPEED BOOST!', life: 1.2, maxLife: 1.2, color: '#ffcc44' });
            } else {
                // Position direkt aus Winkel berechnen
                px     = loop.cx + Math.sin(loopAngle) * rEff;
                py     = loop.cy + Math.cos(loopAngle) * rEff;
                angle  = -loopAngle;
                angVel = 0;
                onGround  = false;
                onLoop    = true;
                airFrames = 0;
            }
        }

        if (onLoop) {
            // Boost-Timer, Wheelie, HUD, Popups noch updaten
            if (boostActive) { boostTimer -= dt; if (boostTimer <= 0) { boostActive = false; boostTimer = 0; } }
            wheelieTilt += (0 - wheelieTilt) * Math.min(dt * 10, 1);
            score = flips;
            updateHUD();
            camX = px - canvas.width * 0.30;
            if (py > canvas.height + 100) { triggerCrash(); return; }
            for (let i = popups.length - 1; i >= 0; i--) { popups[i].life -= dt; if (popups[i].life <= 0) popups.splice(i, 1); }
            return;
        }

        // ── Physik ────────────────────────────────────────────────────
        const rearWX  = px - AXLE_DIST;
        const frontWX = px + AXLE_DIST;
        const rTerrY  = terrainYAt(rearWX);
        const fTerrY  = terrainYAt(frontWX);

        // Kontaktpunkte der Räder (Winkel berücksichtigt)
        const rContactY = py + Math.sin(angle) * (-AXLE_DIST) + Math.cos(angle) * WHEEL_R;
        const fContactY = py + Math.sin(angle) *   AXLE_DIST  + Math.cos(angle) * WHEEL_R;

        let rOnGround = rContactY >= rTerrY;
        let fOnGround = fContactY >= fTerrY;
        onGround = rOnGround || fOnGround;

        // Sticky ground: kurz über Terrain (bergab) → trotzdem am Boden bleiben
        // Aber NICHT wenn wir gerade eine steile Rampe hochfahren
        const rSlope = Math.atan2(terrainYAt(rearWX+10)  - terrainYAt(rearWX-10),  20);
        const fSlope = Math.atan2(terrainYAt(frontWX+10) - terrainYAt(frontWX-10), 20);
        const onSteepRamp = Math.min(rSlope, fSlope) < -0.13 && vx > 140;
        if (!onGround && vy >= 0 && !onSteepRamp) {
            const rAbove = rTerrY - rContactY;
            const fAbove = fTerrY - fContactY;
            if (rAbove >= 0 && rAbove < 40) {
                onGround = true;
                rOnGround = true;
                vy = 0;
            } else if (fAbove >= 0 && fAbove < 40) {
                onGround = true;
                fOnGround = true;
                vy = 0;
            }
        }

        if (!onGround) {
            airFrames++;
        }

        if (onGround) {
            // Use axle-span angle (rear→front wheel) instead of single-point angle
            // — stable at peaks where terrainAngleAt would return one segment's steep slope
            const terrAngle = Math.atan2(fTerrY - rTerrY, frontWX - rearWX);

            // Crash nur beim Aufkommen — und nur wenn mind. 10 Frames in der Luft waren
            if (!wasOnGround && airFrames >= 10) {
                let diff = Math.abs(normalizeAngle(angle - terrAngle));
                if (diff > Math.PI) diff = Math.PI * 2 - diff;
                if (diff > CRASH_ANGLE && Math.abs(vx) > 40) { triggerCrash(); return; }
            }
            // Dust on landing
            if (!wasOnGround && airFrames >= 10) spawnDust(px, py + WHEEL_R);
            flipAccum = 0;
            airFrames = 0;

            // Position auf Terrain setzen (winkelkorrigiert)
            const cosT = Math.cos(terrAngle), sinT = Math.sin(terrAngle);
            if (rOnGround && fOnGround) {
                py = (rTerrY + fTerrY) / 2 - cosT * WHEEL_R;
            } else if (rOnGround) {
                py = rTerrY + sinT * AXLE_DIST - cosT * WHEEL_R;
            } else {
                py = fTerrY - sinT * AXLE_DIST - cosT * WHEEL_R;
            }

            // Fahrzeug folgt Terrain-Winkel
            angle  = terrAngle;
            angVel = 0;

            // Sprung: steilsten Einzelrad-Winkel nutzen (nicht nur Mittelwert)
            // → erkennt Ramp-Peak auch wenn Vorderrad schon drüber ist
            const steepest  = Math.min(rSlope, fSlope, terrAngle);
            const isRampUp   = steepest < -0.13;   // ~7.5° auf irgendeinem Rad
            const fastEnough = vx > 140;
            // Bergab: vy dem Terrain-Winkel folgen → kein Bounce
            const baseVy = (isRampUp && fastEnough)
                ? Math.max(Math.min(vx * Math.sin(steepest), -95), -185)
                : (terrAngle > 0 ? vx * Math.tan(terrAngle) : 0);
            vy = baseVy;

            // Gas / Bremse
            if (holding) {
                vx += (boostActive ? BOOST_THRUST : THRUST) * dt;
            } else {
                vx *= Math.pow(FRICTION, dt * 60);
            }
            vx = Math.min(Math.max(vx, 0), MAX_VX);

        } else {
            // Luft: Schwerkraft (Boost = 15% weniger Gravität + 15% mehr Horizontalgeschwindigkeit)
            vy += GRAVITY * dt;

            // Rotation nur wenn minimal in der Luft (mind. 30px über Terrain)
            const terrYBelow = terrainYAt(px);
            const airHeight = terrYBelow - (py + WHEEL_R);
            const flipSpeed = boostActive ? FLIP_SPEED * 1.5 : FLIP_SPEED;
            angVel = (holding && airHeight > 30) ? -flipSpeed : 0;

            // Flip zählen
            const prevFlipAccum = flipAccum;
            flipAccum += angVel * dt;
            const fullFlips     = Math.floor(Math.abs(flipAccum)     / Math.PI);
            const prevFullFlips = Math.floor(Math.abs(prevFlipAccum) / Math.PI);
            if (fullFlips > prevFullFlips) {
                const n = fullFlips - prevFullFlips;
                flips += n;
                playFlipSound();
                flipsUntilBoost -= n;
                while (flipsUntilBoost <= 0) {
                    boostCharges++;
                    flipsUntilBoost += FLIPS_PER_BOOST;
                    popups.push({ x: px, y: py - 70, text: 'BOOST VERDIENT!', life: 1.4, maxLife: 1.4, color: '#ffcc44' });
                }
                popups.push({ x: px, y: py - 50, text: `FLIP! (${flipsUntilBoost} bis Boost)`, life: 1.4, maxLife: 1.4 });
                updateHUD();
            }
        }

        // Boost timer
        if (boostActive) {
            boostTimer -= dt;
            if (boostTimer <= 0) { boostActive = false; boostTimer = 0; }
            if (Math.random() < 0.4) spawnParticles(px - 20, py + 2, 3, '#ffaa00', 120, 0.35);
        }

        // Gem collection
        for (const g of gemObjects) {
            if (g.collected) continue;
            const dx = px - g.x, dy = py - g.y;
            if (dx * dx + dy * dy < 900) {
                g.collected = true;
                gems++;
                document.getElementById('hud-gem-count').textContent = gems;
                spawnParticles(g.x, g.y, 10, '#00eeff', 120, 0.5);
                popups.push({ x: g.x, y: g.y - 30, text: '+1 💎', life: 0.9, maxLife: 0.9, color: '#00eeff' });
            }
        }

        // Wheelie tilt (visuell): Nase hoch wenn Boost + Boden
        const targetTilt = (boostActive && onGround) ? -0.52 : 0;
        wheelieTilt += (targetTilt - wheelieTilt) * Math.min(dt * 10, 1);

        // Integration
        px    += vx    * dt;
        py    += vy    * dt;
        angle += angVel * dt;

        score = flips;
        updateHUD();

        // Camera follows player
        camX = px - canvas.width * 0.30;

        // Crash if fell off bottom of screen
        if (py > canvas.height + 100) {
            triggerCrash();
            return;
        }

        // Crash if went too far left (reversed)
        if (px < camX - 50) {
            triggerCrash();
            return;
        }

        // Update popups
        for (let i = popups.length - 1; i >= 0; i--) {
            popups[i].life -= dt;
            if (popups[i].life <= 0) popups.splice(i, 1);
        }
    }

    function normalizeAngle(a) {
        while (a >  Math.PI) a -= Math.PI * 2;
        while (a < -Math.PI) a += Math.PI * 2;
        return a;
    }

    function playGameOverSound() {
        try {
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            [[494,0],[392,0.22],[330,0.44],[196,0.70]].forEach(([freq, t]) => {
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.connect(gain); gain.connect(ac.destination);
                osc.frequency.value = freq;
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.3, ac.currentTime + t);
                gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.28);
                osc.start(ac.currentTime + t);
                osc.stop(ac.currentTime + t + 0.3);
            });
        } catch(e) {}
    }

    function playFlipSound() {
        try {
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.connect(gain); gain.connect(ac.destination);
            osc.frequency.setValueAtTime(440, ac.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, ac.currentTime + 0.12);
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.25, ac.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
            osc.start(ac.currentTime);
            osc.stop(ac.currentTime + 0.2);
        } catch(e) {}
    }


    // ── Engine / Roll Sound ────────────────────────────────────────
    let engAC = null, engOsc = null, engGain = null;

    function initEngineSound() {
        if (engAC) return;
        try {
            engAC  = new (window.AudioContext || window.webkitAudioContext)();
            engOsc  = engAC.createOscillator();
            engGain = engAC.createGain();
            engOsc.type = 'sawtooth';
            engOsc.frequency.value = 55;
            engGain.gain.value = 0;
            engOsc.connect(engGain);
            engGain.connect(engAC.destination);
            engOsc.start();
        } catch(e) {}
    }

    function updateEngineSound() {
        if (!engAC) return;
        try {
            const t      = engAC.currentTime;
            const active = holding && onGround && vx > 15;
            const freq   = 55 + vx * 0.28;
            engOsc.frequency.setTargetAtTime(freq, t, 0.07);
            const vol = active ? Math.min(0.022, vx / 4800 + 0.005) : 0;
            engGain.gain.setTargetAtTime(vol, t, active ? 0.10 : 0.30);
        } catch(e) {}
    }

    function triggerCrash() {
        gameRunning = false;
        triggerShake(18);
        spawnParticles(px, py, 28, '#ff4444', 250, 0.9);
        spawnParticles(px, py, 12, '#ffcc44', 180, 0.7);
        playGameOverSound();
        const finalScore = score;

        spaceReleasedSinceCrash = false;

        setTimeout(async () => {
            window._gemsCollected  = gems;
            window._loopsCompleted = loopsCompleted;
            document.getElementById('final-score-display').textContent = finalScore;
            if (gems > 0) {
                document.getElementById('personal-best-display').textContent = `+${gems} 💎 gesammelt`;
            }
            document.getElementById('game-over-modal').classList.add('show');
            if (window.storeResult) await window.storeResult(playerName, finalScore);
        }, 400);
    }

    function updateHUD() {
        document.getElementById('hud-score').textContent = flips;
        const progressPct = Math.floor(((FLIPS_PER_BOOST - flipsUntilBoost) / FLIPS_PER_BOOST) * 100);
        document.getElementById('hud-xp-bar').style.width = progressPct + '%';
        document.getElementById('hud-boost-charges').textContent = boostCharges > 0 ? '⚡'.repeat(boostCharges) : '';
        const label = document.getElementById('hud-boost-label');
        label.style.color = boostCharges > 0 ? '#ffcc44' : 'rgba(255,204,68,0.35)';
        label.style.textShadow = boostCharges > 0 ? '0 0 8px rgba(255,204,68,0.8)' : 'none';
    }

    // ── Rendering ──────────────────────────────────────────────────
    function render() {
        const W = canvas.width;
        const H = canvas.height;

        // Screen shake
        ctx.save();
        if (shakeAmt > 0.5) {
            ctx.translate(
                (Math.random() - 0.5) * shakeAmt,
                (Math.random() - 0.5) * shakeAmt
            );
        }

        ctx.clearRect(0, 0, W, H);

        // Dynamic background gradient
        const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
        bgGrad.addColorStop(0, boostActive ? '#0d1830' : '#07111f');
        bgGrad.addColorStop(1, '#0a1628');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, W, H);


        // Neon grid
        drawGrid();

        // Terrain
        drawTerrain();

        // Loops
        drawLoops();

        // Gems
        drawGems();

        // Particles (behind vehicle)
        drawParticles();

        // Vehicle
        drawVehicle();

        // Popups
        drawPopups();

        ctx.restore();
    }

    function drawGrid() {
        const W = canvas.width;
        const H = canvas.height;
        const gridSize = 80;
        const offsetX = (-camX) % gridSize;

        ctx.save();
        ctx.strokeStyle = 'rgba(86,154,169,0.07)';
        ctx.lineWidth = 1;

        // Vertical lines
        for (let x = offsetX; x < W; x += gridSize) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, H);
            ctx.stroke();
        }
        // Horizontal lines
        for (let y = 0; y < H; y += gridSize) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
            ctx.stroke();
        }
        ctx.restore();
    }

    function drawTerrain() {
        const W = canvas.width;
        const H = canvas.height;

        // Find visible segment range via binary search
        const startX = camX - 200;
        const endX   = camX + W + 200;

        let startIdx = Math.max(0, findIdx(startX) - 1);
        let endIdx   = Math.min(terrain.length - 1, findIdx(endX) + 2);

        if (startIdx >= endIdx) return;

        ctx.save();

        // Glow shadow for terrain line
        ctx.shadowColor = '#569aa9';
        ctx.shadowBlur  = 10;

        // Terrain line
        ctx.beginPath();
        ctx.strokeStyle = '#569aa9';
        ctx.lineWidth   = 3;

        let first = true;
        for (let i = startIdx; i <= endIdx; i++) {
            const t = terrain[i];
            if (!t) continue;
            const sx = t.x - camX;
            const sy = t.y;
            if (first) { ctx.moveTo(sx, sy); first = false; }
            else        ctx.lineTo(sx, sy);
        }
        ctx.stroke();

        // Red glow on pit edges (segments that drop far below screen)
        for (let i = startIdx; i < endIdx; i++) {
            const a = terrain[i], b = terrain[i + 1];
            if (!a || !b) continue;
            if (a.y > H + 50 || b.y > H + 50) {
                ctx.save();
                ctx.strokeStyle = '#ff3333';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur  = 18;
                ctx.lineWidth   = 2;
                ctx.beginPath();
                ctx.moveTo(a.x - camX, Math.min(a.y, H));
                ctx.lineTo(b.x - camX, Math.min(b.y, H));
                ctx.stroke();
                ctx.restore();
            }
        }

        ctx.shadowBlur = 0;

        // Dark fill below terrain
        ctx.beginPath();
        const firstT = terrain[startIdx];
        const lastT  = terrain[endIdx];
        ctx.moveTo(firstT.x - camX, firstT.y);
        for (let i = startIdx + 1; i <= endIdx; i++) {
            const t = terrain[i];
            if (!t) continue;
            ctx.lineTo(t.x - camX, t.y);
        }
        ctx.lineTo(lastT.x - camX, H + 50);
        ctx.lineTo(firstT.x - camX, H + 50);
        ctx.closePath();
        ctx.fillStyle = 'rgba(10,22,40,0.85)';
        ctx.fill();

        ctx.restore();
    }

    function drawLoops() {
        for (let li = 0; li < loops.length; li++) {
            const loop   = loops[li];
            const sx     = loop.cx - camX;
            const sy     = loop.cy;
            const active = (li === activeLoopIdx);
            const halfGap = loop.halfGap || 0.35;
            const C      = active ? '#ffcc44' : '#569aa9';
            const CG     = active ? '#ffaa00' : '#569aa9';

            // Build list of solid arc segments: [halfGap … gaps … 2π-halfGap]
            const extraGaps = (loop.gaps || []).slice().sort((a,b) => a.start - b.start);
            const segments = [];
            let segStart = halfGap;
            for (const g of extraGaps) {
                if (g.start > segStart) segments.push([segStart, g.start]);
                segStart = g.end;
            }
            segments.push([segStart, 2 * Math.PI - halfGap]);

            ctx.save();
            ctx.strokeStyle = C;
            ctx.shadowColor = CG;
            ctx.shadowBlur  = active ? 22 : 14;
            ctx.lineWidth   = 4;

            for (const [a, b] of segments) {
                // φ→canvas: canvas_angle = π/2 − φ; anticlockwise=true goes over top
                ctx.beginPath();
                ctx.arc(sx, sy, loop.R, Math.PI/2 - a, Math.PI/2 - b, true);
                ctx.stroke();
            }

            // Inner glow ring (same segments)
            ctx.strokeStyle = active ? 'rgba(255,200,80,0.22)' : 'rgba(86,154,169,0.2)';
            ctx.lineWidth   = 10;
            ctx.shadowBlur  = 0;
            for (const [a, b] of segments) {
                ctx.beginPath();
                ctx.arc(sx, sy, loop.R, Math.PI/2 - a, Math.PI/2 - b, true);
                ctx.stroke();
            }

            // Legs at entry/exit
            ctx.strokeStyle = C; ctx.shadowColor = CG; ctx.shadowBlur = active ? 22 : 14; ctx.lineWidth = 4;
            const legX = Math.sin(halfGap) * loop.R;
            const legY = Math.cos(halfGap) * loop.R;
            ctx.beginPath(); ctx.moveTo(sx + legX, sy + legY); ctx.lineTo(sx + legX, sy + loop.R); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(sx - legX, sy + legY); ctx.lineTo(sx - legX, sy + loop.R); ctx.stroke();
            ctx.restore();
        }
    }

    function drawVehicle() {
        const sx   = px - camX;
        const sy   = py;
        const wrot = -px / WHEEL_R;
        const boost = boostActive;

        // Colors
        const WC  = boost ? '#ffcc44' : SKIN_COLOR;
        const WCG = boost ? '#ff8800' : SKIN_GLOW;

        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(angle + wheelieTilt);
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        // ── Dimensions ────────────────────────────────────────────────
        const W    = 28;   // half-length of deck
        const kx   = W * 0.62;  // where kick tail begins
        const kH   = 5;   // kick tail rise
        const dBot = -4;  // deck bottom y
        const dTop = -11; // deck top y (side face)
        const dFar = -14; // top surface far edge y
        const wy   = 2;   // wheel center y
        const wr   = 9;   // wheel visual radius
        const tx1  = -16, tx2 = 16;  // truck x

        // ── Speed trails ──────────────────────────────────────────────
        if (vx > 60) {
            ctx.save();
            const alpha = Math.min((vx - 60) / 320, 0.7);
            [tx1, tx2].forEach(tx => {
                const len = Math.min(vx * 0.1, 48);
                const g = ctx.createLinearGradient(tx - len, 0, tx - 1, 0);
                g.addColorStop(0, 'rgba(30,140,255,0)');
                g.addColorStop(0.6, `rgba(80,170,255,${alpha * 0.5})`);
                g.addColorStop(1, `rgba(150,210,255,${alpha})`);
                ctx.globalAlpha = alpha;
                ctx.shadowColor = '#0088ff'; ctx.shadowBlur = 10;
                ctx.strokeStyle = g; ctx.lineWidth = 2.5;
                ctx.beginPath(); ctx.moveTo(tx - len, wy + 1); ctx.lineTo(tx - 1, wy + 1); ctx.stroke();
                // second thinner trail
                ctx.lineWidth = 1.2; ctx.globalAlpha = alpha * 0.5;
                ctx.beginPath(); ctx.moveTo(tx - len * 0.7, wy + 4); ctx.lineTo(tx - 1, wy + 4); ctx.stroke();
            });
            ctx.restore();
        }

        // ── Trucks ────────────────────────────────────────────────────
        [tx1, tx2].forEach(tx => {
            ctx.save();
            ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
            // baseplate
            ctx.fillStyle = '#141e2a';
            ctx.fillRect(tx - 7, dBot - 1, 14, 3);
            // hanger
            ctx.fillStyle = '#1c2d3e';
            ctx.fillRect(tx - 5, dBot + 2, 10, wy - dBot - 1);
            ctx.restore();
        });

        // ── Deck side face ─────────────────────────────────────────────
        ctx.beginPath();
        ctx.moveTo(-W, dBot - kH);
        ctx.quadraticCurveTo(-W * 0.88, dBot, -kx, dBot);
        ctx.lineTo(kx, dBot);
        ctx.quadraticCurveTo(W * 0.88, dBot, W, dBot - kH);
        ctx.lineTo(W, dTop - kH);
        ctx.quadraticCurveTo(W * 0.88, dTop, kx, dTop);
        ctx.lineTo(-kx, dTop);
        ctx.quadraticCurveTo(-W * 0.88, dTop, -W, dTop - kH);
        ctx.closePath();
        ctx.fillStyle = '#0d0820'; ctx.fill();
        ctx.strokeStyle = 'rgba(160,80,255,0.35)'; ctx.lineWidth = 0.8; ctx.stroke();

        // ── Top surface (3D depth) ─────────────────────────────────────
        ctx.beginPath();
        ctx.moveTo(-W,   dTop - kH);
        ctx.quadraticCurveTo(-W * 0.88, dTop, -kx, dTop);
        ctx.lineTo(kx, dTop);
        ctx.quadraticCurveTo(W * 0.88, dTop, W, dTop - kH);
        ctx.lineTo(W,   dFar - kH);
        ctx.quadraticCurveTo(W * 0.88, dFar, kx, dFar);
        ctx.lineTo(-kx, dFar);
        ctx.quadraticCurveTo(-W * 0.88, dFar, -W, dFar - kH);
        ctx.closePath();
        const tg = ctx.createLinearGradient(0, dFar, 0, dTop);
        tg.addColorStop(0, 'rgba(140,50,240,0.4)');
        tg.addColorStop(1, 'rgba(50,10,90,0.2)');
        ctx.fillStyle = tg; ctx.fill();

        // ── Neon graphics on deck ──────────────────────────────────────
        ctx.save();
        // clip to top surface
        ctx.beginPath();
        ctx.moveTo(-W, dTop - kH); ctx.quadraticCurveTo(-W * 0.88, dTop, -kx, dTop);
        ctx.lineTo(kx, dTop); ctx.quadraticCurveTo(W * 0.88, dTop, W, dTop - kH);
        ctx.lineTo(W, dFar - kH); ctx.quadraticCurveTo(W * 0.88, dFar, kx, dFar);
        ctx.lineTo(-kx, dFar); ctx.quadraticCurveTo(-W * 0.88, dFar, -W, dFar - kH);
        ctx.closePath(); ctx.clip();

        const midY = (dTop + dFar) / 2;

        // Pink zigzag lines
        ctx.shadowColor = '#ff30cc'; ctx.shadowBlur = 7;
        ctx.strokeStyle = 'rgba(255,50,200,0.9)'; ctx.lineWidth = 1.1;
        ctx.beginPath();
        ctx.moveTo(-24, midY - 0.5);
        ctx.lineTo(-12, dFar + 1); ctx.lineTo(0, midY - 0.5);
        ctx.lineTo(12, dFar + 1); ctx.lineTo(24, midY - 0.5);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-24, midY + 1);
        ctx.lineTo(-12, dTop - 1); ctx.lineTo(0, midY + 1);
        ctx.lineTo(12, dTop - 1); ctx.lineTo(24, midY + 1);
        ctx.stroke();

        // Cyan diamond shapes
        ctx.shadowColor = '#00ccff'; ctx.shadowBlur = 7;
        ctx.strokeStyle = 'rgba(0,210,255,0.8)'; ctx.lineWidth = 0.9;
        [-15, 0, 15].forEach(cx => {
            ctx.beginPath();
            ctx.moveTo(cx,     dFar + 1);
            ctx.lineTo(cx + 5, midY);
            ctx.lineTo(cx,     dTop - 1);
            ctx.lineTo(cx - 5, midY);
            ctx.closePath(); ctx.stroke();
        });
        ctx.restore();

        // ── White bottom rail (bright glow) ───────────────────────────
        ctx.save();
        ctx.shadowColor = 'rgba(255,255,255,0.95)'; ctx.shadowBlur = 18;
        ctx.strokeStyle = 'rgba(255,252,235,0.97)'; ctx.lineWidth = 2.2;
        ctx.beginPath();
        ctx.moveTo(-W + 1, dBot - kH + 1);
        ctx.quadraticCurveTo(-W * 0.88, dBot, -kx, dBot);
        ctx.lineTo(kx, dBot);
        ctx.quadraticCurveTo(W * 0.88, dBot, W - 1, dBot - kH + 1);
        ctx.stroke();
        // second pass for extra glow
        ctx.lineWidth = 0.8; ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.moveTo(-W + 1, dBot - kH + 1);
        ctx.quadraticCurveTo(-W * 0.88, dBot, -kx, dBot);
        ctx.lineTo(kx, dBot);
        ctx.quadraticCurveTo(W * 0.88, dBot, W - 1, dBot - kH + 1);
        ctx.stroke();
        ctx.restore();

        // ── Wheels ────────────────────────────────────────────────────
        [tx1, tx2].forEach(tx => {
            ctx.save(); ctx.translate(tx, wy);

            // glow ring
            ctx.shadowColor = WCG; ctx.shadowBlur = 22;
            ctx.strokeStyle = WC; ctx.lineWidth = 2.8;
            ctx.beginPath(); ctx.arc(0, 0, wr, 0, Math.PI * 2); ctx.stroke();

            // wheel body
            const rg = ctx.createRadialGradient(0, 0, 0, 0, 0, wr);
            rg.addColorStop(0, '#0c1a38'); rg.addColorStop(0.7, '#060e20'); rg.addColorStop(1, '#020408');
            ctx.beginPath(); ctx.arc(0, 0, wr, 0, Math.PI * 2);
            ctx.fillStyle = rg; ctx.fill();

            // outer neon ring (redrawn on top)
            ctx.shadowColor = WCG; ctx.shadowBlur = 16;
            ctx.strokeStyle = WC; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0, wr, 0, Math.PI * 2); ctx.stroke();

            // inner ring
            ctx.shadowBlur = 0;
            ctx.strokeStyle = boost ? 'rgba(255,200,80,0.35)' : 'rgba(0,160,255,0.35)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(0, 0, wr - 3.5, 0, Math.PI * 2); ctx.stroke();

            // spokes
            ctx.strokeStyle = boost ? 'rgba(255,200,80,0.5)' : 'rgba(0,150,220,0.55)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 3; i++) {
                const a = wrot + i * Math.PI * 2 / 3;
                ctx.beginPath();
                ctx.moveTo( Math.cos(a) * (wr - 1),  Math.sin(a) * (wr - 1));
                ctx.lineTo(-Math.cos(a) * (wr - 1), -Math.sin(a) * (wr - 1));
                ctx.stroke();
            }

            // hub
            const hg = ctx.createRadialGradient(-0.6, -0.6, 0, 0, 0, 3);
            hg.addColorStop(0, boost ? '#ffe680' : '#aaddff');
            hg.addColorStop(1, boost ? '#cc6600' : '#0055aa');
            ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2);
            ctx.fillStyle = hg; ctx.shadowColor = '#fff'; ctx.shadowBlur = 10; ctx.fill();

            ctx.restore();
        });

        ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    function drawPopups() {
        for (const p of popups) {
            const t = p.life / p.maxLife;
            const alpha = Math.min(1, t * 2);
            const sy = p.y - camX * 0 - (p.maxLife - p.life) * 40;
            const sx = p.x - camX;

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'center';
            const col = p.color || '#00ffaa';
            ctx.fillStyle = col;
            ctx.shadowColor = col;
            ctx.shadowBlur  = 12;
            ctx.fillText(p.text, sx, sy);
            ctx.restore();
        }
    }

    // ── Auth / Name ───────────────────────────────────────────────
    const nameModal  = document.getElementById('name-modal');
    const nameInput  = document.getElementById('name-input');
    const nameSubmit = document.getElementById('name-submit');

    const user = (() => { try { return JSON.parse(localStorage.getItem('1100px_user')); } catch(e) { return null; } })();
    if (user) {
        playerName = user.name;
        initGame();
    } else {
        nameModal.classList.add('show');
        function submitName() {
            const val = nameInput.value.trim();
            if (!val) { nameInput.classList.add('input-error'); setTimeout(() => nameInput.classList.remove('input-error'), 400); return; }
            playerName = val;
            nameModal.classList.remove('show');
            initGame();
        }
        nameSubmit.addEventListener('click', submitName);
        nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitName(); });
        nameInput.focus();
    }

    let spaceReleasedSinceCrash = false;

    function doRestart() {
        spaceReleasedSinceCrash = false;
        document.getElementById('game-over-modal').classList.remove('show');
        initGame();
    }

    document.getElementById('restart-btn').addEventListener('click', doRestart);

    window.addEventListener('keyup', (e) => {
        if (e.code === 'Space' && !gameRunning) spaceReleasedSinceCrash = true;
    });

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && !gameRunning && spaceReleasedSinceCrash &&
            document.getElementById('game-over-modal').classList.contains('show')) {
            e.preventDefault();
            doRestart();
        }
    });

    // ── Start loop ─────────────────────────────────────────────────
    requestAnimationFrame(gameLoop);

})();
</script>
</body>
</html>
