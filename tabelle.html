<!DOCTYPE html>
<html>

<head>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGxWCAMbglUMjHeKRdeniS4TcA5oCAx1c",
            authDomain: "pixels-e2f82.firebaseapp.com",
            projectId: "pixels-e2f82",
            storageBucket: "pixels-e2f82.firebasestorage.app",
            messagingSenderId: "311496840709",
            appId: "1:311496840709:web:3a94601ef40cbd0c946e6c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadScores(collectionName, minPoints, tableBodyId) {
            const tableBody = document.getElementById(tableBodyId);
            tableBody.innerHTML = '<tr><td colspan="4" style="opacity:0.5">Laden…</td></tr>';

            try {
                const querySnapshot = await getDocs(collection(db, collectionName));

                const docs = [];
                querySnapshot.forEach(doc => docs.push(doc.data()));
                docs.sort((a, b) => b.points - a.points);

                let rank = 1;
                const medals = ['🥇', '🥈', '🥉'];
                tableBody.innerHTML = '';

                for (const data of docs) {
                    if (!data.points || data.points < minPoints) continue;
                    const row = document.createElement('tr');

                    const rankCell = document.createElement('td');
                    if (rank <= 3) {
                        const h1 = document.createElement('h1');
                        h1.textContent = medals[rank - 1];
                        rankCell.appendChild(h1);
                    } else {
                        rankCell.textContent = rank;
                    }

                    const playerCell = document.createElement('td');
                    playerCell.textContent = data.name;

                    const pointsCell = document.createElement('td');
                    pointsCell.textContent = collectionName === 'chase'
                        ? `$${data.points}`
                        : collectionName === 'rider'
                        ? `${data.points} Flips`
                        : `${data.points} points`;

                    const dateCell = document.createElement('td');
                    if (data.created) {
                        const date = data.created.toDate ? data.created.toDate() : new Date(data.created);
                        dateCell.textContent = date.toLocaleString('de-DE');
                    } else {
                        dateCell.textContent = '';
                    }

                    row.appendChild(rankCell);
                    row.appendChild(playerCell);
                    row.appendChild(pointsCell);
                    row.appendChild(dateCell);

                    tableBody.appendChild(row);
                    rank++;
                }

                if (rank === 1) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="opacity:0.5">Noch keine Einträge</td></tr>';
                }
            } catch (error) {
                console.error("Error loading scores: ", error);
                tableBody.innerHTML = '<tr><td colspan="4">Fehler beim Laden.</td></tr>';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadScores('red-pixel', 500, 'score-table-body-red');
            loadScores('chase', 49, 'score-table-body-chase');
            loadScores('rider', 14, 'score-table-body-rider');

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(btn.dataset.tab).classList.add('active');
                });
            });
        });
    </script>

    <title>1100pixels.com // Scores</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background-color: #13293b;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }

        .logo {
            position: absolute;
            left: 50%;
            margin-left: -100px;
            top: 15px;
        }

        a {
            color: white;
        }

        table {
            width: 100%;
            text-align: center;
            border-collapse: collapse;
        }

        table thead td {
            font-weight: bold;
            color: #569aa9;
            padding: 8px 4px;
        }

        tr td {
            border-bottom: 1px solid gray;
            color: #f58642;
            padding: 6px 4px;
        }

        .back-btn {
            position: absolute;
            top: 45px;
            left: 20px;
            background-color: #569aa9;
            padding: 3px 8px;
            padding-bottom: 5px;
            border: 1px solid white;
            text-decoration: none;
            border-radius: 3px;
        }

        .back-btn:hover {
            background-color: white;
            color: #569aa9;
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 80px 0 20px 0;
        }

        .tab-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.2s;
        }

        .tab-btn.active {
            background: #569aa9;
            border-color: #569aa9;
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255,255,255,0.2);
        }

        .tab-content {
            display: none;
            padding: 0 10px 40px 10px;
        }

        .tab-content.active {
            display: block;
        }

        #tab-chase tr td {
            color: #ffcc44;
        }

        #tab-rider tr td {
            color: #ff8844;
        }
    </style>
</head>

<body>
    <a class="back-btn" href="/">← Zurück</a>

    <div class="tabs">
        <button class="tab-btn active" data-tab="tab-red">🔴 RED PIXELS</button>
        <button class="tab-btn" data-tab="tab-chase">🚔 CHASE</button>
        <button class="tab-btn" data-tab="tab-rider">🏍️ RIDER</button>
    </div>

    <div id="tab-red" class="tab-content active">
        <table>
            <thead>
                <tr>
                    <td>Platz</td>
                    <td>Spieler</td>
                    <td>Punkte</td>
                    <td>Datum</td>
                </tr>
            </thead>
            <tbody id="score-table-body-red">
                <!-- Scores will be loaded here by JavaScript -->
            </tbody>
        </table>
    </div>

    <div id="tab-chase" class="tab-content">
        <table>
            <thead>
                <tr>
                    <td>Platz</td>
                    <td>Spieler</td>
                    <td>Score</td>
                    <td>Datum</td>
                </tr>
            </thead>
            <tbody id="score-table-body-chase">
                <!-- Scores will be loaded here by JavaScript -->
            </tbody>
        </table>
    </div>

    <div id="tab-rider" class="tab-content">
        <table>
            <thead>
                <tr>
                    <td>Platz</td>
                    <td>Spieler</td>
                    <td>Flips</td>
                    <td>Datum</td>
                </tr>
            </thead>
            <tbody id="score-table-body-rider">
                <!-- Scores will be loaded here by JavaScript -->
            </tbody>
        </table>
    </div>
</body>

</html>
