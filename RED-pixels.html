<html>

<head>
	<script src="https://code.jquery.com/jquery-1.9.1.min.js"></script>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="/redpixel.css">
	</link>
	<script type="module">
		import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
		import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";
		const firebaseConfig = {
			apiKey: "AIzaSyCGxWCAMbglUMjHeKRdeniS4TcA5oCAx1c",
			authDomain: "pixels-e2f82.firebaseapp.com",
			projectId: "pixels-e2f82",
			messagingSenderId: "311496840709",
			appId: "1:311496840709:web:3a94601ef40cbd0c946e6c"
		};
		const app = initializeApp(firebaseConfig);
		const db = getFirestore(app);

		window.storeResult = async function (name, points) {
			if (points <= 0 || name.length == 0) {
				return;
			}

			const docRef = await addDoc(collection(db, "red-pixel"), {
				name: name,
				points: points,
				created: new Date()
			});
		}
	</script>
</head>

<body>
	<audio id="soundRight" src="./red-pixel/right.mp3" preload="auto"></audio>
	<audio id="soundWrong" src="./red-pixel/wrong.mp3" preload="auto"></audio>

	<div id="name-modal" class="show">
		<div class="modal-box">
			<h1>RED<br>PIXELS</h1>
			<p class="modal-subtitle">Gib deinen Namen ein</p>
			<input type="text" id="name-input" placeholder="Dein Name..." maxlength="20" autocomplete="off" spellcheck="false">
			<button id="name-submit">Spielen</button>
		</div>
	</div>

	<div id="game-over-modal">
		<div class="modal-box">
			<h1>Game Over</h1>
			<p class="final-score">Deine Punkte<span id="final-score-display">0</span></p>
			<button onclick="location.href='/'">Nochmal spielen</button>
		</div>
	</div>

	<div class="header">
		<h2 class="points"><span>0</span> P.</h2>
		<h2 class="title">Finde die sich nicht ändernde rote Box.</h2>
		<h2 class="level">Level <span id="level-display">1</span></h2>
		<h2 class="time"><span>15</span> S.</h2>
	</div>
	<div id="box-container"></div>
	<div id="solution-bar">
		<button id="solution">Zeige Lösung <span id="show-solution"></span></button>
	</div>

	<script type="module">
		import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

		var name = '';
		var point = 0;
		var time = 15;
		var level = 0;
		var width = window.innerWidth;
		var boxWidth = 30;
		if (width < 431) {
			boxWidth = 40;
		} else if (width < 1024) {
			boxWidth = 35;
		}
		var boxesInRow = (width / (boxWidth + 2)).toFixed() - 1;
		var amount = boxesInRow * 4;
		var target = 1;
		var targetColor = 'red';

		const soundWrong = document.getElementById("soundWrong");
		const soundRight = document.getElementById("soundRight");

		function setColors() {
			$(".box").each(function (index) {
				if (index != target) {
					$(this).css("background-color", getRandomColor());
					$(this).removeClass("target");
				} else {
					$(this).css("background-color", targetColor);
					$(this).addClass("target");
				}
			});
		}

		function getRandomColor() {
			var letters = '0123456789ABCDEF';
			var color = '#';
			for (var j = 0; j < 6; j++) {
				color += letters[Math.floor(Math.random() * 16)];
			}
			return color;
		}

		$("#solution-bar #solution").on("click", function () {
			point = point - 100;
			$(".points span").html(point);
			$("#show-solution").text(target);
			$(".target").addClass("big");
			soundWrong.currentTime = 0;
			soundWrong.play();
		});

		function playGameOverSound() {
			try {
				const ctx = new (window.AudioContext || window.webkitAudioContext)();
				[[494, 0], [392, 0.22], [330, 0.44], [196, 0.70]].forEach(([freq, t]) => {
					const osc = ctx.createOscillator();
					const gain = ctx.createGain();
					osc.connect(gain);
					gain.connect(ctx.destination);
					osc.frequency.value = freq;
					osc.type = 'sawtooth';
					gain.gain.setValueAtTime(0.3, ctx.currentTime + t);
					gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.28);
					osc.start(ctx.currentTime + t);
					osc.stop(ctx.currentTime + t + 0.3);
				});
			} catch (e) {}
		}

		function load() {
			level++;
			document.getElementById('level-display').textContent = level;
			target = (Math.random() * amount).toFixed();

			$("#box-container").empty();

			for (var i = 0; i < amount; i = i + 1) {
				$("#box-container").append('<div class="box"></div>');
			}

			setColors();

			$(".box").on("click", function () {
				if ($(this).index() == target) {

					$(".title").css('opacity', '0');
					$(".points").addClass('shake');
					point = point + 100;

					soundRight.currentTime = 0;
					soundRight.play();

					$(".points span").html(point);
					amount = amount + boxesInRow * 4;
					clearInterval(intervalID);

					time = time + 5;
					$(".time span").html(time);
					clearInterval(timeInerval);


					$("#show-solution").text("");
					load();

					$(".points").addClass('shake');
					setTimeout(() => {
						$(".points").removeClass('shake');
					}, 400);

					$(".time").addClass('shake');
					setTimeout(() => {
						$(".time").removeClass('shake');
					}, 400);
				} else {
					soundWrong.currentTime = 0;
					soundWrong.play();

					time = time - 2;
					if (time < 0) time = 0;
					$(".time span").html(time);
					clearInterval(timeInerval);

					$(".points").addClass('shake-wrong');
					setTimeout(() => {
						$(".points").removeClass('shake-wrong');
					}, 400);

					$(".time").addClass('shake-wrong');
					setTimeout(() => {
						$(".time").removeClass('shake-wrong');
					}, 400);
				}
			});

			var intervalID = setInterval(async function () {
				setColors();
			}, 1000);

			var timeInerval = setInterval(async function () {
				time = time - 1;
				if (time <= 0) {
					time = 0;
					$(".time span").html(0);
					clearInterval(timeInerval);
					clearInterval(intervalID);
					$(".points").addClass('shake-wrong');
					$(".time").addClass('shake-wrong');
					setTimeout(() => {
						$(".points").removeClass('shake-wrong');
						$(".time").removeClass('shake-wrong');
					}, 500);
					playGameOverSound();
					await storeResult(name, point);
					document.getElementById('final-score-display').textContent = point;
					document.getElementById('game-over-modal').classList.add('show');
					return;
				}
				$(".time span").html(time);
			}, 1000);
		}

		const nameModal = document.getElementById('name-modal');
		const nameInput = document.getElementById('name-input');

		function submitName() {
			const val = nameInput.value.trim();
			if (val.length === 0) {
				nameInput.classList.add('input-error');
				setTimeout(() => nameInput.classList.remove('input-error'), 400);
				return;
			}
			name = val;
			nameModal.classList.remove('show');
			load();
		}

		document.getElementById('name-submit').addEventListener('click', submitName);
		nameInput.addEventListener('keydown', (e) => {
			if (e.key === 'Enter') submitName();
		});
		nameInput.focus();
	</script>
</body>

</html>
