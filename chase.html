        for (let bx = startBX; bx <= endBX; bx++) {
            const sx = w2s(bx * PITCH + STREET_W / 2);
            m.fillRect(sx, 0, 1, MINI_SIZE);
        }
        for (let by = startBY; by <= endBY; by++) {
            const sy = h2s(by * PITCH + STREET_W / 2);
            m.fillRect(0, sy, MINI_SIZE, 1);
        }

        // Tunnels (cyan markers)
        m.fillStyle = '#44ccff';
        for (let by = startBY; by <= endBY; by++) {
            for (let bx = startBX; bx <= endBX; bx++) {
                if (isTunnelH(bx, by)) {
                    const sx = w2s(bx * PITCH + STREET_W + BLOCK_SIZE / 2);
                    const sy = h2s(by * PITCH + STREET_W / 2);
                    m.fillRect(sx - 4, sy - 1, 8, 2);
                }
                if (isTunnelV(bx, by)) {
                    const sx = w2s(bx * PITCH + STREET_W / 2);
                    const sy = h2s(by * PITCH + STREET_W + BLOCK_SIZE / 2);
                    m.fillRect(sx - 1, sy - 4, 2, 8);
                }
            }
        }

        // Bank dots on minimap
        for (let by = startBY - 1; by <= endBY + 1; by++) {
            for (let bx = startBX - 1; bx <= endBX + 1; bx++) {
                if (!isBank(bx, by)) continue;
                const key = bx + ',' + by;
                const bsX = w2s(bx * PITCH + STREET_W + BLOCK_SIZE / 2);
                const bsY = h2s(by * PITCH + STREET_W + BLOCK_SIZE / 2);
                m.fillStyle = robbedBanks.has(key) ? 'rgba(255,255,255,0.2)' : '#ffcc00';
                m.fillRect(bsX - 3, bsY - 3, 6, 6);
            }
        }

        // Helis
        for (const c of cops || []) {
            if (Math.abs(c.x - px) > half || Math.abs(c.y - py) > half) continue;
            m.fillStyle = c.state === 'search' ? '#ffcc44' : '#ff3333';
            const sx = w2s(c.x), sy = h2s(c.y);
            m.fillRect(sx - 2, sy - 2, 4, 4);
            // Pulsing ring around chasing helis
            if (c.state === 'chase') {
                const pulse = (Math.sin(performance.now() / 180) + 1) / 2;
                m.fillStyle = `rgba(255,68,68,${0.5 - pulse * 0.4})`;
                m.fillRect(sx - 4, sy - 4, 8, 8);
            }
        }

        // Ground cops (blue dots)
        for (const g of groundCops || []) {
            if (Math.abs(g.x - px) > half || Math.abs(g.y - py) > half) continue;
            const sx = w2s(g.x), sy = h2s(g.y);
            m.fillStyle = '#4488ff';
            m.fillRect(sx - 3, sy - 3, 6, 6);
        }


        // Marker auf Minimap
        for (const mk of mapMarkers) {
            if (Math.abs(mk.x - px) > half || Math.abs(mk.y - py) > half) continue;
            const sx = w2s(mk.x), sy = h2s(mk.y);
            m.fillStyle = '#ff4466';
            m.shadowColor = '#ff4466';
            m.shadowBlur  = 4;
            m.beginPath();
            m.arc(sx, sy, 3, 0, Math.PI * 2);
            m.fill();
            m.shadowBlur = 0;
        }

        // Player (centered) + direction
        const cx = MINI_SIZE / 2, cy = MINI_SIZE / 2;
        m.strokeStyle = '#ffcc44';
        m.lineWidth = 1.5;
        m.beginPath();
        m.moveTo(cx, cy);
        m.lineTo(cx + Math.cos(player ? player.angle : 0) * 9,
                 cy + Math.sin(player ? player.angle : 0) * 9);
        m.stroke();
        m.fillStyle = player && player.inTunnel ? '#44ccff' : '#ffcc44';
        m.fillRect(cx - 2, cy - 2, 5, 5);
    }

    function drawBanners() {
        if (banners.length === 0) return;
        let y = H * 0.32;
        for (const b of banners) {
            const t = 1 - b.life / b.max;
            const fadeOut = b.life < 0.35 ? b.life / 0.35 : 1;
            const fadeIn  = t < 0.15 ? t / 0.15 : 1;
            const a = Math.min(fadeIn, fadeOut);
            const dy = b.big ? Math.sin(t * Math.PI) * 6 : 0;
            ctx.font = b.big
                ? 'bold ' + Math.round(22) + 'px monospace'
                : 'bold ' + Math.round(11) + 'px monospace';
            ctx.textAlign = 'center';
            ctx.globalAlpha = a;
            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.85)';
            ctx.fillText(b.text, W / 2 + 1, y + 1 + dy);
            ctx.fillStyle = b.color;
            ctx.fillText(b.text, W / 2, y + dy);
            ctx.globalAlpha = 1;
            y += b.big ? 26 : 14;
        }
        ctx.textAlign = 'left';
    }

    function drawSpeedLines() {
        const count = 8;
        ctx.strokeStyle = 'rgba(255,200,80,0.45)';
        ctx.lineWidth = 1.5;
        for (let i = 0; i < count; i++) {
            const edge = Math.random() < 0.5 ? 0 : 1; // left/right
            const x = edge === 0 ? Math.random() * W * 0.18 : W - Math.random() * W * 0.18;
            const y = Math.random() * H;
            const len = 8 + Math.random() * 16;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + (edge === 0 ? -len : len), y);
            ctx.stroke();
        }
    }

    function drawBanks() {
        const vw2 = W * PIXEL_SCALE / cameraZoom / 2 + PITCH;
        const vh2 = H * PIXEL_SCALE / cameraZoom / 2 + PITCH;
        const startBX = Math.floor((camX - vw2) / PITCH);
        const endBX   = Math.ceil ((camX + vw2) / PITCH);
        const startBY = Math.floor((camY - vh2) / PITCH);
        const endBY   = Math.ceil ((camY + vh2) / PITCH);

        for (let by = startBY; by <= endBY; by++) {
            for (let bx = startBX; bx <= endBX; bx++) {
                if (!isBank(bx, by)) continue;
                const key    = bx + ',' + by;
                const robbed = robbedBanks.has(key);
                const x0 = bx * PITCH + STREET_W;
                const y0 = by * PITCH + STREET_W;
                const w  = BLOCK_SIZE, h = BLOCK_SIZE;
                const cx = x0 + w / 2, cy = y0 + h / 2;
                const isRobbing = bankRobTarget && bankRobTarget.key === key;

                ctx.save();
                if (robbed) {
                    ctx.fillStyle = 'rgba(0,0,0,0.52)';
                    ctx.fillRect(x0, y0, w, h);
                    ctx.fillStyle = 'rgba(255,255,255,0.18)';
                    ctx.font = 'bold 15px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('AUSGERAUBT', cx, cy);
                } else {
                    ctx.fillStyle = 'rgba(0,55,18,0.58)';
                    ctx.fillRect(x0, y0, w, h);
                    ctx.fillStyle = '#c8a800';
                    ctx.fillRect(x0 + 14, y0 + h - 7, w - 28, 7);
                    ctx.fillStyle = '#ffcc00';
                    ctx.shadowColor = '#ffcc00';
                    ctx.shadowBlur = isRobbing ? 22 : 8;
                    ctx.font = 'bold 26px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('BANK', cx, cy);
                    ctx.shadowBlur = 0;
                    if (isRobbing) {
                        const pct = bankRobTimer / BANK_ROB_SECS;
                        ctx.strokeStyle = '#ffcc00';
                        ctx.lineWidth = 5;
                        ctx.lineCap = 'round';
                        ctx.shadowColor = '#ffcc00';
                        ctx.shadowBlur = 10;
                        ctx.beginPath();
                        ctx.arc(cx, cy + 26, 18, -Math.PI / 2, -Math.PI / 2 + pct * Math.PI * 2);
                        ctx.stroke();
                    }
                }
                ctx.restore();
            }
        }
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
    }

    function drawWater() {
        const t = elapsed * 0.8;

        // Land-Fläche (Stadt) als dunkles Rechteck — night mode
        ctx.fillStyle = '#06090f';
        ctx.fillRect(WORLD_MIN, WORLD_MIN, WORLD_MAX - WORLD_MIN, WORLD_MAX - WORLD_MIN);

        // Küstenlinie — sandiger Rand
        const shore = 18;
        ctx.fillStyle = '#2a3a2a';
        ctx.fillRect(WORLD_MIN - shore, WORLD_MIN - shore,
                     WORLD_MAX - WORLD_MIN + shore * 2, shore); // oben
        ctx.fillRect(WORLD_MIN - shore, WORLD_MAX,
                     WORLD_MAX - WORLD_MIN + shore * 2, shore); // unten
        ctx.fillRect(WORLD_MIN - shore, WORLD_MIN,
                     shore, WORLD_MAX - WORLD_MIN);             // links
        ctx.fillRect(WORLD_MAX, WORLD_MIN,
                     shore, WORLD_MAX - WORLD_MIN);             // rechts

        // Wasser-Wellen (animierte horizontale Streifen)
        ctx.globalAlpha = 0.18;
        ctx.fillStyle = '#4499cc';
        const vw2 = W * PIXEL_SCALE / cameraZoom / 2 + 300;
        const vh2 = H * PIXEL_SCALE / cameraZoom / 2 + 300;
        const waveSpacing = 60;
        for (let wy = camY - vh2; wy < camY + vh2; wy += waveSpacing) {
            const waveY = wy - (wy % waveSpacing) + Math.sin(t + wy * 0.01) * 8;
            if (waveY > WORLD_MIN - 200 && waveY < WORLD_MIN - 4) {
                ctx.fillRect(camX - vw2, waveY, vw2 * 2, 3);
            }
            if (waveY > WORLD_MAX + 4 && waveY < WORLD_MAX + 200) {
                ctx.fillRect(camX - vw2, waveY, vw2 * 2, 3);
            }
        }
        for (let wx = camX - vw2; wx < camX + vw2; wx += waveSpacing) {
            const waveX = wx - (wx % waveSpacing) + Math.sin(t * 1.3 + wx * 0.01) * 8;
            if (waveX > WORLD_MIN - 200 && waveX < WORLD_MIN - 4) {
                ctx.fillRect(waveX, camY - vh2, 3, vh2 * 2);
            }
            if (waveX > WORLD_MAX + 4 && waveX < WORLD_MAX + 200) {
                ctx.fillRect(waveX, camY - vh2, 3, vh2 * 2);
            }
        }
        ctx.globalAlpha = 1;

        // Leuchtende Grenze am Rand
        ctx.strokeStyle = 'rgba(80,180,255,0.35)';
        ctx.lineWidth = 4;
        ctx.strokeRect(WORLD_MIN, WORLD_MIN, WORLD_MAX - WORLD_MIN, WORLD_MAX - WORLD_MIN);
    }

    function drawStreets() {
        // Visible block range — view in world units = canvas internal * PIXEL_SCALE
        const vw2 = W * PIXEL_SCALE / cameraZoom / 2;
        const vh2 = H * PIXEL_SCALE / cameraZoom / 2;
        const left   = camX - vw2 - PITCH;
        const right  = camX + vw2 + PITCH;
        const top    = camY - vh2 - PITCH;
        const bottom = camY + vh2 + PITCH;

        const startBX = Math.floor(left   / PITCH);
        const endBX   = Math.ceil (right  / PITCH);
        const startBY = Math.floor(top    / PITCH);
        const endBY   = Math.ceil (bottom / PITCH);

        // 1) Sidewalk (full drivable zone) — darker for night
        ctx.fillStyle = '#1c2030';
        for (let bx = startBX; bx <= endBX; bx++) {
            ctx.fillRect(bx * PITCH, top - 5, STREET_W, bottom - top + 10);
        }
        for (let by = startBY; by <= endBY; by++) {
            ctx.fillRect(left - 5, by * PITCH, right - left + 10, STREET_W);
        }

        // 2) Road (narrower, centered inside drivable zone)
        ctx.fillStyle = '#0d1118';
        for (let bx = startBX; bx <= endBX; bx++) {
            ctx.fillRect(bx * PITCH + SIDEWALK, top - 5, ROAD_W, bottom - top + 10);
        }
        for (let by = startBY; by <= endBY; by++) {
            ctx.fillRect(left - 5, by * PITCH + SIDEWALK, right - left + 10, ROAD_W);
        }

        // Lane markings — center dashed (only drawn over road, masking handled by overdraw)
        ctx.strokeStyle = 'rgba(255,220,80,0.32)';
        ctx.lineWidth = 2.5;
        ctx.setLineDash([18, 18]);
        for (let bx = startBX; bx <= endBX; bx++) {
            const x = bx * PITCH + STREET_W / 2;
            ctx.beginPath();
            ctx.moveTo(x, top); ctx.lineTo(x, bottom); ctx.stroke();
        }
        for (let by = startBY; by <= endBY; by++) {
            const y = by * PITCH + STREET_W / 2;
            ctx.beginPath();
            ctx.moveTo(left, y); ctx.lineTo(right, y); ctx.stroke();
        }
        ctx.setLineDash([]);

        // Curb at sidewalk/building boundary
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        for (let bx = startBX; bx <= endBX; bx++) {
            ctx.fillRect(bx * PITCH - 2, top, 2, bottom - top);
            ctx.fillRect(bx * PITCH + STREET_W, top, 2, bottom - top);
        }
        for (let by = startBY; by <= endBY; by++) {
            ctx.fillRect(left, by * PITCH - 2, right - left, 2);
            ctx.fillRect(left, by * PITCH + STREET_W, right - left, 2);
        }

    }

    function drawTunnels() {
        const vw2 = W * PIXEL_SCALE / cameraZoom / 2;
        const vh2 = H * PIXEL_SCALE / cameraZoom / 2;
        const left   = camX - vw2 - PITCH;
        const right  = camX + vw2 + PITCH;
        const top    = camY - vh2 - PITCH;
        const bottom = camY + vh2 + PITCH;
        const startBX = Math.floor(left   / PITCH);
        const endBX   = Math.ceil (right  / PITCH);
        const startBY = Math.floor(top    / PITCH);
        const endBY   = Math.ceil (bottom / PITCH);
        for (let by = startBY; by <= endBY; by++) {
            for (let bx = startBX; bx <= endBX; bx++) {
                if (isTunnelH(bx, by)) drawTunnelH(bx, by);
                if (isTunnelV(bx, by)) drawTunnelV(bx, by);
            }
        }
    }

    function drawTunnelH(bx, by) {
        const x0 = bx * PITCH + STREET_W;
        const y0 = by * PITCH;
        const w  = BLOCK_SIZE;
        const m  = 36;

        // Semi-transparent cap — player visible faintly through it
        ctx.fillStyle = 'rgba(6,9,15,0.78)';
        ctx.fillRect(x0 + m, y0, w - m * 2, STREET_W);

        // Roof rims
        ctx.fillStyle = '#1c2638';
        ctx.fillRect(x0 + m, y0, w - m * 2, 6);
        ctx.fillRect(x0 + m, y0 + STREET_W - 6, w - m * 2, 6);

        // Entry/exit highlight
        ctx.fillStyle = '#3a4458';
        ctx.fillRect(x0 + m - 4, y0 + 6, 4, STREET_W - 12);
        ctx.fillRect(x0 + w - m, y0 + 6, 4, STREET_W - 12);

        // Tunnel ceiling lights
        ctx.fillStyle = '#ffdd66';
        for (let lx = x0 + m + 24; lx < x0 + w - m - 12; lx += 48) {
            ctx.fillRect(lx, y0 + STREET_W / 2 - 2, 12, 4);
        }
    }

    function drawTunnelV(bx, by) {
        const x0 = bx * PITCH;
        const y0 = by * PITCH + STREET_W;
        const h  = BLOCK_SIZE;
        const m  = 36;

        ctx.fillStyle = 'rgba(6,9,15,0.78)';
        ctx.fillRect(x0, y0 + m, STREET_W, h - m * 2);

        ctx.fillStyle = '#1c2638';
        ctx.fillRect(x0, y0 + m, 6, h - m * 2);
        ctx.fillRect(x0 + STREET_W - 6, y0 + m, 6, h - m * 2);

        ctx.fillStyle = '#3a4458';
        ctx.fillRect(x0 + 6, y0 + m - 4, STREET_W - 12, 4);
        ctx.fillRect(x0 + 6, y0 + h - m, STREET_W - 12, 4);

        ctx.fillStyle = '#ffdd66';
        for (let ly = y0 + m + 24; ly < y0 + h - m - 12; ly += 48) {
            ctx.fillRect(x0 + STREET_W / 2 - 2, ly, 4, 12);
        }
    }

    function drawBuildings() {
        const vw2 = W * PIXEL_SCALE / cameraZoom / 2;
        const vh2 = H * PIXEL_SCALE / cameraZoom / 2;
        const left   = camX - vw2 - PITCH;
        const right  = camX + vw2 + PITCH;
        const top    = camY - vh2 - PITCH;
        const bottom = camY + vh2 + PITCH;
        const startBX = Math.floor(left   / PITCH);
        const endBX   = Math.ceil (right  / PITCH);
        const startBY = Math.floor(top    / PITCH);
        const endBY   = Math.ceil (bottom / PITCH);

        for (let by = startBY; by <= endBY; by++) {
            for (let bx = startBX; bx <= endBX; bx++) {
                if (isMergedRight(bx - 1, by)) continue;
                if (isMergedDown(bx, by - 1))  continue;

                const x0 = bx * PITCH + STREET_W;
                const y0 = by * PITCH + STREET_W;
                let w = BLOCK_SIZE;
                let h = BLOCK_SIZE;

                if (isMergedRight(bx, by)) w += STREET_W + BLOCK_SIZE;
                if (isMergedDown(bx, by))  h += STREET_W + BLOCK_SIZE;

                drawBlock(x0, y0, w, h, bx, by);
            }
        }
    }

    function drawBlock(x0, y0, w, h, bx, by) {
        const r = blockHash(bx, by);
        // Night mode: very dark base
        ctx.fillStyle = '#080e18';
        ctx.fillRect(x0, y0, w, h);

        const variant = Math.floor(r * 4);
        switch (variant) {
            case 0: drawGrayTower    (x0, y0, w, h, r); break;
            case 1: drawGrayApartment(x0, y0, w, h, r); break;
            case 2: drawGrayHouses   (x0, y0, w, h, r); break;
            default: drawGrayWarehouse(x0, y0, w, h, r); break;
        }

        ctx.strokeStyle = 'rgba(0,0,0,0.7)';
        ctx.lineWidth = 1;
        ctx.strokeRect(x0 + 4.5, y0 + 4.5, w - 9, h - 9);
        // Top/left: dark shadow for depth
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(x0, y0, w, 3);
        ctx.fillRect(x0, y0, 3, h);
        // Bottom/right: light highlight
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(x0 + 3, y0 + h - 2, w - 3, 2);
        ctx.fillRect(x0 + w - 2, y0 + 3, 2, h - 3);
    }

    function drawGrayTower(x, y, w, h, r) {
        // Slight variations in gray
        const shades = ['#52565e', '#5a5e66', '#4a4e56'];
        ctx.fillStyle = shades[Math.floor(r * 100) % shades.length];
        ctx.fillRect(x + 4, y + 4, w - 8, h - 8);

        // Top-left highlight
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(x + 4, y + 4, w - 8, 2);
        ctx.fillRect(x + 4, y + 4, 2, h - 8);

        // Dense small windows — night: warm orange glow
        const cw = 5, ch = 6, gx = 5, gy = 5;
        for (let wy = y + 14; wy + ch < y + h - 12; wy += ch + gy) {
            for (let wx = x + 14; wx + cw < x + w - 12; wx += cw + gx) {
                const lit = Math.abs(Math.sin(wx * 12.9898 + wy * 78.233 + r * 100) * 43758.5453) % 1 > 0.5;
                ctx.fillStyle = lit ? 'rgba(255,210,110,0.75)' : 'rgba(0,0,0,0.6)';
                if (lit) { ctx.shadowColor = 'rgba(255,190,80,0.5)'; ctx.shadowBlur = 4; }
                ctx.fillRect(wx, wy, cw, ch);
                ctx.shadowBlur = 0;
            }
        }

        // Rooftop AC unit center
        const cx = x + w / 2, cy = y + h / 2;
        ctx.fillStyle = '#3a3e46';
        ctx.fillRect(cx - 14, cy - 8, 28, 16);
        ctx.fillStyle = '#2a2e36';
        for (let i = 0; i < 4; i++) {
            ctx.fillRect(cx - 12 + i * 7, cy - 6, 4, 12);
        }
    }

    function drawGrayApartment(x, y, w, h, r) {
        ctx.fillStyle = '#56544c';
        ctx.fillRect(x + 4, y + 4, w - 8, h - 8);

        // Subtle horizontal courses (brick stripes)
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        for (let by2 = y + 12; by2 < y + h - 8; by2 += 9) {
            ctx.fillRect(x + 5, by2, w - 10, 1);
        }

        // Larger window grid — night: warm yellow/orange glow
        const wW = 12, wH = 16, gx = 8, gy = 10;
        for (let wy = y + 14; wy + wH < y + h - 8; wy += wH + gy) {
            for (let wx = x + 12; wx + wW < x + w - 8; wx += wW + gx) {
                const lit = Math.abs(Math.sin(wx * 12.9898 + wy * 78.233 + r * 200) * 43758.5453) % 1 > 0.45;
                ctx.fillStyle = lit ? 'rgba(255,200,100,0.7)' : 'rgba(10,8,4,0.8)';
                if (lit) { ctx.shadowColor = 'rgba(255,180,60,0.5)'; ctx.shadowBlur = 5; }
                ctx.fillRect(wx, wy, wW, wH);
                ctx.shadowBlur = 0;
                // Window cross
                ctx.fillStyle = 'rgba(0,0,0,0.45)';
                ctx.fillRect(wx + wW / 2 - 0.5, wy, 1, wH);
                ctx.fillRect(wx, wy + wH / 2 - 0.5, wW, 1);
            }
        }
    }

    function drawGrayHouses(x, y, w, h, r) {
        // Yard ground — clearly lighter than streets to avoid tunnel look
        ctx.fillStyle = '#6a6e68';
        ctx.fillRect(x + 4, y + 4, w - 8, h - 8);

        const cols = 2, rows = 2;
        const padX = 14, padY = 14, gapX = 18, gapY = 18;
        const hw = (w - padX * 2 - gapX * (cols - 1)) / cols;
        const hh = (h - padY * 2 - gapY * (rows - 1)) / rows;
        const shades = ['#5e6068', '#56585e', '#62646a', '#52545a'];

        // Fence lines in gaps so they don't look like tunnels
        const fenceColor = '#4a4e4a';
        ctx.fillStyle = fenceColor;
        // Horizontal fence (between rows)
        const fenceY = y + padY + hh + gapY / 2 - 0.5;
        ctx.fillRect(x + padX, fenceY, w - padX * 2, 2);
        // Vertical fence (between columns)
        const fenceX = x + padX + hw + gapX / 2 - 0.5;
        ctx.fillRect(fenceX, y + padY, 2, h - padY * 2);

        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const hx = x + padX + col * (hw + gapX);
                const hy = y + padY + row * (hh + gapY);
                ctx.fillStyle = shades[Math.floor(rng2(col * 7 + row * 13, r * 200) * shades.length)];
                ctx.fillRect(hx, hy, hw, hh);
                // Roof ridge
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(hx, hy + hh / 2 - 0.5, hw, 1);
                // Top/bottom shading
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.fillRect(hx, hy, hw, 3);
                ctx.fillRect(hx, hy + hh - 3, hw, 3);
                // Outline
                ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1;
                ctx.strokeRect(hx + 0.5, hy + 0.5, hw - 1, hh - 1);
            }
        }
    }

    function drawGrayWarehouse(x, y, w, h, r) {
        ctx.fillStyle = '#4e5258';
        ctx.fillRect(x + 4, y + 4, w - 8, h - 8);

        // Corrugated roof lines
        ctx.strokeStyle = 'rgba(0,0,0,0.28)';
        ctx.lineWidth = 1;
        for (let cy = y + 12; cy < y + h - 8; cy += 8) {
            ctx.beginPath();
            ctx.moveTo(x + 8, cy); ctx.lineTo(x + w - 8, cy);
            ctx.stroke();
        }

        // Loading docks bottom
        ctx.fillStyle = '#1c1e22';
        const dockW = 14, dockH = 9;
        for (let i = 0; i < 5; i++) {
            const dx = x + 16 + i * (dockW + 8);
            if (dx + dockW > x + w - 16) break;
            ctx.fillRect(dx, y + h - 14, dockW, dockH);
        }

        // Roof unit
        const cx = x + w / 2, cy = y + h / 2 - 4;
        ctx.fillStyle = '#3a3e46';
        ctx.fillRect(cx - 18, cy - 10, 36, 20);
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        for (let i = 0; i < 4; i++) {
            ctx.fillRect(cx - 15 + i * 8, cy - 7, 4, 14);
        }
    }

    function rng2(i, seed) {
        const v = Math.sin(i * 12.9898 + seed * 78.233) * 43758.5453;
        return v - Math.floor(v);
    }

    function drawOfficeTower(x, y, w, h, r) {
        const palettes = [
            { body:'#142239', win:'rgba(120,180,255,0.55)', dim:'rgba(20,40,80,0.6)' },
            { body:'#1c1830', win:'rgba(220,160,255,0.5)',  dim:'rgba(30,20,50,0.6)' },
            { body:'#1a1d28', win:'rgba(255,200,120,0.5)',  dim:'rgba(40,30,15,0.65)' },
        ];
        const p = palettes[Math.floor(r * 100) % palettes.length];

        ctx.fillStyle = p.body;
        ctx.fillRect(x + 4, y + 4, w - 8, h - 8);

        // Top edge highlight
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(x + 4, y + 4, w - 8, 2);
        ctx.fillRect(x + 4, y + 4, 2, h - 8);

        // Dense small windows
        const cw = 6, ch = 7, gx = 5, gy = 6;
        for (let wy = y + 14; wy + ch < y + h - 12; wy += ch + gy) {
            for (let wx = x + 12; wx + cw < x + w - 12; wx += cw + gx) {
                const lit = rng2(wx + wy * 7, r * 1000) > 0.55;
                ctx.fillStyle = lit ? p.win : p.dim;
                ctx.fillRect(wx, wy, cw, ch);
            }
        }

        // Rooftop: helipad or AC
        const cx = x + w / 2, cy = y + h / 2;
        if (r > 0.5) {
            // Helipad H
            ctx.fillStyle = '#1a1f2a';
            ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = 'rgba(255,200,80,0.65)'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = '#ffcc44';
            ctx.font = 'bold 16px monospace';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('H', cx, cy);
            ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
        } else {
            // AC unit + red blinker
            ctx.fillStyle = '#0c1422';
            ctx.fillRect(cx - 14, cy - 8, 28, 16);
            ctx.fillStyle = '#1a2436';
            ctx.fillRect(cx - 12, cy - 6, 24, 12);
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            for (let i = 1; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(cx - 12 + i * 6, cy - 6);
                ctx.lineTo(cx - 12 + i * 6, cy + 6);
                ctx.stroke();
            }
            ctx.fillStyle = '#ff2222';
            ctx.shadowColor = '#ff2222'; ctx.shadowBlur = 6;
            ctx.beginPath(); ctx.arc(cx + 16, cy, 1.8, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    function drawApartments(x, y, w, h, r) {
        const palettes = [
            { body:'#3d2820', stripe:'rgba(0,0,0,0.18)', win:'rgba(255,200,100,0.5)', dim:'rgba(40,28,18,0.78)' },
            { body:'#33272a', stripe:'rgba(0,0,0,0.18)', win:'rgba(255,210,150,0.45)', dim:'rgba(34,26,28,0.78)' },
            { body:'#2c2e36', stripe:'rgba(0,0,0,0.18)', win:'rgba(220,210,180,0.45)', dim:'rgba(28,30,38,0.78)' },
        ];
        const p = palettes[Math.floor(r * 100) % palettes.length];

        ctx.fillStyle = p.body;
        ctx.fillRect(x + 4, y + 4, w - 8, h - 8);

        // Brick stripes
        ctx.fillStyle = p.stripe;
        for (let by2 = y + 12; by2 < y + h - 8; by2 += 9) {
            ctx.fillRect(x + 5, by2, w - 10, 1);
        }

        // Large windows
        const wW = 14, wH = 18, gx = 8, gy = 10;
        for (let wy = y + 14; wy + wH < y + h - 8; wy += wH + gy) {
            for (let wx = x + 12; wx + wW < x + w - 8; wx += wW + gx) {
                const lit = rng2(wx + wy * 13, r * 500) > 0.5;
                ctx.fillStyle = lit ? p.win : p.dim;
                ctx.fillRect(wx, wy, wW, wH);
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(wx + wW/2 - 0.5, wy, 1, wH);
                ctx.fillRect(wx, wy + wH/2 - 0.5, wW, 1);
                ctx.fillStyle = lit ? p.win : p.dim;
            }
        }
    }

    function drawHouses(x, y, w, h, r) {
        // Garden/grass base
        ctx.fillStyle = '#1c2e1f';
        ctx.fillRect(x + 4, y + 4, w - 8, h - 8);

        const cols = 2, rows = 2;
        const padX = 14, padY = 14, gapX = 18, gapY = 18;
        const hw = (w - padX * 2 - gapX * (cols - 1)) / cols;
        const hh = (h - padY * 2 - gapY * (rows - 1)) / rows;

        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const hx = x + padX + col * (hw + gapX);
                const hy = y + padY + row * (hh + gapY);
                // Uniform gray house
                ctx.fillStyle = '#5a5e66';
                ctx.fillRect(hx, hy, hw, hh);
                ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1;
                ctx.strokeRect(hx + 0.5, hy + 0.5, hw - 1, hh - 1);
            }
        }
    }

    function drawPark(x, y, w, h, r) {
        // Grass
        ctx.fillStyle = '#1d3a26';
        ctx.fillRect(x + 4, y + 4, w - 8, h - 8);

        // Subtle grass texture
        ctx.fillStyle = 'rgba(40,80,50,0.45)';
        for (let i = 0; i < 40; i++) {
            const px = x + 6 + rng2(i, r * 100) * (w - 12);
            const py = y + 6 + rng2(i + 200, r * 100) * (h - 12);
            ctx.fillRect(px, py, 3, 1);
        }

        // Pond on one side
        const pondX = x + w * (0.25 + r * 0.2);
        const pondY = y + h * (0.55 + r * 0.2);
        const pondR = Math.min(w, h) * 0.18;
        ctx.fillStyle = '#1e4a6a';
        ctx.beginPath(); ctx.ellipse(pondX, pondY, pondR, pondR * 0.7, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(150,200,255,0.25)';
        ctx.beginPath(); ctx.ellipse(pondX - pondR * 0.3, pondY - pondR * 0.2, pondR * 0.4, pondR * 0.25, 0, 0, Math.PI * 2); ctx.fill();

        // Path (curved-ish: just a diagonal line)
        ctx.strokeStyle = 'rgba(150,140,110,0.6)';
        ctx.lineWidth = 12;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(x + 8, y + h * 0.25);
        ctx.bezierCurveTo(x + w * 0.4, y + h * 0.3, x + w * 0.6, y + h * 0.85, x + w - 8, y + h * 0.6);
        ctx.stroke();
        ctx.lineWidth = 1;

        // Trees
        const treeCount = 7 + Math.floor(r * 4);
        for (let i = 0; i < treeCount; i++) {
            const tx = x + 16 + rng2(i, r * 300) * (w - 32);
            const ty = y + 16 + rng2(i + 99, r * 300) * (h - 32);
            // Skip if too close to pond
            if (Math.hypot(tx - pondX, ty - pondY) < pondR + 8) continue;
            const tr = 8 + rng2(i + 7, r * 50) * 5;
            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.beginPath(); ctx.arc(tx + 3, ty + 3, tr, 0, Math.PI * 2); ctx.fill();
            // Foliage
            ctx.fillStyle = '#2d5a35';
            ctx.beginPath(); ctx.arc(tx, ty, tr, 0, Math.PI * 2); ctx.fill();
            // Highlight
            ctx.fillStyle = 'rgba(80,140,80,0.45)';
            ctx.beginPath(); ctx.arc(tx - tr * 0.3, ty - tr * 0.3, tr * 0.55, 0, Math.PI * 2); ctx.fill();
            // Trunk dot
            ctx.fillStyle = '#3a2818';
            ctx.beginPath(); ctx.arc(tx, ty, tr * 0.25, 0, Math.PI * 2); ctx.fill();
        }
    }

    function drawPlaza(x, y, w, h, r) {
        // Light paved
        ctx.fillStyle = '#3a4254';
        ctx.fillRect(x + 4, y + 4, w - 8, h - 8);

        // Tile grid
        ctx.strokeStyle = 'rgba(0,0,0,0.18)';
        ctx.lineWidth = 1;
        const tile = 28;
        for (let tx = x + 4; tx < x + w - 4; tx += tile) {
            ctx.beginPath(); ctx.moveTo(tx, y + 4); ctx.lineTo(tx, y + h - 4); ctx.stroke();
        }
        for (let ty = y + 4; ty < y + h - 4; ty += tile) {
            ctx.beginPath(); ctx.moveTo(x + 4, ty); ctx.lineTo(x + w - 4, ty); ctx.stroke();
        }

        // Center fountain
        const cx = x + w / 2, cy = y + h / 2;
        const radius = Math.min(w, h) * 0.2;
        ctx.fillStyle = '#5a6478';
        ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#1e4a6a';
        ctx.beginPath(); ctx.arc(cx, cy, radius - 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(150,200,255,0.35)';
        ctx.beginPath(); ctx.arc(cx - radius * 0.3, cy - radius * 0.3, radius * 0.45, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#aabbcc';
        ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2); ctx.fill();
        // Spray dots
        ctx.fillStyle = 'rgba(180,220,255,0.7)';
        for (let i = 0; i < 8; i++) {
            const a = i / 8 * Math.PI * 2;
            ctx.beginPath();
            ctx.arc(cx + Math.cos(a) * 8, cy + Math.sin(a) * 8, 1.2, 0, Math.PI * 2);
            ctx.fill();
        }

        // Benches around plaza
        ctx.fillStyle = '#6a4a2a';
        ctx.fillRect(cx - 28, y + 14, 22, 4);
        ctx.fillRect(cx + 6,  y + 14, 22, 4);
        ctx.fillRect(cx - 28, y + h - 18, 22, 4);
        ctx.fillRect(cx + 6,  y + h - 18, 22, 4);
        ctx.fillRect(x + 14,    cy - 11, 4, 22);
        ctx.fillRect(x + w - 18, cy - 11, 4, 22);

        // Tree planters in corners
        ctx.fillStyle = '#2d5a35';
        for (const [px, py] of [[x+18,y+18],[x+w-18,y+18],[x+18,y+h-18],[x+w-18,y+h-18]]) {
            ctx.beginPath(); ctx.arc(px, py, 7, 0, Math.PI * 2); ctx.fill();
        }
    }

    function drawWarehouse(x, y, w, h, r) {
        // Two-tone industrial
        ctx.fillStyle = '#252b35';
        ctx.fillRect(x + 4, y + 4, w - 8, h - 8);

        // Corrugated roof ridges
        ctx.strokeStyle = 'rgba(0,0,0,0.28)';
        ctx.lineWidth = 1;
        for (let cy = y + 10; cy < y + h - 8; cy += 7) {
            ctx.beginPath();
            ctx.moveTo(x + 8, cy); ctx.lineTo(x + w - 8, cy);
            ctx.stroke();
        }

        // Loading docks bottom
        ctx.fillStyle = '#0c0e14';
        const dockW = 16, dockH = 10, startX = x + 16;
        for (let i = 0; i < 5; i++) {
            const dx = startX + i * (dockW + 8);
            if (dx + dockW > x + w - 16) break;
            ctx.fillRect(dx, y + h - 14, dockW, dockH);
            ctx.strokeStyle = 'rgba(255,200,80,0.25)';
            ctx.strokeRect(dx + 0.5, y + h - 13.5, dockW - 1, dockH - 1);
        }

        // Big rooftop unit
        const cx = x + w / 2, cy = y + h / 2 - 4;
        ctx.fillStyle = '#1a1f2a';
        ctx.fillRect(cx - 22, cy - 12, 44, 24);
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.strokeRect(cx - 21.5, cy - 11.5, 43, 23);
        // Vent stripes
        for (let i = 0; i < 5; i++) {
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(cx - 18 + i * 8, cy - 9, 4, 18);
        }

        // Side stripe
        const stripeColors = ['rgba(255,200,80,0.45)', 'rgba(255,80,80,0.4)', 'rgba(120,200,255,0.4)'];
        ctx.fillStyle = stripeColors[Math.floor(r * 100) % stripeColors.length];
        ctx.fillRect(x + 4, y + 8, w - 8, 3);
    }

    function drawBuilding(x, y, w, h, r) {
        const pad = 4 + (r * 6 % 1) * 6;
        const bx = x + pad, by = y + pad;
        const bw = w - pad * 2, bh = h - pad * 2;

        // Building body — colored variants
        const colorIdx = Math.floor(r * 5);
        const colors = ['#1a2942', '#2a1c3a', '#1f2f30', '#2c2a1c', '#2a1f1f'];
        ctx.fillStyle = colors[colorIdx];
        ctx.fillRect(bx, by, bw, bh);

        // Edges
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(bx, by, bw, 3);
        ctx.fillRect(bx, by, 3, bh);

        // Windows
        const winColor = ((r * 31) % 1) > 0.6 ? 'rgba(255,200,100,0.55)' : 'rgba(120,180,255,0.4)';
        const dimColor = 'rgba(255,255,255,0.04)';
        const cw = 10, ch = 10, gap = 6;
        for (let wy = by + 12; wy + ch < by + bh - 8; wy += ch + gap) {
            for (let wx = bx + 10; wx + cw < bx + bw - 8; wx += cw + gap) {
                const lit = Math.abs((Math.sin(wx * 12.9898 + wy * 78.233 + r * 100) * 43758.5453) % 1);
                ctx.fillStyle = (lit > 0.55) ? winColor : dimColor;
                ctx.fillRect(wx, wy, cw, ch);
            }
        }

        // Outer shadow
        ctx.strokeStyle = 'rgba(0,0,0,0.6)';
        ctx.lineWidth = 1;
        ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
    }

    // Marker als HUD — immer sichtbar, Pfeil am Rand wenn außerhalb
    function drawMapMarkerHUD() {
        if (mapMarkers.length === 0) return;
        const now = performance.now() / 1000;
        const margin = 28;

        for (const mk of mapMarkers) {
            // Welt → Canvas-Koordinaten (nach ctx.restore(), also direkt in W×H space)
            const cx = (mk.x - camX) * cameraZoom / PIXEL_SCALE + W / 2;
            const cy = (mk.y - camY) * cameraZoom / PIXEL_SCALE + H / 2;
            const onScreen = cx > margin + 10 && cx < W - margin - 10 &&
                             cy > margin + 10 && cy < H - margin - 10;

            ctx.save();
            ctx.shadowColor = '#ff4466';
            ctx.fillStyle   = '#ff4466';

            if (onScreen) {
                // Pin direkt auf dem Bildschirm
                const bob = Math.sin(now * 2.5) * 3;
                ctx.shadowBlur = 6;
                ctx.translate(cx, cy + bob);
                // Kreis
                ctx.beginPath();
                ctx.arc(0, -7, 5, 0, Math.PI * 2);
                ctx.fill();
                // weißer Punkt
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(0, -7, 1.5, 0, Math.PI * 2);
                ctx.fill();
                // Spitze
                ctx.fillStyle = '#ff4466';
                ctx.beginPath();
                ctx.moveTo(-3.5, -3);
                ctx.lineTo(3.5, -3);
                ctx.lineTo(0, 3);
                ctx.closePath();
                ctx.fill();
            } else {
                // Pfeil am Bildschirmrand
                const angle = Math.atan2(cy - H / 2, cx - W / 2);
                // Punkt auf dem Rand
                const tx = W / 2 + Math.cos(angle) * (W / 2 - margin);
                const ty = H / 2 + Math.sin(angle) * (H / 2 - margin);
                const ax = Math.max(margin, Math.min(W - margin, tx));
                const ay = Math.max(margin, Math.min(H - margin, ty));

                ctx.shadowBlur = 12;
                ctx.translate(ax, ay);
                ctx.rotate(angle - Math.PI / 2);
                // Dreieck-Pfeil
                ctx.beginPath();
                ctx.moveTo(0, -12);
                ctx.lineTo(8, 6);
                ctx.lineTo(-8, 6);
                ctx.closePath();
                ctx.fill();
                // Punkt in der Mitte
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(0, -3, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.shadowBlur = 0;
            ctx.restore();
        }
    }

    function drawPickups() {
        const now = performance.now() / 1000;
        for (const p of pickups) {
            if (p.taken) continue;
            // Cull
            if (Math.abs(p.x - camX) > W * PIXEL_SCALE / cameraZoom / 2 + 40 || Math.abs(p.y - camY) > H * PIXEL_SCALE / cameraZoom / 2 + 40) continue;
            const bob = Math.sin(now * 4 + p.x * 0.01) * 2;
            const fade = elapsed - p.born > 11 ? (Math.sin(now * 12) * 0.5 + 0.5) : 1;
            ctx.save();
            ctx.translate(p.x, p.y + bob);
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 14;
            ctx.fillStyle = `rgba(0,255,136,${fade})`;
            ctx.font = 'bold 22px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', 0, 0);
            ctx.restore();
        }
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
    }

    function drawCar(car, body, accent, isCop) {
        // Cull
        if (Math.abs(car.x - camX) > W * PIXEL_SCALE / cameraZoom / 2 + 80 || Math.abs(car.y - camY) > H * PIXEL_SCALE / cameraZoom / 2 + 80) return;

        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle);

        const w = car.w, l = car.l;

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.beginPath();
        ctx.ellipse(2, 2, l / 2, w / 2, 0, 0, Math.PI * 2);
        ctx.fill();

        // Body
        ctx.fillStyle = body;
        roundRect(-l / 2, -w / 2, l, w, 5);
        ctx.fill();

        // Accent stripe
        ctx.fillStyle = accent;
        ctx.fillRect(-l / 2 + 4, -w / 2 + 1, 4, w - 2);

        // Windshield
        ctx.fillStyle = 'rgba(20,30,50,0.85)';
        ctx.fillRect(-l / 4, -w / 2 + 3, l / 4, w - 6);
        // Rear window
        ctx.fillStyle = 'rgba(20,30,50,0.65)';
        ctx.fillRect(-l / 2 + 6, -w / 2 + 4, 8, w - 8);

        // Damage tint
        if (!isCop && car.damage > 20) {
            ctx.fillStyle = `rgba(255,0,0,${car.damage / 400})`;
            roundRect(-l / 2, -w / 2, l, w, 5);
            ctx.fill();
        }

        ctx.restore();
    }

    function drawHeli(c) {
        if (Math.abs(c.x - camX) > W * PIXEL_SCALE / cameraZoom / 2 + 100 || Math.abs(c.y - camY) > H * PIXEL_SCALE / cameraZoom / 2 + 100) return;

        const w = c.w, l = c.l;

        // Ground shadow (offset, blocky pixel oval = chunky rectangle)
        ctx.save();
        ctx.translate(c.x + 6, c.y + 6);
        ctx.rotate(c.angle);
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(-l / 2, -w / 2, l, w);
        ctx.restore();

        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.angle);

        // Tail boom
        ctx.fillStyle = '#1a3066';
        ctx.fillRect(-l / 2 - 2, -2, 14, 4);
        // Tail fin
        ctx.fillStyle = '#142244';
        ctx.fillRect(-l / 2 - 4, -4, 4, 8);
        // Tail rotor (animated)
        const tr = c.rotor * 1.5;
        ctx.strokeStyle = 'rgba(220,220,220,0.7)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(-l / 2 - 2 + Math.cos(tr) * 6, -1 + Math.sin(tr) * 6);
        ctx.lineTo(-l / 2 - 2 - Math.cos(tr) * 6, -1 - Math.sin(tr) * 6);
        ctx.stroke();

        // Body
        ctx.fillStyle = '#2a5cb0';
        ctx.fillRect(-8, -w / 2, 18, w);
        // White POLICE stripe
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-8, -2, 18, 4);

        // Cockpit (front bubble)
        ctx.fillStyle = '#0d1a36';
        ctx.fillRect(8, -w / 2 + 2, 4, w - 4);
        ctx.fillStyle = 'rgba(160,210,255,0.55)';
        ctx.fillRect(10, -w / 2 + 3, 2, w - 6);

        // Skids (parallel rails)
        ctx.fillStyle = '#aab0bc';
        ctx.fillRect(-6, -w / 2 - 3, 14, 2);
        ctx.fillRect(-6,  w / 2 + 1, 14, 2);

        // Top light: red/blue flashing in chase, slow yellow in search
        if (c.state === 'search') {
            const sp = Math.sin(c.siren * 4) > 0;
            ctx.fillStyle = sp ? '#ffcc44' : '#aa8800';
        } else {
            const phase = Math.sin(c.siren * 14) > 0;
            ctx.fillStyle = phase ? '#ff2222' : '#2277ff';
        }
        ctx.fillRect(-2, -2, 4, 4);

        // Main rotor — two crossed blades, animated
        const r = c.rotor;
        const blade = 26;
        ctx.strokeStyle = 'rgba(20,20,30,0.85)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(Math.cos(r) * blade, Math.sin(r) * blade);
        ctx.lineTo(-Math.cos(r) * blade, -Math.sin(r) * blade);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(Math.cos(r + Math.PI / 2) * blade, Math.sin(r + Math.PI / 2) * blade);
        ctx.lineTo(-Math.cos(r + Math.PI / 2) * blade, -Math.sin(r + Math.PI / 2) * blade);
        ctx.stroke();
        // Rotor blur (motion smear)
        ctx.strokeStyle = 'rgba(80,80,90,0.18)';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(0, 0, blade, 0, Math.PI * 2); ctx.stroke();

        // Hub
        ctx.fillStyle = '#1a1f2a';
        ctx.fillRect(-3, -3, 6, 6);

        ctx.restore();
    }

    function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
    }

    function drawParticles() {
        for (const p of particles) {
            const a = Math.max(0, p.life / p.maxLife);
            ctx.fillStyle = p.color + a + ')';
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // ── Night mode: street lamps at intersection corners ───────────────
    function drawStreetLamps() {
        const vw2 = W * PIXEL_SCALE / cameraZoom / 2 + PITCH;
        const vh2 = H * PIXEL_SCALE / cameraZoom / 2 + PITCH;
        const startBX = Math.floor((camX - vw2) / PITCH);
        const endBX   = Math.ceil ((camX + vw2) / PITCH);
        const startBY = Math.floor((camY - vh2) / PITCH);
        const endBY   = Math.ceil ((camY + vh2) / PITCH);
        for (let by = startBY; by <= endBY; by++) {
            for (let bx = startBX; bx <= endBX; bx++) {
                // four corners of each intersection
                const ix = bx * PITCH;
                const iy = by * PITCH;
                const offsets = [[6, 6],[STREET_W - 6, 6],[6, STREET_W - 6],[STREET_W - 6, STREET_W - 6]];
                for (const [ox, oy] of offsets) {
                    const lx = ix + ox, ly = iy + oy;
                    ctx.fillStyle = 'rgba(255,220,100,0.85)';
                    ctx.shadowColor = 'rgba(255,200,80,0.8)';
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(lx, ly, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        ctx.shadowBlur = 0;
    }


    // ── Siren HUD ─────────────────────────────────────────────────
    function drawSirenHUD() {
        if (gameState !== 'playing') return;
        // Check if any cop is close enough
        let anyCopClose = false;
        for (const c of cops) {
            if (c.state === 'chase' && Math.hypot(c.x - player.x, c.y - player.y) < 350) {
                anyCopClose = true; break;
            }
        }
        for (const g of groundCops) {
            if (Math.hypot(g.x - player.x, g.y - player.y) < 350) {
                anyCopClose = true; break;
            }
        }
        if (!anyCopClose) return;

        // 3 Hz blink → period 0.333s, half-period 0.167s
        const phase = Math.floor(sirenPhase * 6) % 2; // alternates 0/1 at 3 Hz
        const leftColor  = phase === 0 ? 'rgba(255,30,30,0.75)' : 'rgba(0,80,255,0.75)';
        const rightColor = phase === 0 ? 'rgba(0,80,255,0.75)' : 'rgba(255,30,30,0.75)';
        const barH = 6;
        const barW = W * 0.35;
        ctx.save();
        ctx.fillStyle = leftColor;
        ctx.fillRect(0, 0, barW, barH);
        ctx.fillStyle = rightColor;
        ctx.fillRect(W - barW, 0, barW, barH);
        ctx.restore();
    }


    // ── Ground cop drawing ────────────────────────────────────────
    function drawGroundCop(g) {
        if (Math.abs(g.x - camX) > W * PIXEL_SCALE / cameraZoom / 2 + 80 ||
            Math.abs(g.y - camY) > H * PIXEL_SCALE / cameraZoom / 2 + 80) return;

        ctx.save();
        ctx.translate(g.x, g.y);
        ctx.rotate(g.angle);

        const w = g.w, l = g.l;

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.beginPath();
        ctx.ellipse(2, 2, l / 2, w / 2, 0, 0, Math.PI * 2);
        ctx.fill();

        // Body — blue/white police car
        ctx.fillStyle = '#2244aa';
        roundRect(-l / 2, -w / 2, l, w, 5);
        ctx.fill();

        // White stripe
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-l / 4, -w / 2 + 2, l / 2, w - 4);

        // Windshield
        ctx.fillStyle = 'rgba(20,30,60,0.85)';
        ctx.fillRect(-l / 8, -w / 2 + 3, l / 5, w - 6);

        // Headlights
        ctx.fillStyle = 'rgba(255,255,200,0.95)';
        ctx.fillRect(l / 2 - 2, -w / 2 + 2, 2, 4);
        ctx.fillRect(l / 2 - 2,  w / 2 - 6, 2, 4);

        // Siren lights on top — alternating red/blue
        const sPhase = Math.floor(g.siren * 6) % 2;
        ctx.fillStyle = sPhase === 0 ? '#ff2222' : '#2266ff';
        ctx.shadowColor = sPhase === 0 ? '#ff2222' : '#2266ff';
        ctx.shadowBlur = 8;
        ctx.fillRect(-5, -w / 2 - 3, 5, 3);
        ctx.fillStyle = sPhase === 0 ? '#2266ff' : '#ff2222';
        ctx.shadowColor = sPhase === 0 ? '#2266ff' : '#ff2222';
        ctx.fillRect(1, -w / 2 - 3, 5, 3);
        ctx.shadowBlur = 0;

        ctx.restore();
    }

    function drawIdleOverlay() {
        ctx.fillStyle = 'rgba(5,10,20,0.5)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = 'bold 1rem "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(isTouch ? 'TIPPEN ZUM STARTEN' : 'LEERTASTE ODER KLICK ZUM STARTEN', W / 2, H * 0.55);
        ctx.textAlign = 'left';
    }

    // ── HUD updates ────────────────────────────────────────────────
    const hudScore  = document.getElementById('hud-score');
    const hudWanted = document.getElementById('hud-wanted');
    const hudMult   = document.getElementById('hud-mult');
    const boostBar  = document.getElementById('boost-bar');
    function updateHud() {
        hudScore.textContent = Math.floor(score);
        const stars = Math.min(5, Math.max(1, cops.length));
        hudWanted.textContent = '★'.repeat(stars) + '☆'.repeat(5 - stars);

        hudMult.textContent = 'x' + multiplier.toFixed(1);
        hudMult.classList.toggle('hot',  multiplier >= 2.5 && multiplier < 5);
        hudMult.classList.toggle('fire', multiplier >= 5);

        boostBar.style.width = boost + '%';
        boostBar.classList.toggle('active', boostActive);
    }

    // ── Countdown ──────────────────────────────────────────────────
    const cdEl = document.getElementById('countdown');
    function showCountdown(text, isGo) {
        cdEl.textContent = text;
        cdEl.classList.toggle('go', !!isGo);
        cdEl.style.display = 'block';
        cdEl.style.animation = 'none';
        cdEl.offsetHeight; // reflow
        cdEl.style.animation = '';
    }

    function startCountdown() {
        gameState = 'countdown';
        countdownLeft = 3;
        let last = 4;
        showCountdown('3', false);
        const tick = () => {
            if (gameState !== 'countdown') return;
            const cur = Math.ceil(countdownLeft);
            if (cur !== last && cur >= 1) {
                showCountdown(String(cur), false);
                last = cur;
            }
            if (countdownLeft <= 0) {
                showCountdown('LOS!', true);
                gameState = 'playing';
                lastT = performance.now();
                setTimeout(() => { cdEl.style.display = 'none'; }, 700);
                // Spawn the first cop immediately
                spawnCop();
                return;
            }
            requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
    }

    // ── Game flow ──────────────────────────────────────────────────
    function startGame() {
        reset();
        document.getElementById('hint').style.display = 'none';
        startCountdown();
    }

    function die() {
        if (gameState === 'dead' || gameState === 'dying') return;
        gameState = 'dying';
        dyingTimer = 1.4;
        shake = 1.4;
        vibrate([80, 40, 80, 40, 200]);
        // Huge explosion
        spawnParticles(player.x, player.y, 60, 'rgba(255,80,40,', 350, 1.0);
        spawnParticles(player.x, player.y, 40, 'rgba(255,180,40,', 250, 1.2);
        spawnParticles(player.x, player.y, 20, 'rgba(255,255,200,', 180, 0.6);
        spawnParticles(player.x, player.y, 30, 'rgba(80,80,80,',   140, 1.5);
        addBanner('BUSTED!', '#ff3333', true);
    }

    async function actuallyDie() {
        gameState = 'dead';
        const finalScore = Math.floor(score);

        const finalEl = document.getElementById('final-score-display');
        finalEl.textContent = finalScore;
        document.getElementById('game-over-modal').classList.add('show');

        const name = (() => { try { return JSON.parse(localStorage.getItem('1100px_user'))?.name; } catch { return null; } })();
        if (name && finalScore > 0 && window.storeResult) {
            window.storeResult(name, finalScore);
        } else if (window.loadLeaderboard) {
            window.loadLeaderboard();
        }
    }

    // ── Main loop ──────────────────────────────────────────────────
    function loop(t) {
        const dt = Math.min((t - lastT) / 1000, 0.05);
        lastT = t;
        update(dt);
        draw();
        if (gameState === 'playing' || gameState === 'countdown' || gameState === 'dying') updateHud();
        requestAnimationFrame(loop);
    }

    // ── Boot ───────────────────────────────────────────────────────
    function boot() {
        reset();
        // Login flow
        let user = null;
        try { user = JSON.parse(localStorage.getItem('1100px_user')); } catch {}
        if (!user || !user.name) {
            const m = document.getElementById('name-modal');
            m.classList.add('show');
            const inp = document.getElementById('name-input');
            const sub = document.getElementById('name-submit');
            const submit = () => {
                const v = inp.value.trim();
                if (v.length < 2) { inp.classList.add('input-error'); setTimeout(() => inp.classList.remove('input-error'), 400); return; }
                localStorage.setItem('1100px_user', JSON.stringify({ name: v }));
                m.classList.remove('show');
                kickoffWaitToStart();
                startGame();
            };
            sub.addEventListener('click', submit);
            inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
            setTimeout(() => inp.focus(), 200);
        } else {
            kickoffWaitToStart();
        }

        lastT = performance.now();
        requestAnimationFrame(loop);
    }

    function kickoffWaitToStart() {
        const tryStart = () => {
            if (gameState === 'idle') startGame();
        };
        const onKey = e => {
            if (gameState === 'idle' && (e.code === 'Space' || e.code === 'Enter')) { e.preventDefault(); tryStart(); }
        };
        document.addEventListener('keydown', onKey);

        // Left-zone joystick (covers left half of screen, touch only)
        const joyZone = document.createElement('div');
        joyZone.style.cssText = 'position:fixed;left:0;top:0;width:50%;height:100%;z-index:94;touch-action:none;';
        if (isTouch) document.body.appendChild(joyZone);

        joyZone.addEventListener('pointerdown', e => {
            if (gameState === 'idle') { tryStart(); return; }
            if (isTouch && gameState === 'playing' && !joyActive) {
                e.preventDefault();
                startJoy(e.clientX, e.clientY, e.pointerId);
                joyZone.setPointerCapture(e.pointerId);
            }
        });
        joyZone.addEventListener('pointermove', e => {
            if (joyActive && e.pointerId === joyPointerId) {
                e.preventDefault();
                updateJoy(e.clientX, e.clientY);
            }
        });
        joyZone.addEventListener('pointerup',     e => { if (e.pointerId === joyPointerId) endJoy(); });
        joyZone.addEventListener('pointercancel', e => { if (e.pointerId === joyPointerId) endJoy(); });

        canvas.addEventListener('pointerdown', e => {
            if (gameState === 'idle') tryStart();
        });

        // Restart button
        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over-modal').classList.remove('show');
            startGame();
        });

        // Restart with key/pointer when dead
        document.addEventListener('keydown', e => {
            if (gameState === 'dead' && (e.code === 'Space' || e.code === 'Enter')) {
                document.getElementById('game-over-modal').classList.remove('show');
                startGame();
            }
        });
    }

    boot();
})();
</script>
</body>
</html>
