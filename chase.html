<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHASE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #050a14;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* ── Header HUD ── */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(5, 10, 20, 0.92);
            border-bottom: 1px solid rgba(255, 60, 60, 0.4);
            box-shadow: 0 2px 20px rgba(0,0,0,0.6);
            pointer-events: none;
        }
        .hud-score {
            color: #ffcc44;
            text-shadow: 0 0 12px rgba(255,204,68,0.7);
            font-size: 1.4rem;
            font-weight: 700;
            min-width: 160px;
            letter-spacing: 1px;
        }
        .hud-mult {
            display: inline-block;
            margin-left: 8px;
            color: #ff8844;
            font-size: 0.85rem;
            text-shadow: 0 0 10px rgba(255,136,68,0.6);
            transition: transform 0.2s, color 0.2s;
        }
        .hud-mult.hot { color: #ff44aa; text-shadow: 0 0 14px rgba(255,68,170,0.8); transform: scale(1.15); }
        .hud-mult.fire { color: #ff2222; text-shadow: 0 0 18px rgba(255,68,68,1); transform: scale(1.25); animation: multFire 0.3s infinite alternate; }
        @keyframes multFire {
            from { transform: scale(1.2); }
            to   { transform: scale(1.35); }
        }

        /* Minimap */
        #minimap {
            position: fixed;
            top: 60px;
            left: 12px;
            width: 140px;
            height: 140px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(8,12,22,0.7);
            z-index: 100;
            pointer-events: auto;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.6);
            image-rendering: pixelated;
            transition: border-color 0.15s;
        }
        #minimap:hover { border-color: rgba(255,204,68,0.7); }

        /* Große Map Overlay */
        #bigmap-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.82);
            z-index: 500;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }
        #bigmap-overlay.show { display: flex; }
        #bigmap-wrap {
            position: relative;
        }
        #bigmap {
            border: 2px solid rgba(255,204,68,0.5);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            image-rendering: pixelated;
        }
        #bigmap-hint {
            position: absolute;
            bottom: -26px;
            left: 0; right: 0;
            text-align: center;
            color: rgba(255,255,255,0.35);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* HP bar — removed */

        /* Boost meter — below header */
        #boost-wrap {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 240px;
            height: 14px;
            background: rgba(0,0,0,0.65);
            border: 2px solid rgba(255,204,68,0.35);
            border-radius: 0;
            overflow: hidden;
            z-index: 100;
            pointer-events: none;
            display: flex;
            align-items: center;
        }
        #boost-wrap::before {
            content: 'NITRO';
            position: absolute;
            top: -14px;
            left: 0; right: 0;
            text-align: center;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: rgba(255,204,68,0.75);
            text-shadow: 0 0 8px rgba(255,204,68,0.5);
        }
        #boost-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff4444 0%, #ffcc44 50%, #44ffcc 100%);
            transition: width 0.08s;
            box-shadow: 0 0 12px rgba(255,200,80,0.7);
        }
        #boost-bar.active { animation: boostPulse 0.15s infinite alternate; }
        @keyframes boostPulse {
            from { filter: brightness(1); }
            to   { filter: brightness(1.4); }
        }
        .hud-title {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            flex: 1;
            text-align: center;
            margin: 0 10px;
        }
        .hud-wanted {
            color: #ff4444;
            font-size: 1.1rem;
            min-width: 130px;
            text-align: right;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,68,68,0.7);
        }

        /* ── Countdown ── */
        #countdown {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12rem;
            font-weight: 900;
            color: #ff4444;
            text-shadow: 0 0 40px rgba(255,68,68,0.9), 0 0 80px rgba(255,68,68,0.5);
            letter-spacing: 4px;
            z-index: 200;
            pointer-events: none;
            display: none;
            animation: countPulse 1s ease-out;
        }
        #countdown.go { color: #44ff88; text-shadow: 0 0 40px rgba(68,255,136,0.9), 0 0 80px rgba(68,255,136,0.5); font-size: 8rem; }
        @keyframes countPulse {
            0%   { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
            30%  { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.7); opacity: 0; }
        }

        /* ── Hint ── */
        #hint {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 0.78rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
            text-align: center;
        }

        /* ── Modals ── */
        #name-modal, #game-over-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(7px);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            padding: 5vh 16px;
        }
        #name-modal.show, #game-over-modal.show { display: flex; }

        #game-over-modal.show {
            animation: screenFlash 0.5s ease-out forwards;
        }
        @keyframes screenFlash {
            0%   { background: rgba(200,0,0,0.6); }
            100% { background: rgba(0,0,0,0.85); }
        }

        .modal-box {
            background: linear-gradient(135deg, #0d1f33 0%, #1a0d20 100%);
            border: 1px solid rgba(255,68,68,0.45);
            border-radius: 18px;
            padding: 50px 60px;
            text-align: center;
            box-shadow: 0 0 70px rgba(255,68,68,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
            max-width: 92vw;
        }
        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        .modal-box h1 {
            color: #ff4444;
            font-size: 2.8rem;
            margin: 0 0 8px;
            text-shadow: 0 0 25px rgba(255,68,68,0.7);
            text-transform: uppercase;
            letter-spacing: 6px;
        }
        .modal-subtitle {
            color: rgba(255,255,255,0.45);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 22px;
        }
        .modal-box .final-score {
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
            margin: 18px 0 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .modal-box .final-score span {
            color: #ffcc44;
            font-size: 3rem;
            font-weight: bold;
            display: block;
            margin-top: 8px;
            text-shadow: 0 0 18px rgba(255,204,68,0.6);
        }
        .modal-box input[type="text"] {
            display: block;
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,68,68,0.35);
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            padding: 12px 18px;
            outline: none;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 18px;
            font-family: inherit;
        }
        .modal-box input[type="text"]:focus {
            border-color: rgba(255,68,68,0.75);
            box-shadow: 0 0 18px rgba(255,68,68,0.2);
        }
        .modal-box input.input-error {
            border-color: #ff4444;
            box-shadow: 0 0 12px rgba(255,68,68,0.5);
            animation: inputShake 0.35s ease;
        }
        @keyframes inputShake {
            0%,100% { transform: translateX(0); }
            25%     { transform: translateX(-7px); }
            75%     { transform: translateX(7px); }
        }
        .modal-buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-top: 4px;
        }
        .modal-box button {
            color: white;
            border: none;
            padding: 13px 28px;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff4444, #cc2222);
            box-shadow: 0 4px 18px rgba(255,68,68,0.35);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #ff6666, #ff4444) !important;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18) !important;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15) !important;
            transform: translateY(-2px);
        }

        #leaderboard tbody tr td {
            padding: 5px 6px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.85);
        }
        #leaderboard tbody tr:first-child td { color: #ffcc44; }

        /* ── Floating Joystick ── */
        #joystick {
            position: fixed;
            left: 30px;
            bottom: 40px;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 3px solid rgba(255,255,255,0.28);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
            z-index: 95;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.12s;
            user-select: none;
            -webkit-user-select: none;
        }
        #joystick.touch-ready { opacity: 0.55; }
        #joystick.active { opacity: 1; }
        #joystick-thumb {
            position: absolute;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(255,255,255,0.22);
            border: 2px solid rgba(255,255,255,0.55);
            left: calc(50% - 36px);
            top: calc(50% - 36px);
            transform: translate(0, 0);
            transition: transform 0.04s, background 0.1s, border-color 0.1s, box-shadow 0.1s;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.55);
        }
        #joystick-thumb.nitro {
            background: rgba(255,80,170,0.6);
            border-color: rgba(255,120,220,1);
            box-shadow: 0 0 32px rgba(255,80,170,1);
        }
        #joystick-thumb.rev {
            background: rgba(255,204,68,0.55);
            border-color: rgba(255,220,100,1);
            box-shadow: 0 0 24px rgba(255,204,68,0.85);
        }

        /* ── Right action buttons (touch) ── */
        #right-btns {
            position: fixed;
            right: 24px;
            bottom: 34px;
            z-index: 95;
            display: none;
            flex-direction: column;
            align-items: flex-end;
            gap: 14px;
            pointer-events: none;
        }
        #right-btns.show { display: flex; }
        .btn-gas {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: rgba(68,255,136,0.12);
            border: 3px solid rgba(68,255,136,0.55);
            color: rgba(68,255,136,0.85);
            font-size: 1.05rem;
            font-weight: 900;
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            transition: background 0.07s, box-shadow 0.07s, border-color 0.07s, transform 0.07s;
        }
        .btn-gas.active {
            background: rgba(68,255,136,0.38);
            border-color: #44ff88;
            box-shadow: 0 0 32px rgba(68,255,136,0.65);
            transform: scale(0.91);
        }
        .btn-row {
            display: flex;
            gap: 12px;
        }
        .btn-sm {
            width: 82px;
            height: 82px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 2px;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            transition: background 0.07s, box-shadow 0.07s, transform 0.07s;
        }
        .btn-brake {
            background: rgba(255,204,68,0.10);
            border: 2px solid rgba(255,204,68,0.45);
            color: rgba(255,204,68,0.75);
        }
        .btn-brake.active {
            background: rgba(255,204,68,0.35);
            border-color: #ffcc44;
            box-shadow: 0 0 22px rgba(255,204,68,0.6);
            transform: scale(0.88);
        }
        .btn-nitro {
            background: rgba(255,80,170,0.10);
            border: 2px solid rgba(255,80,170,0.5);
            color: rgba(255,120,200,0.85);
        }
        .btn-nitro.active {
            background: rgba(255,80,170,0.38);
            border-color: rgba(255,80,200,1);
            box-shadow: 0 0 26px rgba(255,80,170,0.7);
            transform: scale(0.88);
        }

        /* ── Touch Controls (legacy, hidden) ── */
        #touch-controls {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 90;
            display: none;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 20px 28px;
            pointer-events: none;
        }
        #touch-controls.show { display: flex; }
        .tc-side {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            border: 2px solid rgba(255,68,68,0.35);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            color: rgba(255,255,255,0.5);
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .tc-side.active {
            background: rgba(255,68,68,0.25);
            border-color: rgba(255,68,68,0.85);
            color: #fff;
        }
        .tc-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            pointer-events: none;
        }
        .tc-small {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            border: 2px solid rgba(255,204,68,0.45);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .tc-rev {
            color: rgba(255,204,68,0.7);
        }
        .tc-rev.active {
            background: rgba(255,204,68,0.3);
            border-color: rgba(255,204,68,0.95);
            color: #fff;
        }
        .tc-nitro {
            border-color: rgba(255,80,170,0.55);
            color: rgba(255,120,200,0.85);
            background: rgba(255,80,170,0.08);
        }
        .tc-nitro.active {
            background: rgba(255,80,170,0.35);
            border-color: rgba(255,80,200,1);
            color: #fff;
            box-shadow: 0 0 22px rgba(255,80,170,0.7);
        }

        @media (max-width: 431px) {
            .modal-box { padding: 35px 22px; }
            .modal-box h1 { font-size: 2rem; letter-spacing: 3px; }
            .modal-box .final-score span { font-size: 2.2rem; }
            .hud-title { display: none; }
            #countdown { font-size: 8rem; }
            #countdown.go { font-size: 5rem; }

            .header { padding: 8px 12px; }
            .hud-score { font-size: 1.1rem; min-width: 120px; }
            .hud-mult { font-size: 0.75rem; }
            .hud-wanted { font-size: 0.95rem; min-width: 100px; letter-spacing: 1px; }

            #boost-wrap { top: 52px; width: 180px; height: 10px; }
            #boost-wrap::before { font-size: 0.55rem; top: -12px; letter-spacing: 2px; }
            #minimap { width: 96px; height: 96px; top: 52px; left: 8px; }

            .tc-side { width: 100px; height: 100px; font-size: 2.3rem; }
            .tc-small { width: 64px; height: 64px; font-size: 0.7rem; }
            #touch-controls { padding: 0 12px 18px; }
            #joystick { left: 16px; bottom: 28px; width: 130px; height: 130px; }
            #joystick-thumb { width: 58px; height: 58px; left: calc(50% - 29px); top: calc(50% - 29px); }
            .btn-gas { width: 108px; height: 108px; font-size: 0.9rem; }
            .btn-sm { width: 68px; height: 68px; font-size: 0.6rem; }
            #right-btns { right: 14px; bottom: 24px; gap: 10px; }

            #hint { font-size: 0.65rem; letter-spacing: 1px; bottom: 14px; }
        }
        @media (max-width: 360px) {
            .tc-side { width: 86px; height: 86px; font-size: 2rem; }
            .tc-small { width: 56px; height: 56px; font-size: 0.65rem; }
        }

    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div class="header">
    <h2 class="hud-score">$<span id="hud-score">0</span><span class="hud-mult" id="hud-mult">x1.0</span></h2>
    <h2 class="hud-title">Chase</h2>
    <div class="hud-wanted" id="hud-wanted">★☆☆☆☆</div>
</div>

<!-- Boost Meter -->
<div id="boost-wrap"><div id="boost-bar" style="width:100%"></div></div>

<!-- Minimap -->
<canvas id="minimap" width="140" height="140"></canvas>

<!-- Große Map Overlay -->
<div id="bigmap-overlay">
    <div id="bigmap-wrap">
        <canvas id="bigmap"></canvas>
        <div id="bigmap-hint">Ziehen zum Scrollen · Außerhalb klicken zum Schließen · M</div>
    </div>
</div>

<!-- Countdown -->
<div id="countdown">3</div>

<!-- Hint -->
<div id="hint">W/↑ Gas · S/↓ Bremsen & Rückwärts · A·D / ← → Lenken · Leertaste = Handbremse</div>

<!-- Joystick (mobile) -->
<div id="joystick">
    <div id="joystick-thumb"></div>
</div>

<!-- Right action buttons (mobile) -->
<div id="right-btns">
    <div class="btn-gas" id="btn-gas">GAS</div>
    <div class="btn-row">
        <div class="btn-sm btn-brake" id="btn-brake">BREMSE</div>
        <div class="btn-sm btn-nitro" id="btn-nitro">NITRO</div>
    </div>
</div>

<!-- Name Modal -->
<div id="name-modal">
    <div class="modal-box">
        <h1>CHASE</h1>
        <p class="modal-subtitle">Gib deinen Namen ein</p>
        <input type="text" id="name-input" placeholder="Dein Name..." maxlength="20" autocomplete="off" spellcheck="false">
        <button id="name-submit" class="btn-primary">Spielen</button>
    </div>
</div>

<!-- Game Over Modal -->
<div id="game-over-modal">
    <div class="modal-box" style="max-height:90vh;overflow-y:auto;width:min(420px,92vw)">
        <h1>Erwischt!</h1>
        <p class="final-score">Dein Score<br><span id="final-score-display">0</span></p>
        <p id="personal-best-display" style="font-size:0.8rem;color:rgba(255,255,255,0.4);margin:-8px 0 12px;letter-spacing:1px"></p>

        <table style="width:100%;border-collapse:collapse;margin:18px 0 6px;font-size:0.9rem">
            <thead>
                <tr style="color:#569aa9;border-bottom:1px solid rgba(86,154,169,0.4)">
                    <td style="padding:4px 6px">#</td>
                    <td style="padding:4px 6px">Spieler</td>
                    <td style="padding:4px 6px;text-align:center">Score</td>
                    <td style="padding:4px 6px;text-align:right">Datum</td>
                </tr>
            </thead>
        </table>
        <div style="max-height:240px;overflow-y:auto;margin-bottom:22px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.15) transparent">
            <table id="leaderboard" style="width:100%;border-collapse:collapse;font-size:0.9rem">
                <tbody id="lb-body">
                    <tr><td colspan="4" style="opacity:.5;padding:8px 0">Laden…</td></tr>
                </tbody>
            </table>
        </div>

        <div class="modal-buttons">
            <button class="btn-secondary" onclick="location.href='/'">Zurück</button>
            <button class="btn-primary" id="restart-btn">Nochmal</button>
        </div>
    </div>
</div>

<!-- Firebase -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, limit, Timestamp, doc, updateDoc, increment }

        try {
            const qs = await getDocs(query(collection(db, 'red-pixel')));
            const medals = ['🥇','🥈','🥉'];
            const filtered = [];
            qs.forEach(d => {
                const v = d.data();
                if (v.game === 'CHASE' && v.name?.trim().toLowerCase() !== 'test' && v.points >= 50) filtered.push(v);
            });
            filtered.sort((a, b) => b.points - a.points);

            const currentUser = (() => { try { return JSON.parse(localStorage.getItem('1100px_user')); } catch(e) { return null; } })();
            const pbEl = document.getElementById('personal-best-display');
            if (currentUser && pbEl) {
                const myBest = filtered.filter(d => d.name === currentUser.name).reduce((max, d) => Math.max(max, d.points), 0);
                pbEl.textContent = myBest > 0 ? `Dein Rekord: $${myBest}` : '';
            }

            tbody.innerHTML = '';
            filtered.slice(0, 50).forEach((d, i) => {
                const tr = document.createElement('tr');
                const ts = d.created;
                let dateStr = '';
                if (ts) {
                    const dt = ts.toDate ? ts.toDate() : new Date(ts);
                    dateStr = `${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}.${dt.getFullYear()}`;
                }
                const isMe = currentUser && d.name === currentUser.name;
                tr.style.background = isMe ? 'rgba(255,68,68,0.08)' : '';
                tr.innerHTML = `<td>${i < 3 ? medals[i] : i+1}</td><td style="${isMe ? 'color:#ff8844;font-weight:700' : ''}">${d.name}</td><td style="color:#ffcc44;font-weight:bold;text-align:center">$${d.points}</td><td style="color:rgba(255,255,255,0.35);font-size:0.78rem;text-align:right;white-space:nowrap">${dateStr}</td>`;
                tbody.appendChild(tr);
            });
            if (filtered.length === 0) tbody.innerHTML = '<tr><td colspan="4" style="opacity:.5">Noch keine Einträge</td></tr>';
        } catch(e) {
            console.error('Leaderboard Fehler:', e);
            tbody.innerHTML = `<tr><td colspan="4" style="opacity:.5;font-size:0.7rem">${e.message}</td></tr>`;
        }
    }

    window.storeResult     = storeResult;
    window.loadLeaderboard = loadLeaderboard;
</script>

<script>
(function() {
    "use strict";

    // ── Chase Skins ────────────────────────────────────────────────
    // Each skin has: s = MAX_SPEED mult, a = ACCEL mult, t = STEER mult, d = damage taken mult
    const _CHASE_SKIN_PROPS = {
        default: { s:1.0,  a:1.0,  t:1.0,  d:1.0,  color:'#ffcc44', accent:'#ff8844' },
        sports:  { s:1.15, a:1.0,  t:1.0,  d:1.0,  color:'#ff3344', accent:'#ffaa44' },
        muscle:  { s:1.0,  a:1.25, t:1.0,  d:1.0,  color:'#ff8800', accent:'#552200' },
        drift:   { s:1.0,  a:1.0,  t:1.30, d:1.0,  color:'#aa44ff', accent:'#ff44aa' },
        tank:    { s:0.92, a:0.95, t:1.0,  d:0.55, color:'#666666', accent:'#222222' },
        police:  { s:1.10, a:1.0,  t:1.10, d:1.0,  color:'#4488ff', accent:'#ffffff' },
        gt:      { s:1.18, a:1.18, t:1.0,  d:1.0,  color:'#ffffff', accent:'#ff2244' },
        phantom: { s:1.12, a:1.12, t:1.12, d:0.80, color:'#222222', accent:'#00ffff' },
    };
    const _chaseSkinId = (() => { try { return localStorage.getItem('1100px_activeChaseSkin') || 'default'; } catch { return 'default'; } })();
    const _cs = _CHASE_SKIN_PROPS[_chaseSkinId] || _CHASE_SKIN_PROPS.default;

    // ── Canvas ─────────────────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');
    const PIXEL_SCALE = 2;
    let W = 0, H = 0;

    // Minimap
    const miniCanvas = document.getElementById('minimap');
    const miniCtx    = miniCanvas.getContext('2d');
    const MINI_SIZE  = 140;
    const MINI_RANGE = 1800;
    const MINI_SCALE = MINI_SIZE / MINI_RANGE;

    function resize() {
        const realW = window.innerWidth;
        const realH = window.innerHeight;
        canvas.width  = Math.max(1, Math.round(realW / PIXEL_SCALE));
        canvas.height = Math.max(1, Math.round(realH / PIXEL_SCALE));
        canvas.style.width  = realW + 'px';
        canvas.style.height = realH + 'px';
        W = canvas.width;
        H = canvas.height;
        ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resize);
    resize();

    // ── World / Map ────────────────────────────────────────────────
    const ROAD_W     = 130;
    const SIDEWALK   = 24;
    const STREET_W   = ROAD_W + SIDEWALK * 2; // 178 — full drivable area
    const BLOCK_SIZE = 280;
    const PITCH      = STREET_W + BLOCK_SIZE;

    const BANK_PROB        = 0.12;   // ~1 in 8 blocks is a bank
    const BANK_ROB_SECS    = 5;
    const BANK_PAYOUT      = 1000;
    const BANK_NEAR_DIST   = 100;

    const MERGE_PROB  = 0.18;   // chance a block merges with neighbor (super-block)
    const TUNNEL_PROB = 0.07;   // chance a street segment is a tunnel

    // ── Weltgrenze ─────────────────────────────────────────────────
    const WORLD_BLOCKS = 9;                      // 9 Blöcke in jede Richtung
    const WORLD_MIN    = -WORLD_BLOCKS * PITCH;
    const WORLD_MAX    =  WORLD_BLOCKS * PITCH;

    function isStreet(x, y) {
        if (x < WORLD_MIN || x > WORLD_MAX || y < WORLD_MIN || y > WORLD_MAX) return false;
        const mx = ((x % PITCH) + PITCH) % PITCH;
        const my = ((y % PITCH) + PITCH) % PITCH;
        const onV = mx < STREET_W;
        const onH = my < STREET_W;
        if (!onV && !onH) return false;

        const bx = Math.floor(x / PITCH);
        const by = Math.floor(y / PITCH);

        if (onV && !onH) {
            if (isMergedRight(bx - 1, by)) return false;
        }
        if (onH && !onV) {
            if (isMergedDown(bx, by - 1)) return false;
        }
        return true;
    }

    function isMergedRight(bx, by) {
        let h = bx * 2654435761 + by * 1597334677 + 9176;
        h = (h ^ (h >>> 13)) * 1274126177;
        const v = ((h ^ (h >>> 16)) >>> 0) / 4294967296;
        if (v >= MERGE_PROB) return false;
        // No chains: don't merge if our left neighbor is also merging right
        let h2 = (bx - 1) * 2654435761 + by * 1597334677 + 9176;
        h2 = (h2 ^ (h2 >>> 13)) * 1274126177;
        if (((h2 ^ (h2 >>> 16)) >>> 0) / 4294967296 < MERGE_PROB) return false;
        return true;
    }
    function isMergedDown(bx, by) {
        // Don't merge vertically if any horizontal merge is involved
        if (isMergedRight(bx, by) || isMergedRight(bx - 1, by)) return false;
        if (isMergedRight(bx, by + 1) || isMergedRight(bx - 1, by + 1)) return false;
        let h = bx * 805306457 + by * 374761393 + 31337;
        h = (h ^ (h >>> 13)) * 1274126177;
        const v = ((h ^ (h >>> 16)) >>> 0) / 4294967296;
        if (v >= MERGE_PROB) return false;
        let h2 = bx * 805306457 + (by - 1) * 374761393 + 31337;
        h2 = (h2 ^ (h2 >>> 13)) * 1274126177;
        if (((h2 ^ (h2 >>> 16)) >>> 0) / 4294967296 < MERGE_PROB) return false;
        return true;
    }

    // Deterministic pseudo-random per block
    function blockHash(bx, by) {
        let h = bx * 374761393 + by * 668265263;
        h = (h ^ (h >>> 13)) * 1274126177;
        return ((h ^ (h >>> 16)) >>> 0) / 4294967296;
    }

    function isBank(bx, by) {
        if (isMergedRight(bx - 1, by)) return false;
        if (isMergedDown(bx, by - 1))  return false;
        return blockHash(bx, by) < BANK_PROB;
    }

    function findNearbyBank(px, py) {
        const bx0 = Math.floor(px / PITCH) - 1;
        const by0 = Math.floor(py / PITCH) - 1;
        let best = null, bestDist = Infinity;
        for (let dy = 0; dy <= 2; dy++) {
            for (let dx = 0; dx <= 2; dx++) {
                const bx = bx0 + dx, by = by0 + dy;
                if (!isBank(bx, by)) continue;
                const key = bx + ',' + by;
                if (robbedBanks.has(key)) continue;
                const wx = bx * PITCH + STREET_W;
                const wy = by * PITCH + STREET_W;
                const nx = Math.max(wx, Math.min(wx + BLOCK_SIZE, px));
                const ny = Math.max(wy, Math.min(wy + BLOCK_SIZE, py));
                const d  = Math.hypot(px - nx, py - ny);
                if (d < BANK_NEAR_DIST && d < bestDist) { bestDist = d; best = { bx, by, key, wx, wy }; }
            }
        }
        return best;
    }

    function updateBanks(dt) {
        const nearby = findNearbyBank(player.x, player.y);
        if (nearby) {
            if (!bankRobTarget || bankRobTarget.key !== nearby.key) {
                bankRobTarget = nearby;
                bankRobTimer  = 0;
            }
            bankRobTimer += dt;
            if (bankRobTimer >= BANK_ROB_SECS) {
                robbedBanks.add(nearby.key);
                bankRobTarget = null;
                bankRobTimer  = 0;
                comboCount++; comboTimer = 2.5;
                const bankMult = (comboCount >= 3) ? 1.5 : 1.0;
                const bankBonus = Math.floor(BANK_PAYOUT * bankMult);
                score        += bankBonus;
                cashGrabbed  += bankBonus;
                multiplier    = Math.min(8, multiplier + 0.5);
                multiplierFreeze = 1.5;
                spawnParticles(nearby.wx + BLOCK_SIZE / 2, nearby.wy + BLOCK_SIZE / 2, 22, 'rgba(255,204,0,', 190, 0.9);
                if (comboCount >= 3) addBanner('COMBO x' + comboCount + '!', '#ff88ff');
                addBanner('BANK AUSGERAUBT! +$' + bankBonus + (bankMult > 1 ? ' (x1.5)' : ''), '#ffcc00', true);
                vibrate([60, 20, 60]);
            }
        } else {
            bankRobTarget = null;
            bankRobTimer  = 0;
        }
    }


    function isTunnelH(bx, by) {
        if (isMergedDown(bx, by - 1) || isMergedDown(bx, by)) return false;
        let h = bx * 1297 + by * 7919 + 41;
        h = (h ^ (h >>> 13)) * 1274126177;
        return ((h ^ (h >>> 16)) >>> 0) / 4294967296 < TUNNEL_PROB;
    }
    function isTunnelV(bx, by) {
        if (isMergedRight(bx - 1, by) || isMergedRight(bx, by)) return false;
        let h = bx * 7307 + by * 5443 + 89;
        h = (h ^ (h >>> 13)) * 1274126177;
        return ((h ^ (h >>> 16)) >>> 0) / 4294967296 < TUNNEL_PROB;
    }

    const TUNNEL_MARGIN = 36;  // matches drawTunnel* m
    function isInTunnelAt(x, y) {
        const bx = Math.floor(x / PITCH);
        const by = Math.floor(y / PITCH);
        const mx = x - bx * PITCH;
        const my = y - by * PITCH;

        // Horizontal tunnel: on horizontal street, x past the intersection within margin
        if (my >= 0 && my < STREET_W &&
            mx >= STREET_W + TUNNEL_MARGIN && mx <= PITCH - TUNNEL_MARGIN) {
            if (isTunnelH(bx, by)) return true;
        }
        // Vertical tunnel
        if (mx >= 0 && mx < STREET_W &&
            my >= STREET_W + TUNNEL_MARGIN && my <= PITCH - TUNNEL_MARGIN) {
            if (isTunnelV(bx, by)) return true;
        }
        return false;
    }

    // ── Physics ────────────────────────────────────────────────────
    const ACCEL          = 360 * _cs.a;
    const REVERSE        = -180 * _cs.a;
    const MAX_SPEED      = 360 * _cs.s;
    const MAX_REVERSE    = -130 * _cs.s;
    const FRICTION       = 0.985;
    const BRAKE_DECEL    = 600;
    const STEER_RATE     = 3.8 * _cs.t;
    const HANDBRAKE_F    = 0.93;
    const DAMAGE_MULT    = _cs.d;

    // ── State ──────────────────────────────────────────────────────
    let player, cops, particles, pickups, groundCops;
    let camX = 0, camY = 0;
    let cameraZoom = 1;
    let lastT = 0;
    let elapsed = 0;
    let score = 0;
    let cashGrabbed = 0;
    let nextCopAt = 0;
    let nextPickupAt = 0;
    let nextGroundCopAt = 15;
    let gameState = 'idle'; // 'idle' | 'countdown' | 'playing' | 'dying' | 'dead'
    let countdownLeft = 0;
    let shake = 0;

    // Arcade juice
    let multiplier = 1;
    let multiplierFreeze = 0;
    let boost = 100;
    let boostActive = false;
    let banners = [];
    let dyingTimer = 0;
    let driftTimer = 0;
    let rumbleTimer = 0;
    let robbedBanks  = new Set();
    let bankRobTimer = 0;
    let bankRobTarget = null; // { bx, by, key, wx, wy }

    // Combo system
    let comboTimer = 0;
    let comboCount = 0;

    // Siren HUD
    let sirenPhase = 0;


    // ── Input ──────────────────────────────────────────────────────
    const keys = {};
    document.addEventListener('keydown', e => {
        keys[e.code] = true;
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
        if (e.code === 'KeyM') toggleBigMap();
    });
    document.addEventListener('keyup', e => { keys[e.code] = false; });

    // Große Map
    let mapMarkers  = [];  // [ { x, y }, ... ]
    let bigMapOpen  = false;
    let bigMapPanX  = 0;  // Pan-Offset in Welt-Koordinaten
    let bigMapPanY  = 0;
    let bmDragging  = false;
    let bmDragStartX = 0, bmDragStartY = 0;
    let bmDragPanX  = 0, bmDragPanY  = 0;
    let bmDidDrag   = false;

    const bigMapOverlay = document.getElementById('bigmap-overlay');
    const bigMapCanvas  = document.getElementById('bigmap');
    const bigMapCtx     = bigMapCanvas.getContext('2d');
    const bigMapWrap    = document.getElementById('bigmap-wrap');

    const BM_RANGE = 5000;
    let bigMapSize = 0;

    function openBigMap() {
        bigMapOpen  = true;
        bigMapPanX  = 0;
        bigMapPanY  = 0;
        bigMapOverlay.classList.add('show');
        const size  = Math.min(window.innerWidth * 0.92, window.innerHeight * 0.85);
        bigMapSize  = Math.round(size);
        bigMapCanvas.width  = bigMapSize;
        bigMapCanvas.height = bigMapSize;
        bigMapCanvas.style.width  = bigMapSize + 'px';
        bigMapCanvas.style.height = bigMapSize + 'px';
        drawBigMap();
    }
    function closeBigMap() {
        bigMapOpen = false;
        bigMapOverlay.classList.remove('show');
    }
    function toggleBigMap() {
        if (bigMapOpen) closeBigMap(); else openBigMap();
    }

    // Klick AUSSERHALB der Map → schließen
    bigMapOverlay.addEventListener('pointerdown', e => {
        if (e.target === bigMapOverlay) closeBigMap();
    });

    // Minimap-Klick öffnet
    document.getElementById('minimap').addEventListener('pointerdown', e => {
        e.stopPropagation();
        toggleBigMap();
    });

    // Scrollen / Ziehen auf der Map
    bigMapCanvas.style.cursor = 'grab';
    bigMapCanvas.addEventListener('pointerdown', e => {
        e.preventDefault();
        bigMapCanvas.setPointerCapture(e.pointerId);
        bmDragging   = true;
        bmDidDrag    = false;
        bmDragStartX = e.clientX;
        bmDragStartY = e.clientY;
        bmDragPanX   = bigMapPanX;
        bmDragPanY   = bigMapPanY;
        bigMapCanvas.style.cursor = 'grabbing';
    });
    bigMapCanvas.addEventListener('pointermove', e => {
        if (!bmDragging) return;
        const dx = e.clientX - bmDragStartX;
        const dy = e.clientY - bmDragStartY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) bmDidDrag = true;
        const scale = bigMapSize / BM_RANGE;
        bigMapPanX = bmDragPanX - dx / scale;
        bigMapPanY = bmDragPanY - dy / scale;
        drawBigMap();
    });
    bigMapCanvas.addEventListener('pointerup', e => {
        if (!bmDidDrag) {
            // Klick ohne Drag → Marker setzen / löschen
            const rect   = bigMapCanvas.getBoundingClientRect();
            const cx     = (e.clientX - rect.left) * (bigMapSize / rect.width);
            const cy     = (e.clientY - rect.top)  * (bigMapSize / rect.height);
            const scale  = bigMapSize / BM_RANGE;
            const vpx    = (player ? player.x : 0) + bigMapPanX;
            const vpy    = (player ? player.y : 0) + bigMapPanY;
            const wx     = (cx - bigMapSize / 2) / scale + vpx;
            const wy     = (cy - bigMapSize / 2) / scale + vpy;

            // Existing marker in der Nähe? → löschen
            const snapPx = 20 / scale;
            const idx = mapMarkers.findIndex(m => Math.hypot(m.x - wx, m.y - wy) < snapPx);
            if (idx !== -1) {
                mapMarkers.splice(idx, 1);
            } else {
                mapMarkers.push({ x: wx, y: wy });
            }
            drawBigMap();
        }
        bmDragging = false;
        bigMapCanvas.style.cursor = 'grab';
    });
    bigMapCanvas.addEventListener('pointercancel', () => {
        bmDragging = false;
        bigMapCanvas.style.cursor = 'grab';
    });

    function drawBigMap() {
        const size  = bigMapSize;
        const scale = size / BM_RANGE;
        const m     = bigMapCtx;

        const px = (player ? player.x : 0) + bigMapPanX;
        const py = (player ? player.y : 0) + bigMapPanY;

        // Wasser-Hintergrund
        m.fillStyle = '#0d2a4a';
        m.fillRect(0, 0, size, size);

        const w2s = wx => (wx - px) * scale + size / 2;
        const h2s = wy => (wy - py) * scale + size / 2;

        const startBX = Math.floor((px - BM_RANGE/2) / PITCH) - 1;
        const endBX   = Math.ceil ((px + BM_RANGE/2) / PITCH) + 1;
        const startBY = Math.floor((py - BM_RANGE/2) / PITCH) - 1;
        const endBY   = Math.ceil ((py + BM_RANGE/2) / PITCH) + 1;

        // Land-Fläche
        const lx = w2s(WORLD_MIN), ly = h2s(WORLD_MIN);
        const lw = (WORLD_MAX - WORLD_MIN) * scale;
        m.fillStyle = '#1a2230';
        m.fillRect(lx, ly, lw, lw);

        // Straßen
        m.fillStyle = '#2a3344';
        for (let bx = startBX; bx <= endBX; bx++) {
            const sx = w2s(bx * PITCH);
            if (sx + STREET_W * scale < 0 || sx > size) continue;
            m.fillRect(sx, ly, STREET_W * scale, lw);
        }
        for (let by = startBY; by <= endBY; by++) {
            const sy = h2s(by * PITCH);
            if (sy + STREET_W * scale < 0 || sy > size) continue;
            m.fillRect(lx, sy, lw, STREET_W * scale);
        }

        // Gebäude
        m.fillStyle = '#4a4e58';
        for (let by = startBY; by <= endBY; by++) {
            for (let bx = startBX; bx <= endBX; bx++) {
                if (isMergedRight(bx - 1, by)) continue;
                if (isMergedDown(bx, by - 1))  continue;
                let bw = BLOCK_SIZE, bh = BLOCK_SIZE;
                if (isMergedRight(bx, by)) bw += STREET_W + BLOCK_SIZE;
                if (isMergedDown(bx, by))  bh += STREET_W + BLOCK_SIZE;
                m.fillRect(w2s(bx * PITCH + STREET_W), h2s(by * PITCH + STREET_W),
                           Math.max(1, bw * scale), Math.max(1, bh * scale));
            }
        }

        // Gelbe Mittellinien
        m.fillStyle = 'rgba(255,220,80,0.22)';
        for (let bx = startBX; bx <= endBX; bx++) {
            const sx = w2s(bx * PITCH + STREET_W / 2);
            m.fillRect(sx, ly, 1, lw);
        }
        for (let by = startBY; by <= endBY; by++) {
            const sy = h2s(by * PITCH + STREET_W / 2);
            m.fillRect(lx, sy, lw, 1);
        }

        // Weltgrenze
        m.strokeStyle = 'rgba(80,180,255,0.5)';
        m.lineWidth = 2;
        m.strokeRect(lx, ly, lw, lw);

        // Banken
        for (let by = startBY - 1; by <= endBY + 1; by++) {
            for (let bx = startBX - 1; bx <= endBX + 1; bx++) {
                if (!isBank(bx, by)) continue;
                const key = bx + ',' + by;
                const sx = w2s(bx * PITCH + STREET_W + BLOCK_SIZE / 2);
                const sy = h2s(by * PITCH + STREET_W + BLOCK_SIZE / 2);
                m.fillStyle = robbedBanks.has(key) ? 'rgba(255,255,255,0.2)' : '#ffcc00';
                const bs = Math.max(4, 7 * scale);
                m.fillRect(sx - bs/2, sy - bs/2, bs, bs);
            }
        }

        // Cops
        for (const c of cops || []) {
            const sx = w2s(c.x), sy = h2s(c.y);
            m.fillStyle = c.state === 'search' ? '#ffcc44' : '#ff3333';
            const cs = Math.max(3, 6 * scale);
            m.fillRect(sx - cs/2, sy - cs/2, cs, cs);
        }

        // Marker
        for (const mk of mapMarkers) {
            const sx = w2s(mk.x), sy = h2s(mk.y);
            if (sx < -20 || sx > size + 20 || sy < -20 || sy > size + 20) continue;
            m.fillStyle = '#ff4466';
            m.shadowColor = '#ff4466';
            m.shadowBlur  = 8;
            // Pin-Kreis
            m.beginPath();
            m.arc(sx, sy - 8, 7, 0, Math.PI * 2);
            m.fill();
            // Spitze
            m.beginPath();
            m.moveTo(sx - 5, sy - 4);
            m.lineTo(sx + 5, sy - 4);
            m.lineTo(sx,     sy + 2);
            m.closePath();
            m.fill();
            m.shadowBlur = 0;
        }

        // Spieler — immer sichtbar, auch beim Scrollen
        const plsx = w2s(player ? player.x : 0);
        const plsy = h2s(player ? player.y : 0);
        const ps = Math.max(5, 9 * scale);
        m.fillStyle = '#ffcc44';
        m.fillRect(plsx - ps/2, plsy - ps/2, ps, ps);
        m.strokeStyle = '#ffcc44';
        m.lineWidth = 2;
        m.beginPath();
        m.moveTo(plsx, plsy);
        m.lineTo(plsx + Math.cos(player ? player.angle : 0) * ps * 2,
                 plsy + Math.sin(player ? player.angle : 0) * ps * 2);
        m.stroke();

        // "Zentrieren"-Hinweis wenn gescrollt
        if (Math.abs(bigMapPanX) > 100 || Math.abs(bigMapPanY) > 100) {
            m.fillStyle = 'rgba(255,204,68,0.7)';
            m.font = 'bold 11px monospace';
            m.textAlign = 'center';
            m.fillText('● SPIELER', plsx, plsy - ps - 4);
            m.textAlign = 'left';
        }
    }

    // Fixed Joystick (touch) — always at bottom-left
    const joyEl    = document.getElementById('joystick');
    const joyThumb = document.getElementById('joystick-thumb');
    const JOY_MAX  = 60;
    let joyActive  = false;
    let joyDX = 0;
    let joyPointerId = null;

    function getJoyCenterX() {
        const r = joyEl.getBoundingClientRect();
        return r.left + r.width / 2;
    }
    function getJoyCenterY() {
        const r = joyEl.getBoundingClientRect();
        return r.top + r.height / 2;
    }

    function startJoy(clientX, clientY, pointerId) {
        joyActive = true;
        joyPointerId = pointerId;
        joyEl.classList.add('active');
        updateJoy(clientX, clientY);
    }
    function updateJoy(clientX, clientY) {
        let dx = clientX - getJoyCenterX();
        const absDx = Math.abs(dx);
        if (absDx > JOY_MAX) dx = Math.sign(dx) * JOY_MAX;
        joyDX = dx / JOY_MAX;
        const thumbX = dx;
        const thumbY = Math.max(-JOY_MAX, Math.min(JOY_MAX, clientY - getJoyCenterY()));
        joyThumb.style.transform = `translate(${thumbX}px, ${thumbY}px)`;
    }
    function endJoy() {
        joyActive = false;
        joyPointerId = null;
        joyDX = 0;
        joyEl.classList.remove('active');
        joyThumb.style.transform = 'translate(0,0)';
    }

    // Right-side button states
    let gasPressed   = false;
    let brakePressed = false;
    let nitroPressed = false;

    const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    if (isTouch) {
        joyEl.classList.add('touch-ready');
        document.getElementById('right-btns').classList.add('show');
        // Move minimap to right side so it's not under the joystick hand
        const mm = document.getElementById('minimap');
        mm.style.left  = 'auto';
        mm.style.right = '12px';
        document.getElementById('hint').textContent = 'Joystick links · Tippen = Gas · BREMSE / NITRO rechts';
    } else {
        document.getElementById('hint').textContent = 'WASD/Pfeile · LEERTASTE = Handbremse/Drift · SHIFT = NITRO';
    }

    function setupBtn(id, setFn) {
        const el = document.getElementById(id);
        el.addEventListener('pointerdown', e => { e.preventDefault(); setFn(true); el.classList.add('active'); el.setPointerCapture(e.pointerId); });
        el.addEventListener('pointerup',   e => { setFn(false); el.classList.remove('active'); });
        el.addEventListener('pointercancel', e => { setFn(false); el.classList.remove('active'); });
    }
    setupBtn('btn-gas',   v => { gasPressed   = v; });
    setupBtn('btn-brake', v => { brakePressed  = v; });
    setupBtn('btn-nitro', v => { nitroPressed  = v; });

    // ── Helpers ────────────────────────────────────────────────────
    function vibrate(pattern) {
        if (isTouch && navigator.vibrate) navigator.vibrate(pattern);
    }

    function rand(a, b) { return a + Math.random() * (b - a); }
    function dist2(ax, ay, bx, by) { const dx = ax - bx, dy = ay - by; return dx*dx + dy*dy; }

    function spawnParticles(x, y, count, color, speed, life) {
        for (let i = 0; i < count; i++) {
            const a = Math.random() * Math.PI * 2;
            const s = speed * (0.4 + Math.random() * 0.8);
            particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
                life, maxLife: life, color, size: 1.5 + Math.random() * 2.5 });
        }
    }

    // ── Init / Reset ───────────────────────────────────────────────
    function reset() {
        player = {
            x: STREET_W / 2,
            y: STREET_W / 2,
            angle: 0,
            velAngle: 0,
            speed: 0,
            w: 24, l: 42,
            alive: true,
            inTunnel: false,
            alignTimer: 0,
            alignTarget: 0,
            wallCooldown: 0,
            color: '#ffcc44',
            damage: 0
        };
        cops = [];
        groundCops = [];
        particles = [];
        pickups = [];
        banners = [];
        camX = player.x;
        camY = player.y;
        elapsed = 0;
        score = 0;
        cashGrabbed = 0;
        nextCopAt = 2.5;
        nextPickupAt = 1.5;
        nextGroundCopAt = 15;
        shake = 0;
        multiplier = 1;
        multiplierFreeze = 0;
        boost = 100;
        boostActive = false;
        driftTimer = 0;
        dyingTimer = 0;
        rumbleTimer = 0;
        robbedBanks  = new Set();
        bankRobTimer = 0;
        bankRobTarget = null;
        comboTimer = 0;
        comboCount = 0;
        mapMarkers   = [];
        cameraZoom = 1;
        gameState = 'idle';
    }

    function addBanner(text, color, big) {
        banners.push({ text, color: color || '#ffcc44', big: !!big, life: 1.4, max: 1.4 });
    }

    // Combo-aware score event — returns actual bonus awarded
    function scoreEvent(base, bannerText, bannerColor) {
        comboCount++;
        comboTimer = 2.5;
        const mult = (comboCount >= 3) ? 1.5 : 1.0;
        const bonus = Math.floor(base * mult);
        score += bonus;
        cashGrabbed += bonus;
        if (comboCount >= 3) {
            addBanner('COMBO x' + comboCount + '!', '#ff88ff');
        }
        if (bannerText) addBanner(bannerText + (mult > 1 ? ' (x1.5)' : ''), bannerColor || '#ffcc44');
        return bonus;
    }

    // ── Cop ────────────────────────────────────────────────────────
    function makeCopData(sx, sy) {
        const tier = Math.min(3, Math.floor(elapsed / 25));
        return {
            x: sx, y: sy,
            angle: Math.atan2(player.y - sy, player.x - sx),
            vx: 0, vy: 0,
            w: 22, l: 32,
            maxSpeed: 320 + tier * 25 + Math.random() * 30,
            accel: 320 + tier * 18,
            steer: 2.2 + tier * 0.18,
            rotor: Math.random() * Math.PI * 2,
            siren: 0,
            tier,
            state: 'chase',
            sx: 0, sy: 0,
            searchRefresh: 0
        };
    }

    function spawnCop() {
        const angle = Math.random() * Math.PI * 2;
        const dist = 700 + Math.random() * 200;
        const sx = Math.max(WORLD_MIN + 100, Math.min(WORLD_MAX - 100, player.x + Math.cos(angle) * dist));
        const sy = Math.max(WORLD_MIN + 100, Math.min(WORLD_MAX - 100, player.y + Math.sin(angle) * dist));
        cops.push(makeCopData(sx, sy));
    }

    function spawnGroundCop() {
        if (groundCops.length >= 3) return;
        const angle = Math.random() * Math.PI * 2;
        const dist = 600 + Math.random() * 200;
        let sx = player.x + Math.cos(angle) * dist;
        let sy = player.y + Math.sin(angle) * dist;
        sx = Math.max(WORLD_MIN + 100, Math.min(WORLD_MAX - 100, sx));
        sy = Math.max(WORLD_MIN + 100, Math.min(WORLD_MAX - 100, sy));
        // Snap to street
        const mx = ((sx % PITCH) + PITCH) % PITCH;
        const my = ((sy % PITCH) + PITCH) % PITCH;
        if (mx < my) sx = sx - mx + STREET_W / 2;
        else         sy = sy - my + STREET_W / 2;
        groundCops.push({
            x: sx, y: sy,
            angle: Math.atan2(player.y - sy, player.x - sx),
            velAngle: Math.atan2(player.y - sy, player.x - sx),
            speed: 0,
            w: 22, l: 38,
            maxSpeed: 280,
            accel: 350,
            wallCooldown: 0,
            siren: Math.random() * Math.PI * 2
        });
    }

    function scatterCop(c) {
        c.state = 'search';
        // Spread helis to random points across a wide search area around player
        const ang = Math.random() * Math.PI * 2;
        const d = 600 + Math.random() * 900;
        c.sx = player.x + Math.cos(ang) * d;
        c.sy = player.y + Math.sin(ang) * d;
        c.searchRefresh = 1.5 + Math.random();
    }

    function spawnPickup() {
        const angle = Math.random() * Math.PI * 2;
        const dist = 350 + Math.random() * 350;
        let px = player.x + Math.cos(angle) * dist;
        let py = player.y + Math.sin(angle) * dist;
        // Snap onto street
        const mx = ((px % PITCH) + PITCH) % PITCH;
        const my = ((py % PITCH) + PITCH) % PITCH;
        const useX = mx < my;
        if (useX) {
            px = px - mx + STREET_W / 2 + (Math.random() - 0.5) * (STREET_W - 30);
        } else {
            py = py - my + STREET_W / 2 + (Math.random() - 0.5) * (STREET_W - 30);
        }
        pickups.push({ x: px, y: py, taken: false, born: elapsed });
    }

    // ── Update ─────────────────────────────────────────────────────
    function update(dt) {
        if (gameState === 'countdown') {
            countdownLeft -= dt;
            updateParticles(dt);
            updateBanners(dt);
            return;
        }
        if (gameState === 'dying') {
            dyingTimer -= dt;
            updateParticles(dt);
            updateBanners(dt);
            if (shake > 0) shake = Math.max(0, shake - dt * 1.2);
            if (dyingTimer <= 0) actuallyDie();
            return;
        }
        if (gameState !== 'playing') return;

        elapsed += dt;
        // Multiplier decays unless we keep doing stuff
        if (multiplierFreeze > 0) multiplierFreeze -= dt;
        else multiplier = Math.max(1, multiplier - dt * 0.18);

        // Base score grows by 10 * multiplier per second
        score += dt * 10 * multiplier;

        // Damage regen
        if (player.damage > 0) player.damage = Math.max(0, player.damage - dt * 5);

        // Boost (Shift key or NITRO button)
        const wantsBoost = keys.ShiftLeft || keys.ShiftRight || nitroPressed;
        const prevBoost = boostActive;
        boostActive = wantsBoost && boost > 1;
        if (boostActive && !prevBoost) vibrate([15, 8, 25]);
        if (boostActive) {
            boost = Math.max(0, boost - dt * 32);
        } else {
            boost = Math.min(100, boost + dt * 5);  // slow passive refill
        }

        // Driving rumble — interval shrinks with speed
        const rumbleSpd = Math.abs(player.speed);
        if (rumbleSpd > 40) {
            rumbleTimer -= dt;
            if (rumbleTimer <= 0) {
                vibrate(boostActive ? 18 : 10);
                const interval = boostActive ? 0.08 : Math.max(0.12, 0.32 - (rumbleSpd / MAX_SPEED) * 0.20);
                rumbleTimer = interval;
            }
        } else {
            rumbleTimer = 0;
        }

        // Player input
        const accelInput = (keys.KeyW || keys.ArrowUp ? 1 : 0) - (keys.KeyS || keys.ArrowDown ? 1 : 0);
        const keySteer   = (keys.KeyD || keys.ArrowRight ? 1 : 0) - (keys.KeyA || keys.ArrowLeft ? 1 : 0);
        const steerInput = isTouch ? joyDX : keySteer;
        const handbrake  = keys.Space;

        // Touch: joystick active = auto-gas; brake button overrides; gas button also works
        const effectiveAccel = isTouch
            ? (brakePressed ? -1 : (joyActive || gasPressed) ? 1 : 0)
            : accelInput;

        const accelMul = boostActive ? 1.7 : 1.0;
        const maxSpeedEff = boostActive ? MAX_SPEED * 1.55 : MAX_SPEED;

        if (effectiveAccel > 0) {
            if (player.speed < -5) player.speed += BRAKE_DECEL * dt;
            else                   player.speed += ACCEL * accelMul * dt;
        } else if (effectiveAccel < 0) {
            if (player.speed > 5) player.speed -= BRAKE_DECEL * dt;
            else                  player.speed += REVERSE * dt;
        } else {
            player.speed *= Math.pow(FRICTION, dt * 60);
        }

        if (handbrake) {
            const sign = Math.sign(player.speed);
            player.speed -= sign * BRAKE_DECEL * dt;
            if (Math.sign(player.speed) !== sign) player.speed = 0;
        }

        player.speed = Math.max(MAX_REVERSE, Math.min(maxSpeedEff, player.speed));

        // Boost trails — flame particles behind player
        if (boostActive && Math.abs(player.speed) > 60) {
            const cosA = Math.cos(player.angle), sinA = Math.sin(player.angle);
            const back = -cosA * (player.l / 2 + 2);
            const backY = -sinA * (player.l / 2 + 2);
            spawnParticles(player.x + back, player.y + backY, 2, 'rgba(255,120,40,', 60, 0.35);
            spawnParticles(player.x + back, player.y + backY, 1, 'rgba(255,220,80,', 50, 0.3);
        }

        // J-Turn: rückwärts + scharf lenken → schöne animierte 180°-Drehung
        if (!player.jTurning && player.speed < -45 && Math.abs(steerInput) > 0.55 && (player.jTurnCooldown || 0) <= 0) {
            player.jTurning      = true;
            player.jTurnTimer    = 0;
            player.jTurnDuration = 0.38;
            player.jTurnDir      = Math.sign(steerInput);
            player.jTurnFrom     = player.angle;
            player.jTurnSpeed    = -player.speed * 0.6;
            vibrate([20, 8, 30]);
        }
        if ((player.jTurnCooldown || 0) > 0) player.jTurnCooldown -= dt;

        if (player.jTurning) {
            player.jTurnTimer += dt;
            const t    = Math.min(1, player.jTurnTimer / player.jTurnDuration);
            // Ease-in-out kurve: sanft starten, sanft stoppen
            const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

            player.angle    = player.jTurnFrom + player.jTurnDir * Math.PI * ease;
            player.velAngle = player.angle;
            player.speed    = player.jTurnSpeed * (0.3 + 0.7 * ease);

            // Reifenrauch zieht die Kurve nach
            const cosA = Math.cos(player.angle), sinA = Math.sin(player.angle);
            const rearX = player.x - cosA * (player.l / 2 - 4);
            const rearY = player.y - sinA * (player.l / 2 - 4);
            const side  = player.w / 2 - 2;
            spawnParticles(rearX + sinA * side, rearY - cosA * side, 2, 'rgba(50,50,50,', 8, 1.4);
            spawnParticles(rearX - sinA * side, rearY + cosA * side, 2, 'rgba(50,50,50,', 8, 1.4);
            // Funkenfunken in der Mitte der Drehung
            if (t > 0.35 && t < 0.65) {
                spawnParticles(player.x, player.y, 1, 'rgba(255,180,50,', 80, 0.3);
            }
            shake = Math.min(0.35, shake + dt * 0.5);

            if (t >= 1) {
                player.jTurning      = false;
                player.jTurnCooldown = 0.7;
                player.angle         = player.jTurnFrom + player.jTurnDir * Math.PI;
                player.velAngle      = player.angle;
                player.speed         = player.jTurnSpeed;
                spawnParticles(player.x, player.y, 10, 'rgba(255,160,40,', 110, 0.45);
            }
        }

        // Steering — während J-Turn gesperrt
        if (!player.jTurning) {
            const speedFactor = Math.min(1, Math.abs(player.speed) / 80);
            const steerEff = handbrake ? STEER_RATE * 1.25 : STEER_RATE;
            const dirSign = player.speed >= 0 ? 1 : -1;
            player.angle += steerInput * steerEff * speedFactor * dt * dirSign;
        }

        // Drift: velocity angle catches up to heading. Lower grip = more drift.
        if (Math.abs(player.speed) > 30) {
            let velDiff = player.angle - player.velAngle;
            while (velDiff > Math.PI)  velDiff -= Math.PI * 2;
            while (velDiff < -Math.PI) velDiff += Math.PI * 2;
            const grip = handbrake ? 2.6 : 7.5;
            player.velAngle += velDiff * Math.min(1, grip * dt);

            // Slip side-friction bleeds a bit of speed when drifting hard
            const slip = Math.abs(velDiff);
            if (slip > 0.3) player.speed *= Math.pow(0.985, dt * 60 * (slip - 0.3));

            // Drift bonus: charge boost, bump multiplier, award drift completion
            if (slip > 0.35 && Math.abs(player.speed) > 100) {
                driftTimer += dt;
                boost = Math.min(100, boost + dt * 22);
                multiplier = Math.min(8, multiplier + dt * 0.45);
                multiplierFreeze = 1.0;
            } else if (driftTimer > 0) {
                if (driftTimer > 1.2) {
                    const base = Math.floor(driftTimer * 80 * multiplier);
                    comboCount++; comboTimer = 2.5;
                    const mult = (comboCount >= 3) ? 1.5 : 1.0;
                    const bonus = Math.floor(base * mult);
                    score += bonus;
                    if (comboCount >= 3) addBanner('COMBO x' + comboCount + '!', '#ff88ff');
                    addBanner(`DRIFT! +${bonus}` + (mult > 1 ? ' (x1.5)' : ''), '#ff44aa');
                }
                driftTimer = 0;
            }

            // Skid particles from rear wheels when drifting
            if (slip > 0.25 && Math.abs(player.speed) > 100) {
                const cosA = Math.cos(player.angle), sinA = Math.sin(player.angle);
                const back = -cosA * (player.l / 2 - 4);
                const backY = -sinA * (player.l / 2 - 4);
                const sideOff = (player.w / 2 - 2);
                // Two rear wheels
                spawnParticles(player.x + back + sinA * sideOff, player.y + backY - cosA * sideOff, 1, 'rgba(180,180,180,', 25, 0.6);
                spawnParticles(player.x + back - sinA * sideOff, player.y + backY + cosA * sideOff, 1, 'rgba(180,180,180,', 25, 0.6);
            }
        } else {
            // At low / reverse speed, no drift — keeps reversing predictable
            player.velAngle = player.angle;
        }

        // Move with collision (uses velAngle for actual travel direction)
        moveWithCollision(player, dt);

        // Cooldown für Wandtreffer
        if (player.wallCooldown > 0) player.wallCooldown -= dt;

        // Winkel nach Wandtreffer sanft zur Straßenachse korrigieren
        if (player.alignTimer > 0) {
            if (Math.abs(steerInput) > 0.08) {
                player.alignTimer = 0; // Spieler lenkt selbst → sofort abbrechen
            } else {
                player.alignTimer -= dt;
                let sd = player.alignTarget - player.velAngle;
                while (sd >  Math.PI) sd -= Math.PI * 2;
                while (sd < -Math.PI) sd += Math.PI * 2;
                player.velAngle += sd * Math.min(1, dt * 1.8);
                player.angle     = player.velAngle;
            }
        }

        // Cops
        for (let i = cops.length - 1; i >= 0; i--) {
            const c = cops[i];
            c.siren += dt;
            c.rotor += dt * 26;

            const dx = player.x - c.x;
            const dy = player.y - c.y;
            const d  = Math.hypot(dx, dy);
            if (d > 1800) { cops.splice(i, 1); continue; }

            // Search mode: patrol to assigned search point until refresh or spotting
            if (c.state === 'search') {
                c.searchRefresh -= dt;
                const tdx = c.sx - c.x;
                const tdy = c.sy - c.y;
                if (c.searchRefresh <= 0 || (tdx*tdx + tdy*tdy) < 90*90) {
                    const ang = Math.random() * Math.PI * 2;
                    const dd = 350 + Math.random() * 500;
                    c.sx = c.x + Math.cos(ang) * dd;
                    c.sy = c.y + Math.sin(ang) * dd;
                    c.searchRefresh = 1.5 + Math.random() * 1.2;
                }
                // Re-spot player + radio everyone else
                if (!player.inTunnel && d < 600) {
                    c.state = 'chase';
                    spawnParticles(c.x, c.y, 8, 'rgba(255,68,68,', 100, 0.5);
                    let alerted = 0;
                    for (const o of cops) {
                        if (o !== c && o.state === 'search') {
                            o.state = 'chase';
                            // Re-orient toward player for an instant lock-on
                            const ang2 = Math.atan2(player.y - o.y, player.x - o.x);
                            o.angle = ang2;
                            spawnParticles(o.x, o.y, 6, 'rgba(255,180,80,', 70, 0.4);
                            alerted++;
                        }
                    }
                    addBanner(alerted > 0 ? 'FUNKSPRUCH! +' + alerted + ' Helis' : 'GESPOTTET!', '#ff4444');
                }
            }

            // Determine target (player or search point)
            const useSearch = c.state === 'search';
            const tx = useSearch ? c.sx : player.x;
            const ty = useSearch ? c.sy : player.y;
            const target = Math.atan2(ty - c.y, tx - c.x);
            let diff = target - c.angle;
            while (diff > Math.PI)  diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;
            const maxTurn = c.steer * dt;
            c.angle += Math.max(-maxTurn, Math.min(maxTurn, diff));

            // Thrust in current heading direction
            c.vx += Math.cos(c.angle) * c.accel * dt;
            c.vy += Math.sin(c.angle) * c.accel * dt;

            // Air drag — velocity bleeds slowly, gives overshoot/momentum
            const drag = Math.pow(0.985, dt * 60);
            c.vx *= drag;
            c.vy *= drag;

            // Cap velocity magnitude
            const sp = Math.hypot(c.vx, c.vy);
            if (sp > c.maxSpeed) {
                c.vx = c.vx / sp * c.maxSpeed;
                c.vy = c.vy / sp * c.maxSpeed;
            }

            // Helis fly through anything — pure ballistic motion
            c.x += c.vx * dt;
            c.y += c.vy * dt;

            // Catch: distance check between centers (tunnel + search mode protect player)
            const playerD2 = dist2(c.x, c.y, player.x, player.y);
            if (c.state === 'chase' && !player.inTunnel && playerD2 < 35 * 35) {
                die();
                return;
            }

            // Close call only when actively chasing and player visible
            const closeR2 = 80 * 80;
            const wasClose = c.wasClose || false;
            const isClose = c.state === 'chase' && !player.inTunnel &&
                            playerD2 < closeR2 && playerD2 > 40 * 40;
            if (isClose && !wasClose) {
                const base = Math.floor(75 * multiplier);
                comboCount++; comboTimer = 2.5;
                const mult = (comboCount >= 3) ? 1.5 : 1.0;
                const bonus = Math.floor(base * mult);
                score += bonus;
                multiplier = Math.min(8, multiplier + 0.35);
                multiplierFreeze = 1.2;
                boost = Math.min(100, boost + 18);
                shake = Math.max(shake, 0.35);
                if (comboCount >= 3) addBanner('COMBO x' + comboCount + '!', '#ff88ff');
                addBanner('CLOSE CALL! +' + bonus + (mult > 1 ? ' (x1.5)' : ''), '#ffcc44');
                spawnParticles(player.x, player.y, 6, 'rgba(255,220,80,', 90, 0.4);
            }
            c.wasClose = isClose;

            // Cop-vs-cop minor avoidance
            for (let j = 0; j < cops.length; j++) {
                if (j === i) continue;
                const o = cops[j];
                const od = dist2(c.x, c.y, o.x, o.y);
                if (od < 50 * 50 && od > 0) {
                    const od2 = Math.sqrt(od);
                    const push = (50 - od2) * 0.5;
                    c.x += (c.x - o.x) / od2 * push;
                    c.y += (c.y - o.y) / od2 * push;
                }
            }
        }

        // Ground cops
        if (elapsed >= 15) {
            nextGroundCopAt -= dt;
            if (nextGroundCopAt <= 0) {
                spawnGroundCop();
                nextGroundCopAt = Math.max(12, 25 - elapsed * 0.1);
            }
        }
        for (let i = groundCops.length - 1; i >= 0; i--) {
            const g = groundCops[i];
            g.siren += dt;
            if (Math.hypot(g.x - player.x, g.y - player.y) > 2000) {
                groundCops.splice(i, 1); continue;
            }
            // Steer toward player
            const tdx = player.x - g.x, tdy = player.y - g.y;
            const target = Math.atan2(tdy, tdx);
            let diff = target - g.angle;
            while (diff >  Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;
            g.angle += Math.max(-3.2 * dt, Math.min(3.2 * dt, diff));
            g.velAngle = g.angle;
            // Accelerate
            if (g.speed < g.maxSpeed) g.speed += g.accel * dt;
            g.speed = Math.min(g.maxSpeed, g.speed);
            if (g.wallCooldown > 0) g.wallCooldown -= dt;
            moveWithCollision(g, dt);
            // Catch
            if (dist2(g.x, g.y, player.x, player.y) < 28 * 28) {
                die(); return;
            }
        }

        // Combo decay
        if (comboTimer > 0) {
            comboTimer -= dt;
            if (comboTimer <= 0) comboCount = 0;
        }

        // Tunnel hideout: helis scatter to search, can't see player while inside
        const nowInTunnel = isInTunnelAt(player.x, player.y);
        if (nowInTunnel && !player.inTunnel) {
            // Just entered → scatter all helis to random search points across the city
            for (const c of cops) {
                scatterCop(c);
                spawnParticles(c.x, c.y, 4, 'rgba(80,140,255,', 50, 0.3);
            }
            addBanner('VERSTECKT IM TUNNEL', '#44ff88');
            boost = Math.min(100, boost + 30);
            nextCopAt = Math.max(nextCopAt, 6);
        }
        if (!nowInTunnel && player.inTunnel) {
            // Just exited → notify
            addBanner('GESUCHT!', '#ff4444');
        }
        player.inTunnel = nowInTunnel;

        // Spawn cops over time (paused while in tunnel)
        if (!nowInTunnel) {
            nextCopAt -= dt;
            if (nextCopAt <= 0) {
                spawnCop();
                const target = Math.max(2.0, 8.0 - elapsed * 0.06);
                nextCopAt = target;
            }
        }

        // Pickups
        nextPickupAt -= dt;
        if (nextPickupAt <= 0 && pickups.filter(p => !p.taken).length < 4) {
            spawnPickup();
            nextPickupAt = rand(2.5, 4.5);
        }
        for (let i = pickups.length - 1; i >= 0; i--) {
            const p = pickups[i];
            if (p.taken) { pickups.splice(i, 1); continue; }
            if (elapsed - p.born > 14) { pickups.splice(i, 1); continue; }
            if (dist2(p.x, p.y, player.x, player.y) < 30 * 30) {
                p.taken = true;
                const pickupBase = Math.floor(80 * multiplier);
                comboCount++; comboTimer = 2.5;
                const pickupMult = (comboCount >= 3) ? 1.5 : 1.0;
                const pickupBonus = Math.floor(pickupBase * pickupMult);
                score += pickupBonus;
                cashGrabbed += pickupBonus;
                multiplier = Math.min(8, multiplier + 0.15);
                multiplierFreeze = 1.0;
                spawnParticles(p.x, p.y, 14, 'rgba(0,255,120,', 140, 0.7);
                if (comboCount >= 3) addBanner('COMBO x' + comboCount + '!', '#ff88ff');
                addBanner('+$' + pickupBonus + (pickupMult > 1 ? ' (x1.5)' : ''), '#44ff88');
                vibrate(30);
            }
        }

        updateBanks(dt);

        // Siren HUD phase
        sirenPhase += dt;

        // Camera follow + speed-based zoom-out
        const lookahead = 0.4;
        const tx = player.x + Math.cos(player.angle) * player.speed * lookahead * 0.4;
        const ty = player.y + Math.sin(player.angle) * player.speed * lookahead * 0.4;
        camX += (tx - camX) * Math.min(1, dt * 4);
        camY += (ty - camY) * Math.min(1, dt * 4);

        const spd = Math.abs(player.speed);
        let targetZoom = 1 - Math.min(0.15, spd / MAX_SPEED * 0.15);
        if (boostActive) targetZoom = Math.max(0.78, targetZoom - 0.04);
        cameraZoom += (targetZoom - cameraZoom) * Math.min(1, dt * 1.2);

        // Effects decay
        if (shake > 0) shake = Math.max(0, shake - dt * 3);
        updateParticles(dt);
        updateBanners(dt);
    }

    function updateBanners(dt) {
        for (let i = banners.length - 1; i >= 0; i--) {
            banners[i].life -= dt;
            if (banners[i].life <= 0) banners.splice(i, 1);
        }
    }

    function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vx *= 0.95;
            p.vy *= 0.95;
            p.life -= dt;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    // ── Movement + Collision ───────────────────────────────────────
    function moveWithCollision(car, dt) {
        const a = car.velAngle !== undefined ? car.velAngle : car.angle;
        const dx = Math.cos(a) * car.speed * dt;
        const dy = Math.sin(a) * car.speed * dt;

        const base = blockedCorners(car.x, car.y, car);
        let hit = false;
        let movedX = false, movedY = false;

        // X axis
        if (blockedCorners(car.x + dx, car.y, car) <= base) {
            car.x += dx;
            movedX = true;
        } else {
            car.x -= dx * 0.15;
            hit = true;
        }

        // Y axis
        const mid = blockedCorners(car.x, car.y, car);
        if (blockedCorners(car.x, car.y + dy, car) <= mid) {
            car.y += dy;
            movedY = true;
        } else {
            car.y -= dy * 0.15;
            hit = true;
        }

        // Unstuck: beide Achsen blockiert → sanft zur nächsten Straßenmitte schieben
        if (!movedX && !movedY && Math.abs(car.speed) > 10) {
            const vn    = Math.round((car.x - STREET_W / 2) / PITCH);
            const vcx   = vn * PITCH + STREET_W / 2;
            const hn    = Math.round((car.y - STREET_W / 2) / PITCH);
            const hcy   = hn * PITCH + STREET_W / 2;
            const vdist = Math.abs(car.x - vcx);
            const hdist = Math.abs(car.y - hcy);
            // Nur die nähere Achse korrigieren
            if (vdist < hdist) car.x += (vcx - car.x) * 0.12;
            else               car.y += (hcy - car.y) * 0.12;
            car.speed *= 0.88;
        }

        if (hit) wallHitEffect(car);
    }

    function wallHitEffect(car) {
        if (car === player && player.wallCooldown > 0) return; // zu schnell hintereinander → ignorieren
        const spd = Math.abs(car.speed);
        if (spd < 20) return;

        // Nur ganz leicht abbremsen
        car.speed *= 0.994;

        // 1 Bremssspur
        const cosA = Math.cos(car.angle), sinA = Math.sin(car.angle);
        const rearX = car.x - cosA * (car.l / 2 - 4);
        const rearY = car.y - sinA * (car.l / 2 - 4);
        const side  = car.w / 2 - 2;
        spawnParticles(rearX + sinA * side, rearY - cosA * side, 1, 'rgba(30,30,30,', 2, 1.2);
        spawnParticles(rearX - sinA * side, rearY + cosA * side, 1, 'rgba(30,30,30,', 2, 1.2);

        if (car === player) {
            shake = Math.min(0.12, shake + 0.04);
            vibrate([6]);
            player.wallCooldown = 0.4; // nächste 400ms nicht nochmal auslösen
            player.damage = Math.min(100, (player.damage || 0) + 8 * DAMAGE_MULT);

            // Geraderichten nur wenn Spieler gerade NICHT lenkt
            const si = isTouch ? joyDX : (keys.KeyD || keys.ArrowRight ? 1 : 0) - (keys.KeyA || keys.ArrowLeft ? 1 : 0);
            if (Math.abs(si) <= 0.08) {
                player.alignTarget = Math.round(car.velAngle / (Math.PI / 2)) * (Math.PI / 2);
                player.alignTimer  = 1.8;
            }
        }
    }

    function blockedCorners(nx, ny, car) {
        const cos = Math.cos(car.angle), sin = Math.sin(car.angle);
        const hw = car.w / 2 - 2, hl = car.l / 2 - 2;
        const corners = [
            [ hl,  hw], [ hl, -hw], [-hl,  hw], [-hl, -hw]
        ];
        let n = 0;
        for (const [lx, ly] of corners) {
            const wx = nx + lx * cos - ly * sin;
            const wy = ny + lx * sin + ly * cos;
            if (!isStreet(wx, wy)) n++;
        }
        return n;
    }

    // ── Render ─────────────────────────────────────────────────────
    function draw() {
        // Wasser als Hintergrund — night mode
        ctx.fillStyle = '#060e1a';
        ctx.fillRect(0, 0, W, H);

        ctx.save();
        const sx = (shake > 0) ? (Math.random() - 0.5) * shake * 6 : 0;
        const sy = (shake > 0) ? (Math.random() - 0.5) * shake * 6 : 0;
        ctx.translate(W / 2 + sx, H / 2 + sy);
        ctx.scale(cameraZoom / PIXEL_SCALE, cameraZoom / PIXEL_SCALE);
        ctx.translate(-camX, -camY);

        drawWater();
        drawStreets();
        drawStreetLamps();
        drawBuildings();
        drawBanks();
        drawPickups();
        drawCar(player, _cs.color, _cs.accent, false);
        for (const g of groundCops) drawGroundCop(g);
        drawTunnels();   // tunnel cap on top of player → player hides under it
        for (const c of cops) drawHeli(c);
        drawParticles();

        ctx.restore();

        drawBanners();
        drawSirenHUD();
        if (boostActive) drawSpeedLines();
        if (gameState === 'idle') drawIdleOverlay();
        drawMapMarkerHUD();
        drawMinimap();
    }

    function drawMinimap() {
        const m = miniCtx;
        // Background = road/asphalt tone (streets will show as the gaps between buildings)
        m.fillStyle = '#1a2230';
        m.fillRect(0, 0, MINI_SIZE, MINI_SIZE);

        const px = player ? player.x : 0;
        const py = player ? player.y : 0;
        const half = MINI_RANGE / 2;
        const left   = px - half;
        const right  = px + half;
        const top    = py - half;
        const bottom = py + half;
        const w2s = (wx) => (wx - px) * MINI_SCALE + MINI_SIZE / 2;
        const h2s = (wy) => (wy - py) * MINI_SCALE + MINI_SIZE / 2;

        const startBX = Math.floor(left   / PITCH);
        const endBX   = Math.ceil (right  / PITCH);
        const startBY = Math.floor(top    / PITCH);
        const endBY   = Math.ceil (bottom / PITCH);

        // Draw buildings as uniform gray blocks
        m.fillStyle = '#5a5e66';
        for (let by = startBY; by <= endBY; by++) {
            for (let bx = startBX; bx <= endBX; bx++) {
                if (isMergedRight(bx - 1, by)) continue;
                if (isMergedDown(bx, by - 1))  continue;
                const x0 = bx * PITCH + STREET_W;
                const y0 = by * PITCH + STREET_W;
                let w = BLOCK_SIZE;
                let h = BLOCK_SIZE;
                if (isMergedRight(bx, by)) w += STREET_W + BLOCK_SIZE;
                if (isMergedDown(bx, by))  h += STREET_W + BLOCK_SIZE;
                m.fillRect(w2s(x0), h2s(y0), Math.max(1, w * MINI_SCALE), Math.max(1, h * MINI_SCALE));
            }
        }

        // Street center markings (subtle dashed lines so streets stand out)
        m.fillStyle = 'rgba(255,220,80,0.18)';
