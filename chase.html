            ctx.fillRect(cx - 18 + i * 8, cy - 9, 4, 18);
        }

        // Side stripe
        const stripeColors = ['rgba(255,200,80,0.45)', 'rgba(255,80,80,0.4)', 'rgba(120,200,255,0.4)'];
        ctx.fillStyle = stripeColors[Math.floor(r * 100) % stripeColors.length];
        ctx.fillRect(x + 4, y + 8, w - 8, 3);
    }

    function drawBuilding(x, y, w, h, r) {
        const pad = 4 + (r * 6 % 1) * 6;
        const bx = x + pad, by = y + pad;
        const bw = w - pad * 2, bh = h - pad * 2;

        // Building body — colored variants
        const colorIdx = Math.floor(r * 5);
        const colors = ['#1a2942', '#2a1c3a', '#1f2f30', '#2c2a1c', '#2a1f1f'];
        ctx.fillStyle = colors[colorIdx];
        ctx.fillRect(bx, by, bw, bh);

        // Edges
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(bx, by, bw, 3);
        ctx.fillRect(bx, by, 3, bh);

        // Windows
        const winColor = ((r * 31) % 1) > 0.6 ? 'rgba(255,200,100,0.55)' : 'rgba(120,180,255,0.4)';
        const dimColor = 'rgba(255,255,255,0.04)';
        const cw = 10, ch = 10, gap = 6;
        for (let wy = by + 12; wy + ch < by + bh - 8; wy += ch + gap) {
            for (let wx = bx + 10; wx + cw < bx + bw - 8; wx += cw + gap) {
                const lit = Math.abs((Math.sin(wx * 12.9898 + wy * 78.233 + r * 100) * 43758.5453) % 1);
                ctx.fillStyle = (lit > 0.55) ? winColor : dimColor;
                ctx.fillRect(wx, wy, cw, ch);
            }
        }

        // Outer shadow
        ctx.strokeStyle = 'rgba(0,0,0,0.6)';
        ctx.lineWidth = 1;
        ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
    }

    function drawPickups() {
        const now = performance.now() / 1000;
        for (const p of pickups) {
            if (p.taken) continue;
            // Cull
            if (Math.abs(p.x - camX) > W * PIXEL_SCALE / cameraZoom / 2 + 40 || Math.abs(p.y - camY) > H * PIXEL_SCALE / cameraZoom / 2 + 40) continue;
            const bob = Math.sin(now * 4 + p.x * 0.01) * 2;
            const fade = elapsed - p.born > 11 ? (Math.sin(now * 12) * 0.5 + 0.5) : 1;
            ctx.save();
            ctx.translate(p.x, p.y + bob);
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 14;
            ctx.fillStyle = `rgba(0,255,136,${fade})`;
            ctx.font = 'bold 22px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', 0, 0);
            ctx.restore();
        }
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
    }

    function drawCar(car, body, accent, isCop) {
        // Cull
        if (Math.abs(car.x - camX) > W * PIXEL_SCALE / cameraZoom / 2 + 80 || Math.abs(car.y - camY) > H * PIXEL_SCALE / cameraZoom / 2 + 80) return;

        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle);

        const w = car.w, l = car.l;

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.beginPath();
        ctx.ellipse(2, 2, l / 2, w / 2, 0, 0, Math.PI * 2);
        ctx.fill();

        // Body
        ctx.fillStyle = body;
        roundRect(-l / 2, -w / 2, l, w, 5);
        ctx.fill();

        // Accent stripe
        ctx.fillStyle = accent;
        ctx.fillRect(-l / 2 + 4, -w / 2 + 1, 4, w - 2);

        // Windshield
        ctx.fillStyle = 'rgba(20,30,50,0.85)';
        ctx.fillRect(-l / 4, -w / 2 + 3, l / 4, w - 6);
        // Rear window
        ctx.fillStyle = 'rgba(20,30,50,0.65)';
        ctx.fillRect(-l / 2 + 6, -w / 2 + 4, 8, w - 8);

        // Headlights
        ctx.fillStyle = 'rgba(255,255,200,0.95)';
        ctx.fillRect(l / 2 - 2, -w / 2 + 2, 2, 4);
        ctx.fillRect(l / 2 - 2,  w / 2 - 6, 2, 4);

        ctx.restore();
    }

    function drawHeli(c) {
        if (Math.abs(c.x - camX) > W * PIXEL_SCALE / cameraZoom / 2 + 100 || Math.abs(c.y - camY) > H * PIXEL_SCALE / cameraZoom / 2 + 100) return;

        const w = c.w, l = c.l;

        // Ground shadow (offset, blocky pixel oval = chunky rectangle)
        ctx.save();
        ctx.translate(c.x + 6, c.y + 6);
        ctx.rotate(c.angle);
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(-l / 2, -w / 2, l, w);
        ctx.restore();

        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.angle);

        // Tail boom
        ctx.fillStyle = '#1a3066';
        ctx.fillRect(-l / 2 - 2, -2, 14, 4);
        // Tail fin
        ctx.fillStyle = '#142244';
        ctx.fillRect(-l / 2 - 4, -4, 4, 8);
        // Tail rotor (animated)
        const tr = c.rotor * 1.5;
        ctx.strokeStyle = 'rgba(220,220,220,0.7)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(-l / 2 - 2 + Math.cos(tr) * 6, -1 + Math.sin(tr) * 6);
        ctx.lineTo(-l / 2 - 2 - Math.cos(tr) * 6, -1 - Math.sin(tr) * 6);
        ctx.stroke();

        // Body
        ctx.fillStyle = '#2a5cb0';
        ctx.fillRect(-8, -w / 2, 18, w);
        // White POLICE stripe
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-8, -2, 18, 4);

        // Cockpit (front bubble)
        ctx.fillStyle = '#0d1a36';
        ctx.fillRect(8, -w / 2 + 2, 4, w - 4);
        ctx.fillStyle = 'rgba(160,210,255,0.55)';
        ctx.fillRect(10, -w / 2 + 3, 2, w - 6);

        // Skids (parallel rails)
        ctx.fillStyle = '#aab0bc';
        ctx.fillRect(-6, -w / 2 - 3, 14, 2);
        ctx.fillRect(-6,  w / 2 + 1, 14, 2);

        // Top light: red/blue flashing in chase, slow yellow in search
        if (c.state === 'search') {
            const sp = Math.sin(c.siren * 4) > 0;
            ctx.fillStyle = sp ? '#ffcc44' : '#aa8800';
        } else {
            const phase = Math.sin(c.siren * 14) > 0;
            ctx.fillStyle = phase ? '#ff2222' : '#2277ff';
        }
        ctx.fillRect(-2, -2, 4, 4);

        // Main rotor — two crossed blades, animated
        const r = c.rotor;
        const blade = 26;
        ctx.strokeStyle = 'rgba(20,20,30,0.85)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(Math.cos(r) * blade, Math.sin(r) * blade);
        ctx.lineTo(-Math.cos(r) * blade, -Math.sin(r) * blade);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(Math.cos(r + Math.PI / 2) * blade, Math.sin(r + Math.PI / 2) * blade);
        ctx.lineTo(-Math.cos(r + Math.PI / 2) * blade, -Math.sin(r + Math.PI / 2) * blade);
        ctx.stroke();
        // Rotor blur (motion smear)
        ctx.strokeStyle = 'rgba(80,80,90,0.18)';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(0, 0, blade, 0, Math.PI * 2); ctx.stroke();

        // Hub
        ctx.fillStyle = '#1a1f2a';
        ctx.fillRect(-3, -3, 6, 6);

        ctx.restore();
    }

    function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
    }

    function drawParticles() {
        for (const p of particles) {
            const a = Math.max(0, p.life / p.maxLife);
            ctx.fillStyle = p.color + a + ')';
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function drawIdleOverlay() {
        ctx.fillStyle = 'rgba(5,10,20,0.5)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = 'bold 1rem "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(isTouch ? 'TIPPEN ZUM STARTEN' : 'LEERTASTE ODER KLICK ZUM STARTEN', W / 2, H * 0.55);
        ctx.textAlign = 'left';
    }

    // ── HUD updates ────────────────────────────────────────────────
    const hudScore  = document.getElementById('hud-score');
    const hudWanted = document.getElementById('hud-wanted');
    const hudMult   = document.getElementById('hud-mult');
    const boostBar  = document.getElementById('boost-bar');
    const hpBar     = document.getElementById('hp-bar');
    function updateHud() {
        hudScore.textContent = Math.floor(score);
        const stars = Math.min(5, Math.max(1, cops.length));
        hudWanted.textContent = '★'.repeat(stars) + '☆'.repeat(5 - stars);

        hudMult.textContent = 'x' + multiplier.toFixed(1);
        hudMult.classList.toggle('hot',  multiplier >= 2.5 && multiplier < 5);
        hudMult.classList.toggle('fire', multiplier >= 5);

        boostBar.style.width = boost + '%';
        boostBar.classList.toggle('active', boostActive);

        hpBar.style.width = (player ? player.hp : 100) + '%';
        hpBar.classList.toggle('low', player && player.hp < 30);
    }

    // ── Countdown ──────────────────────────────────────────────────
    const cdEl = document.getElementById('countdown');
    function showCountdown(text, isGo) {
        cdEl.textContent = text;
        cdEl.classList.toggle('go', !!isGo);
        cdEl.style.display = 'block';
        cdEl.style.animation = 'none';
        cdEl.offsetHeight; // reflow
        cdEl.style.animation = '';
    }

    function startCountdown() {
        gameState = 'countdown';
        countdownLeft = 3;
        let last = 4;
        showCountdown('3', false);
        const tick = () => {
            if (gameState !== 'countdown') return;
            const cur = Math.ceil(countdownLeft);
            if (cur !== last && cur >= 1) {
                showCountdown(String(cur), false);
                last = cur;
            }
            if (countdownLeft <= 0) {
                showCountdown('LOS!', true);
                gameState = 'playing';
                lastT = performance.now();
                setTimeout(() => { cdEl.style.display = 'none'; }, 700);
                // Spawn the first cop immediately
                spawnCop();
                return;
            }
            requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
    }

    // ── Game flow ──────────────────────────────────────────────────
    function startGame() {
        reset();
        document.getElementById('hint').style.display = 'none';
        startCountdown();
    }

    function die() {
        if (gameState === 'dead' || gameState === 'dying') return;
        gameState = 'dying';
        dyingTimer = 1.4;
        shake = 1.4;
        // Huge explosion
        spawnParticles(player.x, player.y, 60, 'rgba(255,80,40,', 350, 1.0);
        spawnParticles(player.x, player.y, 40, 'rgba(255,180,40,', 250, 1.2);
        spawnParticles(player.x, player.y, 20, 'rgba(255,255,200,', 180, 0.6);
        spawnParticles(player.x, player.y, 30, 'rgba(80,80,80,',   140, 1.5);
        addBanner('BUSTED!', '#ff3333', true);
    }

    async function actuallyDie() {
        gameState = 'dead';
        const finalScore = Math.floor(score);

        const finalEl = document.getElementById('final-score-display');
        finalEl.textContent = finalScore;
        document.getElementById('game-over-modal').classList.add('show');

        const name = (() => { try { return JSON.parse(localStorage.getItem('1100px_user'))?.name; } catch { return null; } })();
        if (name && finalScore > 0 && window.storeResult) {
            window.storeResult(name, finalScore);
        } else if (window.loadLeaderboard) {
            window.loadLeaderboard();
        }
    }

    // ── Main loop ──────────────────────────────────────────────────
    function loop(t) {
        const dt = Math.min((t - lastT) / 1000, 0.05);
        lastT = t;
        update(dt);
        draw();
        if (gameState === 'playing' || gameState === 'countdown' || gameState === 'dying') updateHud();
        requestAnimationFrame(loop);
    }

    // ── Boot ───────────────────────────────────────────────────────
    function boot() {
        reset();
        // Login flow
        let user = null;
        try { user = JSON.parse(localStorage.getItem('1100px_user')); } catch {}
        if (!user || !user.name) {
            const m = document.getElementById('name-modal');
            m.classList.add('show');
            const inp = document.getElementById('name-input');
            const sub = document.getElementById('name-submit');
            const submit = () => {
                const v = inp.value.trim();
                if (v.length < 2) { inp.classList.add('input-error'); setTimeout(() => inp.classList.remove('input-error'), 400); return; }
                localStorage.setItem('1100px_user', JSON.stringify({ name: v }));
                m.classList.remove('show');
                kickoffWaitToStart();
                startGame();
            };
            sub.addEventListener('click', submit);
            inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
            setTimeout(() => inp.focus(), 200);
        } else {
            kickoffWaitToStart();
        }

        lastT = performance.now();
        requestAnimationFrame(loop);
    }

    function kickoffWaitToStart() {
        const tryStart = () => {
            if (gameState === 'idle') startGame();
        };
        const onKey = e => {
            if (gameState === 'idle' && (e.code === 'Space' || e.code === 'Enter')) { e.preventDefault(); tryStart(); }
        };
        document.addEventListener('keydown', onKey);

        canvas.addEventListener('pointerdown', e => {
            if (gameState === 'idle') { tryStart(); return; }
            if (isTouch && gameState === 'playing' && !joyActive) {
                e.preventDefault();
                spawnJoy(e.clientX, e.clientY, e.pointerId);
                try { canvas.setPointerCapture(e.pointerId); } catch {}
            }
        });
        canvas.addEventListener('pointermove', e => {
            if (joyActive && e.pointerId === joyPointerId) {
                e.preventDefault();
                moveJoy(e.clientX, e.clientY);
            }
        });
        canvas.addEventListener('pointerup', e => {
            if (joyActive && e.pointerId === joyPointerId) endJoy();
        });
        canvas.addEventListener('pointercancel', e => {
            if (joyActive && e.pointerId === joyPointerId) endJoy();
        });

        // Restart button
        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over-modal').classList.remove('show');
            startGame();
        });

        // Restart with key/pointer when dead
        document.addEventListener('keydown', e => {
            if (gameState === 'dead' && (e.code === 'Space' || e.code === 'Enter')) {
                document.getElementById('game-over-modal').classList.remove('show');
                startGame();
            }
        });
    }

    boot();
})();
</script>
