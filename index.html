<!DOCTYPE html>
<html lang="de">
<head>
    <title>1100pixels.com</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/index.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, where, limit }
            from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyCGxWCAMbglUMjHeKRdeniS4TcA5oCAx1c",
            authDomain: "pixels-e2f82.firebaseapp.com",
            projectId: "pixels-e2f82",
            storageBucket: "pixels-e2f82.firebasestorage.app",
            messagingSenderId: "311496840709",
            appId: "1:311496840709:web:3a94601ef40cbd0c946e6c"
        });
        const db = getFirestore(app);

        async function loadTop3(colName, prefix, gameFilter) {
            try {
                const q = gameFilter
                    ? query(collection(db, colName), where('game', '==', gameFilter))
                    : query(collection(db, colName), orderBy('points', 'desc'), limit(3));
                const snap = await getDocs(q);
                const top = [];
                snap.forEach(doc => top.push(doc.data()));
                if (gameFilter) top.sort((a, b) => b.points - a.points);
                top.splice(3);
                for (let i = 0; i < 3; i++) {
                    const el = document.getElementById(`${prefix}${i+1}`);
                    if (!el) continue;
                    if (top[i]) {
                        el.querySelector('.p-name').textContent = top[i].name;
                        el.querySelector('.p-pts').textContent  = top[i].points;
                    } else {
                        el.querySelector('.p-name').textContent = '–';
                        el.querySelector('.p-pts').textContent  = '';
                    }
                }
            } catch(e) { console.error(e); }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadTop3('red-pixel', 'p');
            loadTop3('red-pixel', 'r', 'RIDER');
        });
    </script>
</head>
<body>

<header>
    <img src="/images/logo.png" width="160" class="logo" alt="1100pixels">
    <p class="tagline">Pixel games made by Leo</p>
</header>

<main>
    <div class="games-grid">

        <!-- ── Red Pixels ── -->
        <a href="RED-pixels.html" class="game-card">
            <div class="game-thumb">
                <img src="/images/red.png" alt="Red Pixels">
                <div class="scanlines"></div>
                <div class="thumb-overlay">
                    <div class="podium">
                        <div class="podium-place p2" id="p2"><span class="medal">🥈</span><span class="p-name">–</span><span class="p-pts"></span></div>
                        <div class="podium-place p1" id="p1"><span class="medal">🥇</span><span class="p-name">–</span><span class="p-pts"></span></div>
                        <div class="podium-place p3" id="p3"><span class="medal">🥉</span><span class="p-name">–</span><span class="p-pts"></span></div>
                    </div>
                    <span class="play-btn">▶ Spielen</span>
                    <div class="thumb-bottom">
                        <h2 class="game-title">Red Pixels</h2>
                        <p class="game-desc">Finde die sich nicht ändernde rote Box.</p>
                    </div>
                </div>
            </div>
        </a>

        <!-- ── Rider ── -->
        <a href="rider.html" class="game-card">
            <div class="game-thumb">
                <svg class="rider-svg" viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                        <filter id="gl2"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                        <radialGradient id="bg" cx="55%" cy="45%" r="55%">
                            <stop offset="0%" stop-color="#0e2040"/>
                            <stop offset="100%" stop-color="#060e1a"/>
                        </radialGradient>
                    </defs>

                    <!-- Background -->
                    <rect width="400" height="260" fill="url(#bg)"/>

                    <!-- Grid -->
                    <g stroke="rgba(86,154,169,0.07)" stroke-width="1">
                        <line x1="0" y1="65"  x2="400" y2="65"/>
                        <line x1="0" y1="130" x2="400" y2="130"/>
                        <line x1="0" y1="195" x2="400" y2="195"/>
                        <line x1="100" y1="0" x2="100" y2="260"/>
                        <line x1="200" y1="0" x2="200" y2="260"/>
                        <line x1="300" y1="0" x2="300" y2="260"/>
                    </g>

                    <!-- Loop: center (285,158), R=70 → bottom at 228 (off screen) -->
                    <!-- circ=439.8, gap 28°=34.1, arc=405.7, offset to start at 104°=-127.4 -->
                    <circle cx="285" cy="158" r="70" fill="none"
                        stroke="rgba(86,154,169,0.18)" stroke-width="14"
                        stroke-dasharray="405.7 34.1" stroke-dashoffset="-127.4"/>
                    <circle cx="285" cy="158" r="70" fill="none"
                        stroke="#569aa9" stroke-width="3.5"
                        stroke-dasharray="405.7 34.1" stroke-dashoffset="-127.4"
                        filter="url(#gl)"/>

                    <!-- Loop legs at entry/exit -->
                    <line x1="261" y1="224" x2="261" y2="228" stroke="#569aa9" stroke-width="3.5" filter="url(#gl)"/>
                    <line x1="309" y1="224" x2="309" y2="228" stroke="#569aa9" stroke-width="3.5" filter="url(#gl)"/>

                    <!-- Terrain: flat with ramp -->
                    <polyline points="0,228 55,228 100,195 148,228 400,228"
                        fill="none" stroke="#569aa9" stroke-width="3" stroke-linejoin="round" filter="url(#gl)"/>
                    <polygon points="0,228 55,228 100,195 148,228 400,228 400,260 0,260"
                        fill="rgba(5,12,22,0.95)"/>

                    <!-- Speed lines — rider moving left at top -->
                    <g stroke="rgba(86,154,169,0.45)" stroke-width="1.5" stroke-linecap="round" filter="url(#gl)">
                        <line x1="310" y1="78"  x2="355" y2="82"/>
                        <line x1="308" y1="93"  x2="353" y2="95"/>
                        <line x1="313" y1="63"  x2="350" y2="67"/>
                        <line x1="312" y1="107" x2="350" y2="108"/>
                    </g>

                    <!-- Skateboard upside-down at top of loop -->
                    <g transform="translate(285,88) rotate(180)" filter="url(#gl2)">
                        <!-- Deck side face with kick tails -->
                        <polygon points="-33,-9 -19,-6 19,-6 33,-9 33,-16 19,-13 -19,-13 -33,-16"
                            fill="rgba(0,30,45,0.97)" stroke="#00f0ff" stroke-width="1.8" stroke-linejoin="round"/>
                        <!-- Top surface (3D depth) -->
                        <polygon points="-33,-16 -19,-13 19,-13 33,-16 32,-19 18,-16.5 -18,-16.5 -32,-19"
                            fill="rgba(0,120,155,0.22)" stroke="#00f0ff" stroke-width="1.2" stroke-linejoin="round"/>
                        <!-- Gloss line -->
                        <line x1="-13" y1="-14.5" x2="13" y2="-14.5"
                            stroke="rgba(160,255,255,0.45)" stroke-width="1"/>
                        <!-- Trucks -->
                        <g stroke="#2a6677" stroke-width="2.2" stroke-linecap="round">
                            <line x1="-26" y1="-6" x2="-14" y2="-6"/>
                            <line x1="-20" y1="-6" x2="-20" y2="4"/>
                            <line x1="-26" y1="4"  x2="-14" y2="4"/>
                            <line x1="14"  y1="-6" x2="26"  y2="-6"/>
                            <line x1="20"  y1="-6" x2="20"  y2="4"/>
                            <line x1="14"  y1="4"  x2="26"  y2="4"/>
                        </g>
                        <!-- Wheels -->
                        <circle cx="-20" cy="4" r="12" fill="#030d12" stroke="#00f0ff" stroke-width="2.2"/>
                        <circle cx="20"  cy="4" r="12" fill="#030d12" stroke="#00f0ff" stroke-width="2.2"/>
                        <circle cx="-20" cy="4" r="8.5" fill="none" stroke="rgba(0,180,210,0.28)" stroke-width="1"/>
                        <circle cx="20"  cy="4" r="8.5" fill="none" stroke="rgba(0,180,210,0.28)" stroke-width="1"/>
                    </g>

                    <!-- HUD: score top-left -->
                    <text x="16" y="36" font-family="'Segoe UI',monospace" font-size="15"
                        font-weight="800" fill="#ff4444" filter="url(#gl)" letter-spacing="1">42 FLIPS</text>
                    <!-- Boost label -->
                    <text x="16" y="54" font-family="'Segoe UI',monospace" font-size="9"
                        fill="rgba(255,204,68,0.65)" letter-spacing="1.5">BOOST</text>
                    <!-- Boost bar -->
                    <rect x="16" y="60" width="30" height="5" rx="2" fill="#ffcc44" filter="url(#gl)"/>
                    <rect x="50" y="60" width="30" height="5" rx="2" fill="#ffcc44" filter="url(#gl)"/>
                    <rect x="84" y="60" width="30" height="5" rx="2" fill="rgba(255,204,68,0.25)"/>

                    <!-- SPEED BOOST popup -->
                    <text x="285" y="45" font-family="'Segoe UI',monospace" font-size="11"
                        font-weight="700" fill="#ffcc44" filter="url(#gl2)"
                        text-anchor="middle" letter-spacing="1" opacity="0.9">SPEED BOOST!</text>
                </svg>
                <div class="scanlines"></div>
                <div class="thumb-overlay">
                    <div class="podium">
                        <div class="podium-place p2" id="r2"><span class="medal">🥈</span><span class="p-name">–</span><span class="p-pts"></span></div>
                        <div class="podium-place p1" id="r1"><span class="medal">🥇</span><span class="p-name">–</span><span class="p-pts"></span></div>
                        <div class="podium-place p3" id="r3"><span class="medal">🥉</span><span class="p-name">–</span><span class="p-pts"></span></div>
                    </div>
                    <span class="play-btn">▶ Spielen</span>
                    <div class="thumb-bottom">
                        <h2 class="game-title">Rider</h2>
                        <p class="game-desc">Fahre so weit wie möglich und mache Flips.</p>
                    </div>
                </div>
            </div>
        </a>

    </div>
</main>

</body>
</html>
