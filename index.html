<!DOCTYPE html>
<html>
<head>
    <title>1100pixels.com</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/index.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyCGxWCAMbglUMjHeKRdeniS4TcA5oCAx1c",
            authDomain: "pixels-e2f82.firebaseapp.com",
            projectId: "pixels-e2f82",
            storageBucket: "pixels-e2f82.firebasestorage.app",
            messagingSenderId: "311496840709",
            appId: "1:311496840709:web:3a94601ef40cbd0c946e6c"
        });
        const db = getFirestore(app);

        async function loadTop3(collection_name, prefix) {
            const q = query(collection(db, collection_name), orderBy('points', 'desc'), limit(3));
            const snap = await getDocs(q);
            const top = [];
            snap.forEach(doc => top.push(doc.data()));

            const order = [top[2], top[0], top[1]];
            const ids = [prefix + '3', prefix + '1', prefix + '2'];
            order.forEach((player, i) => {
                if (!player) return;
                document.getElementById(ids[i] + '-name').textContent = player.name;
                document.getElementById(ids[i] + '-pts').textContent = player.points + ' P';
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadTop3('red-pixel', 'p');
            loadTop3('rider', 'r');
        });
    </script>
</head>
<body>

    <header>
        <img src="/images/logo.png" width="180px" class="logo">
        <p class="tagline">Pixel games made by Leo</p>
    </header>

    <main>
        <section class="games-section">
            <h2 class="section-title">Games</h2>
            <div class="games-grid">
                <a href="RED-pixels.html" class="game-card">
                    <div class="game-thumb">
                        <img src="/images/red.png" alt="Red Pixels">
                        <div class="podium">
                            <div class="podium-place p3">
                                <span class="medal">🥉</span>
                                <span class="p-name" id="p3-name">–</span>
                                <span class="p-pts" id="p3-pts"></span>
                            </div>
                            <div class="podium-place p1">
                                <span class="medal">🥇</span>
                                <span class="p-name" id="p1-name">–</span>
                                <span class="p-pts" id="p1-pts"></span>
                            </div>
                            <div class="podium-place p2">
                                <span class="medal">🥈</span>
                                <span class="p-name" id="p2-name">–</span>
                                <span class="p-pts" id="p2-pts"></span>
                            </div>
                        </div>
                        <div class="game-overlay">
                            <span class="play-btn">Spielen ▶</span>
                        </div>
                    </div>
                    <div class="game-info">
                        <h3>Red Pixels</h3>
                        <p>Finde die sich nicht ändernde rote Box.</p>
                    </div>
                </a>
                <a href="rider.html" class="game-card">
                    <div class="game-thumb">
                        <svg class="rider-preview-svg" viewBox="0 0 240 150" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <filter id="rglow">
                                    <feGaussianBlur stdDeviation="3" result="blur"/>
                                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                                </filter>
                                <filter id="vglow">
                                    <feGaussianBlur stdDeviation="4" result="blur"/>
                                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                                </filter>
                            </defs>
                            <rect width="240" height="150" fill="#0a1628"/>
                            <!-- Grid -->
                            <line x1="0" y1="30" x2="240" y2="30" stroke="rgba(86,154,169,0.08)" stroke-width="1"/>
                            <line x1="0" y1="60" x2="240" y2="60" stroke="rgba(86,154,169,0.08)" stroke-width="1"/>
                            <line x1="0" y1="90" x2="240" y2="90" stroke="rgba(86,154,169,0.08)" stroke-width="1"/>
                            <line x1="0" y1="120" x2="240" y2="120" stroke="rgba(86,154,169,0.08)" stroke-width="1"/>
                            <line x1="60" y1="0" x2="60" y2="150" stroke="rgba(86,154,169,0.08)" stroke-width="1"/>
                            <line x1="120" y1="0" x2="120" y2="150" stroke="rgba(86,154,169,0.08)" stroke-width="1"/>
                            <line x1="180" y1="0" x2="180" y2="150" stroke="rgba(86,154,169,0.08)" stroke-width="1"/>
                            <!-- Terrain -->
                            <polyline points="0,115 50,115 80,88 120,88 155,72 185,50 240,50"
                                fill="none" stroke="#569aa9" stroke-width="2.5"
                                stroke-linejoin="round" filter="url(#rglow)"/>
                            <!-- Terrain fill -->
                            <polygon points="0,115 50,115 80,88 120,88 155,72 185,50 240,50 240,150 0,150"
                                fill="rgba(5,14,26,0.9)"/>
                            <!-- Vehicle on ramp -->
                            <g transform="translate(108,80) rotate(-18)" filter="url(#vglow)">
                                <rect x="-18" y="-11" width="36" height="13" rx="3" fill="#ff3333"/>
                                <circle cx="-12" cy="3" r="7" fill="#cc2222"/>
                                <circle cx="12" cy="3" r="7" fill="#cc2222"/>
                                <circle cx="-12" cy="3" r="3" fill="#0a1628"/>
                                <circle cx="12" cy="3" r="3" fill="#0a1628"/>
                            </g>
                        </svg>
                        <div class="podium">
                            <div class="podium-place p3">
                                <span class="medal">🥉</span>
                                <span class="p-name" id="r3-name">–</span>
                                <span class="p-pts" id="r3-pts"></span>
                            </div>
                            <div class="podium-place p1">
                                <span class="medal">🥇</span>
                                <span class="p-name" id="r1-name">–</span>
                                <span class="p-pts" id="r1-pts"></span>
                            </div>
                            <div class="podium-place p2">
                                <span class="medal">🥈</span>
                                <span class="p-name" id="r2-name">–</span>
                                <span class="p-pts" id="r2-pts"></span>
                            </div>
                        </div>
                        <div class="game-overlay">
                            <span class="play-btn">Spielen ▶</span>
                        </div>
                    </div>
                    <div class="game-info">
                        <h3>Rider</h3>
                        <p>Fahre so weit wie möglich und mache Flips.</p>
                    </div>
                </a>
            </div>
        </section>

        <section class="scores-section">
            <h2 class="section-title">Bestenliste</h2>
            <iframe src="./tabelle.html" class="scores-iframe" frameborder="0"></iframe>
        </section>
    </main>

</body>
</html>
